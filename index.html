// Separa la lógica de aplicar un resultado de combate al estado (usada por live viewer y simulate rápido)
// Revierte todos los efectos de un evento ya completado (victorias, derrotas, KOs, títulos, bonos)
function revertEvent(ev){
  ev.card.forEach(fight=>{
    if(!fight.result) return;
    const r=fight.result;
    const winner=STATE.fighters.find(x=>x.id===r.winnerId);
    const loser=STATE.fighters.find(x=>x.id===r.loserId);
    if(!winner||!loser) return;

    // Revertir récord numérico
    winner.record.wins = Math.max(0, (winner.record.wins||0)-1);
    winner.record.ufcWins = Math.max(0, (winner.record.ufcWins||0)-1);
    winner.record.ufcFights = Math.max(0, (winner.record.ufcFights||0)-1);
    loser.record.losses = Math.max(0, (loser.record.losses||0)-1);
    loser.record.ufcLosses = Math.max(0, (loser.record.ufcLosses||0)-1);
    loser.record.ufcFights = Math.max(0, (loser.record.ufcFights||0)-1);
    if(r.method==='KO/TKO'){
      winner.record.koWins=Math.max(0,(winner.record.koWins||0)-1);
      winner.record.ufcKoWins=Math.max(0,(winner.record.ufcKoWins||0)-1);
      loser.record.koLosses=Math.max(0,(loser.record.koLosses||0)-1);
      loser.record.ufcKoLosses=Math.max(0,(loser.record.ufcKoLosses||0)-1);
    } else if(r.method==='Sumisión'){
      winner.record.subWins=Math.max(0,(winner.record.subWins||0)-1);
      winner.record.ufcSubWins=Math.max(0,(winner.record.ufcSubWins||0)-1);
      loser.record.subLosses=Math.max(0,(loser.record.subLosses||0)-1);
      loser.record.ufcSubLosses=Math.max(0,(loser.record.ufcSubLosses||0)-1);
    } else {
      winner.record.decWins=Math.max(0,(winner.record.decWins||0)-1);
      winner.record.ufcDecWins=Math.max(0,(winner.record.ufcDecWins||0)-1);
      loser.record.decLosses=Math.max(0,(loser.record.decLosses||0)-1);
      loser.record.ufcDecLosses=Math.max(0,(loser.record.ufcDecLosses||0)-1);
    }
    // Revertir bonos (FOTN, POTN)
    if(r.performance) winner.bonuses.performanceOfNight=Math.max(0,(winner.bonuses.performanceOfNight||0)-1);
    if(r.isFOTN){
      winner.bonuses.fightOfNight=Math.max(0,(winner.bonuses.fightOfNight||0)-1);
      loser.bonuses.fightOfNight=Math.max(0,(loser.bonuses.fightOfNight||0)-1);
    }
    // Revertir historial de combates
    [winner,loser].forEach(f=>{
      const idx=f.fightHistory?f.fightHistory.lastIndexOf(fight.id):-1;
      if(idx!==-1) f.fightHistory.splice(idx,1);
      // Restaurar lastEventSeq aproximado (sin historial completo, lo dejamos como null o el anterior)
      if(f.lastEventSeq===ev.seq) f.lastEventSeq=null;
    });
    // Revertir títulos: eliminar el reinado que comenzó en este evento
    if(fight.titleId){
      const title=STATE.titles.find(t=>t.id===fight.titleId);
      if(title){
        // Eliminar entrada en history del evento
        title.history=title.history.filter(h=>h.wonEventId!==ev.id);
        // Eliminar reinado del ganador que empezó en este evento
        winner.titleReigns=(winner.titleReigns||[]).filter(tr=>!(tr.titleId===fight.titleId && tr.wonDate===ev.date));
        // Restaurar reinado anterior del poseedor que fue cerrado
        // (buscamos el reinado del poseedor anterior que se cerró ese día)
        STATE.fighters.forEach(f=>{
          const r=(f.titleReigns||[]).find(tr=>tr.titleId===fight.titleId && tr.lostDate===ev.date);
          if(r){ r.lostDate=null; title.holderId=f.id; title.isInterim=r.isInterim||false; }
        });
        // Si no había nadie antes (vacante), dejar vacante
        if(title.history.length===0) title.holderId=null;
      }
    }
  });
  // Revertir eventSeq
  if(STATE.meta.eventSeq>1) STATE.meta.eventSeq--;
  logEvent(`↩️ Evento "${ev.name}" revertido. Sus resultados han sido eliminados.`);
}

function applyFightResultToState(fight, fA, fB, result, ev){
  const winner=result.winner, loser=result.loser;
  winner.record.wins++; loser.record.losses++;
  winner.record.ufcFights=(winner.record.ufcFights||0)+1;
  loser.record.ufcFights=(loser.record.ufcFights||0)+1;
  winner.record.ufcWins=(winner.record.ufcWins||0)+1;
  loser.record.ufcLosses=(loser.record.ufcLosses||0)+1;
  if(result.method==='KO/TKO'){winner.record.koWins++;loser.record.koLosses++;winner.record.ufcKoWins=(winner.record.ufcKoWins||0)+1;loser.record.ufcKoLosses=(loser.record.ufcKoLosses||0)+1;}
  if(result.method==='Sumisión'){winner.record.subWins++;loser.record.subLosses++;winner.record.ufcSubWins=(winner.record.ufcSubWins||0)+1;loser.record.ufcSubLosses=(loser.record.ufcSubLosses||0)+1;}
  if(result.method==='Decisión'){winner.record.decWins++;loser.record.decLosses++;winner.record.ufcDecWins=(winner.record.ufcDecWins||0)+1;loser.record.ufcDecLosses=(loser.record.ufcDecLosses||0)+1;}
  // Momentum
  updateMomentum(winner, true);
  updateMomentum(loser, false);
  // ATP ranking points
  awardAtpPoints(winner, loser, !!fight.titleId);
  // Reputación
  updateReputation(winner, fight.titleId?12: result.method!=='Decisión'?6:3);
  updateReputation(loser, fight.titleId?-8:-3);
  if(result.performance) winner.bonuses.performanceOfNight++;
  // Rich toasts para eventos importantes
  if(winner.momentum>=5) richToast(`🔥 ${winner.name} encadena ${winner.momentum} victorias seguidas!`,'🔥','#82b1ff',3500);
  if(winner.record.losses===0 && winner.record.ufcLosses===0 && winner.record.wins>=5) richToast(`⚡ ${winner.name} sigue INVICTO (${winner.record.wins}-0)!`,'⚡','#a5d6a7',3500);
  [fA,fB].forEach(f=>{f.fightHistory.push(fight.id); f.lastEventSeq=ev.seq;});
  // 5. RIVALIDADES
  updateRivalry(fA.id, fB.id, ev.date);
  // Pelea de contendiente: el ganador obtiene cláusula de pelea por el título
  if(fight.isContender){
    const divTitle=STATE.titles.find(t=>t.divisionId===winner.division&&!t.isInterim&&!t.vacated);
    if(divTitle&&divTitle.holderId&&divTitle.holderId!==winner.id){
      if(!STATE.rematches) STATE.rematches={};
      STATE.rematches[winner.id]={opponentId:divTitle.holderId, type:'titleShot', date:ev.date};
      const champ=STATE.fighters.find(x=>x.id===divTitle.holderId);
      logEvent(`🥊 ${winner.name} gana la pelea de contendiente — Cláusula de contendiente vs ${champ?.name||'el campeón'}!`);
      richToast(`${winner.name} obtiene cláusula de contendiente para ${divName(winner.division)}!`,'🥊','#82b1ff',5000);
    }
  }
  // Título interino: el ganador obtiene cláusula de unificación con el campeón indiscutido
  if(fight.titleId&&fight.isInterim){
    const mainTitle=STATE.titles.find(t=>t.divisionId===winner.division&&!t.isInterim&&!t.vacated);
    if(mainTitle&&mainTitle.holderId&&mainTitle.holderId!==winner.id){
      if(!STATE.rematches) STATE.rematches={};
      STATE.rematches[winner.id]={opponentId:mainTitle.holderId, type:'unification', titleId:fight.titleId, date:ev.date};
      const champ=STATE.fighters.find(x=>x.id===mainTitle.holderId);
      logEvent(`🏆 ${winner.name} es nuevo campeón interino — Cláusula de unificación vs ${champ?.name||'el campeón'}!`);
      richToast(`${winner.name} es campeón interino — debe unificar vs ${champ?.name||'el campeón'}!`,'🏆','#ffd700',6000);
    }
  }
  // Eliminar cláusula de revancha si estos dos peleadores acaban de usarla
  if(STATE.rematches){
    if(STATE.rematches[fA.id]?.opponentId===fB.id){ delete STATE.rematches[fA.id]; logEvent(`🔄 Cláusula de revancha consumida: ${fA.name} vs ${fB.name}.`); }
    if(STATE.rematches[fB.id]?.opponentId===fA.id){ delete STATE.rematches[fB.id]; logEvent(`🔄 Cláusula de revancha consumida: ${fB.name} vs ${fA.name}.`); }
  }
  // Título
  if(fight.titleId){
    const title=STATE.titles.find(t=>t.id===fight.titleId);
    if(!title) return; // título no encontrado (no debería ocurrir)

    const divId=title.divisionId;
    const isMainTitle=!title.isInterim;

    // ── PELEA INTERINA ──
    // El interino siempre se registra en el título PRINCIPAL de la división.
    // No se crea ningún objeto título nuevo. El título principal tiene
    // holderId (campeón) e interimHolderId (campeón interino) simultáneamente.
    if(fight.isInterim){
      const mainTitle = isMainTitle ? title : STATE.titles.find(t=>t.divisionId===divId&&!t.isInterim);
      if(!mainTitle) return;

      const prevInterim = mainTitle.interimHolderId;
      // Cerrar reinado interino anterior si lo hay
      if(prevInterim && prevInterim!==winner.id){
        const pf=STATE.fighters.find(x=>x.id===prevInterim);
        const pr=(pf?.titleReigns||[]).find(r=>r.titleId===mainTitle.id&&r.isInterim&&!r.lostDate);
        if(pr) pr.lostDate=ev.date;
      }

      mainTitle.interimHolderId=winner.id;
      winner.titleReigns=winner.titleReigns||[];
      const alreadyHas=(winner.titleReigns||[]).some(r=>r.titleId===mainTitle.id&&r.isInterim&&!r.lostDate);
      if(!alreadyHas){
        winner.titleReigns.push({titleId:mainTitle.id,titleName:mainTitle.name,divisionId:mainTitle.divisionId,wonDate:ev.date,lostDate:null,defenses:0,isInterim:true});
        mainTitle.history.push({fighterId:winner.id,wonEventId:ev.id,wonDate:ev.date,isInterim:true});
        logEvent(`🥈 ${winner.name} es el nuevo campeón interino de ${mainTitle.name}!`);
        richToast(`¡${winner.name} es el nuevo campeón interino de ${divName(divId)}!`,'🥈','#90caf9',5000);
      }
      // Cláusula de unificación
      if(mainTitle.holderId && mainTitle.holderId!==winner.id){
        if(!STATE.rematches) STATE.rematches={};
        STATE.rematches[winner.id]={opponentId:mainTitle.holderId,type:'unification',titleId:mainTitle.id,date:ev.date};
        const champ=STATE.fighters.find(x=>x.id===mainTitle.holderId);
        logEvent(`🏆 Cláusula de unificación activa: ${winner.name} vs ${champ?.name||'el campeón'}.`);
      }
      return;
    }

    // ── PELEA INDISCUTIDA (o UNIFICACIÓN) ──
    const prevHolder=title.holderId;
    const prevInterim=title.interimHolderId;

    // DEFENSA del campeón actual
    if(winner.id===prevHolder){
      const reign=(winner.titleReigns||[]).find(r=>r.titleId===title.id&&!r.isInterim&&!r.lostDate);
      if(reign) reign.defenses=(reign.defenses||0)+1;
      logEvent(`🛡️ ${winner.name} defiende ${title.name} (defensa nº ${reign?.defenses||1}).`);
      // Unificación: campeón principal derrota al interino → limpiar interino
      if(prevInterim===loser.id){
        const lr=(loser.titleReigns||[]).find(r=>r.titleId===title.id&&r.isInterim&&!r.lostDate);
        if(lr) lr.lostDate=ev.date;
        title.interimHolderId=null;
        logEvent(`🥈 ${loser.name} pierde el cinturón interino. Queda un solo campeón en ${divName(divId)}.`);
        richToast(`¡${winner.name} unifica! Solo queda un campeón de ${divName(divId)}.`,'👑','#d4af37',5000);
      }
      return;
    }

    // CAMBIO DE CAMPEÓN
    // 1) Cerrar reinado del poseedor anterior
    if(prevHolder){
      const pf=STATE.fighters.find(x=>x.id===prevHolder);
      const pr=(pf?.titleReigns||[]).find(r=>r.titleId===title.id&&!r.isInterim&&!r.lostDate);
      if(pr) pr.lostDate=ev.date;
    }

    // 2) Unificación: ganador era el interino → cerrar su reinado interino
    if(prevInterim===winner.id){
      const ir=(winner.titleReigns||[]).find(r=>r.titleId===title.id&&r.isInterim&&!r.lostDate);
      if(ir) ir.lostDate=ev.date;
      title.interimHolderId=null;
      logEvent(`🏆 ${winner.name} unifica — deja de ser interino y pasa a campeón indiscutido.`);
    }

    // 3) Unificación: perdedor era el interino → cerrar su reinado interino
    if(prevInterim===loser.id){
      const lr=(loser.titleReigns||[]).find(r=>r.titleId===title.id&&r.isInterim&&!r.lostDate);
      if(lr) lr.lostDate=ev.date;
      title.interimHolderId=null;
      logEvent(`🥈 ${loser.name} pierde el cinturón interino. Queda un solo campeón.`);
      richToast(`¡${winner.name} unifica el título de ${divName(divId)}! Solo queda un campeón.`,'👑','#d4af37',5000);
    }

    // 4) Asignar el cinturón al nuevo campeón
    title.holderId=winner.id;
    winner.titleReigns=winner.titleReigns||[];
    const alreadyHasReign=(winner.titleReigns||[]).some(r=>r.titleId===title.id&&!r.isInterim&&!r.lostDate);
    if(!alreadyHasReign){
      winner.titleReigns.push({titleId:title.id,titleName:title.name,divisionId:title.divisionId,wonDate:ev.date,lostDate:null,defenses:0,isInterim:false});
      title.history.push({fighterId:winner.id,wonEventId:ev.id,wonDate:ev.date,isInterim:false});
      logEvent(`👑 ${winner.name} se proclama campeón de ${title.name}!`);
      richToast(`¡Nuevo campeón! ${winner.name} gana ${title.name}!`,'👑','#d4af37',5000);
    }

    // Cláusula de revancha al ex-campeón
    if(prevHolder){
      const prevChamp=STATE.fighters.find(x=>x.id===prevHolder);
      if(prevChamp && prevChamp.status!=='retired'){
        const wantsRematch=confirm(`${prevChamp.name} ha perdido el ${title.name} vs ${winner.name}.\n\n¿Añadir cláusula de revancha?`);
        if(wantsRematch){
          if(!STATE.rematches) STATE.rematches={};
          STATE.rematches[prevHolder]={opponentId:winner.id,type:'rematch',titleId:title.id,date:ev.date};
          logEvent(`🔄 Cláusula de revancha: ${prevChamp.name} vs ${winner.name} por ${title.name}.`);
        }
      }
    }
  }
  applyPostFightWearAndInjury(winner,true,result.method,ev.date);
  applyPostFightWearAndInjury(loser,false,result.method,ev.date);
  // Actualizar daño de chin acumulado si fue KO/TKO
  if(result.method==='KO/TKO'){
    if(loser.chinDamage==null) loser.chinDamage=0;
    loser.chinDamage = Math.min(loser.chinDamage + randi(2,4), 30);
  }
  // Registrar knockdowns en el récord narrativo
  if(result.knockdownsA>0) logEvent(`⚡ ${winner.name} tumbó a ${loser.name} ${result.knockdownsA}x en este combate.`);
  if(result.knockdownsB>0) logEvent(`⚡ ${loser.name} tumbó a ${winner.name} ${result.knockdownsB}x pero no ganó el combate.`);
  // Guardar snapshot de stats y verificar hitos
  saveStatSnapshot(winner, ev.date, ev.name);
  saveStatSnapshot(loser, ev.date, ev.name);
  checkMilestones(winner, ev);
  logEvent(`🥊 ${winner.name} derrota a ${loser.name} por ${result.method} (R${result.round}, ${result.time})`);
}

function finishEvent(ev){
  // FOTN: la pelea más espectacular del evento
  const completedFights = ev.card.filter(ft=>ft.result);
  if(completedFights.length>0){
    const fotnScores = completedFights.map(ft=>{
      const r=ft.result;
      const fAf=STATE.fighters.find(x=>x.id===ft.fighterA), fBf=STATE.fighters.find(x=>x.id===ft.fighterB);
      let score=Math.random()*30;
      if(r.method==='KO/TKO')score+=40; else if(r.method==='Sumisión')score+=30; else score+=10;
      if(fAf&&fBf){const diff=Math.abs(overallRating(fAf)-overallRating(fBf));score+=Math.max(0,20-diff*2);}
      if(r.fightOfNight)score+=20;
      return {ft,score};
    });
    fotnScores.sort((a,b)=>b.score-a.score);
    const fotnFight=fotnScores[0].ft;
    fotnFight.result.isFOTN=true;
    const fotnW=STATE.fighters.find(x=>x.id===fotnFight.result.winnerId);
    const fotnL=STATE.fighters.find(x=>x.id===fotnFight.result.loserId);
    if(fotnW)fotnW.bonuses.fightOfNight++;
    if(fotnL)fotnL.bonuses.fightOfNight++;
    logEvent(`🌟 FOTN: ${fotnW?fotnW.name:'?'} vs ${fotnL?fotnL.name:'?'}`);
  }
  ev.status='completed';
  STATE.meta.eventSeq++;

  // 1. Evolución de atributos (una vez por evento)
  evolveAttributes(ev.date);
  // Lesiones de entrenamiento (probabilidad baja)
  applyTrainingInjuries(ev.date);
  // Decaimiento ATP
  decayAtpPoints(ev.date);

  // 4. Verificar presión de defensas de título
  ev._titleAlerts = checkTitleDefensePressure(ev.date);

  // 9. Noticias narrativas
  generateNews(STATE.fighters);

  // Scouting periódico (cada 3 eventos)
  if(STATE.meta.eventSeq % 3 === 0) generateScoutCandidates();

  refreshRankings();
  saveRankingSnapshot(ev.id, ev.date);
  autoFillDivisions();
  logEvent(`✅ ${ev.name} completado (${completedFights.length} combates).`);
  // El resumen lo muestran los callers DESPUÉS de render(), no aquí
  ev._completedFights = completedFights; // guardar referencia para el resumen
}

/* ====================== MOMENTUM Y RACHAS ====================== */
function updateMomentum(fighter, won){
  if(!fighter.momentum) fighter.momentum=0;
  // won=true: W, won=false: L, won='draw': no change
  if(won===true){  fighter.momentum = Math.min((fighter.momentum||0)+1, 10); }
  else if(won===false){ fighter.momentum = 0; }
  // draws don't reset streak
}
// Bonus temporal de atributos por racha (solo para la simulación, no modifica stats reales)
function momentumBonus(f){
  const m = f.momentum||0;
  if(m<3) return 0;
  if(m<5) return 2;
  if(m<8) return 4;
  return 6;
}

/* ====================== MISS WEIGHT / SOBREPESO ====================== */
// Lllamado antes de simular un combate. Devuelve qué peleador faltó al peso (o null).
function checkMissWeight(fight){
  const MISS_PROB = 0.06; // 6% por peleador
  const a = Math.random()<MISS_PROB? fight.fighterA : null;
  const b = !a && Math.random()<MISS_PROB? fight.fighterB : null;
  return a||b||null;
}

/* ====================== LESIONES DE ENTRENAMIENTO ====================== */
// Se llama en finishEvent — probabilidad muy baja de lesión sin combatir
function applyTrainingInjuries(eventDate){
  const TRAINING_INJURY_PROB = 0.015; // 1.5% por peleador por evento
  STATE.fighters.filter(f=>f.status==='active').forEach(f=>{
    if(Math.random()<TRAINING_INJURY_PROB){
      const days=randi(30,120);
      f.injury={active:true,untilDate:addDays(eventDate,days),note:pick(['Lesión de rodilla','Fractura de mano','Desgarro muscular','Lesión de hombro','Esguince de tobillo'])};
      f.status='injured';
      logEvent(`🩹 ${f.name} sufre una lesión entrenando (${f.injury.note}) y estará fuera hasta ${fmtDate(f.injury.untilDate)}.`);
    }
  });
}

/* ====================== ATP RANKING POINTS ====================== */
// Los puntos ATP coexisten con el rankScore, añaden dinámica de decaimiento y valor por rival
function awardAtpPoints(winner, loser, isTitle){
  if(!STATE.atpPoints) STATE.atpPoints={};
  const loserPts = STATE.atpPoints[loser.id]||0;
  // Puntos según ranking del rival (cuanto mejor el rival, más puntos)
  const divList = divisionTop15(winner.division);
  const loserPos = divList.findIndex(x=>x.id===loser.id);
  const basePts = loserPos===0?500:loserPos===1?400:loserPos<=3?300:loserPos<=7?200:loserPos<=10?150:100;
  const titleBonus = isTitle?200:0;
  STATE.atpPoints[winner.id]=(STATE.atpPoints[winner.id]||0)+basePts+titleBonus;
  // Penalización por derrota (pierde el 30% de sus puntos actuales)
  STATE.atpPoints[loser.id]=Math.round((STATE.atpPoints[loser.id]||0)*0.7);
}
// Decaimiento semestral: llamado al finalizar cada evento, reduce puntos del campo inactivo
function decayAtpPoints(eventDate){
  if(!STATE.atpPoints) return;
  Object.keys(STATE.atpPoints).forEach(fid=>{
    const f=STATE.fighters.find(x=>x.id===fid); if(!f) return;
    // Peleadores sin pelear en +180 días pierden 10% de puntos por evento
    const lastFight = f.lastEventSeq!=null?
      STATE.events.find(e=>e.seq===f.lastEventSeq&&e.status==='completed')?.date : null;
    const days = lastFight? Math.round((new Date(eventDate)-new Date(lastFight))/86400000) : 999;
    if(days>180) STATE.atpPoints[fid]=Math.round(STATE.atpPoints[fid]*0.9);
  });
}

function tplTitleTimeline(tid){
  const title=STATE.titles.find(t=>t.id===tid); if(!title) return '';
  // Reconstruir reinados con fechas
  const reigns=[];
  STATE.fighters.forEach(f=>{
    (f.titleReigns||[]).filter(r=>r.titleId===tid).forEach(r=>{
      const start=new Date(r.wonDate), end=r.lostDate?new Date(r.lostDate):new Date(STATE.meta.currentDate);
      const days=Math.round((end-start)/86400000);
      reigns.push({f, start, end, days, defenses:r.defenses||0, isInterim:r.isInterim, wonDate:r.wonDate, lostDate:r.lostDate});
    });
  });
  reigns.sort((a,b)=>a.start-b.start);
  if(!reigns.length) return '<p class="muted">Sin historial de reinados.</p>';
  const totalDays=reigns.reduce((s,r)=>s+r.days,0)||1;
  return `<div style="margin:10px 0">
    ${reigns.map((r,i)=>{
      const pct=Math.max(3,Math.round(r.days/totalDays*100));
      const col=fighterColor(r.f.id); // color único y estable por peleador

/* ====================== COMPARADOR HEAD-TO-HEAD ====================== */
function tplComparator(){
  const divFilter=UI.cmpDiv||'ALL';
  const pool=STATE.fighters.filter(f=>f.status!=='retired'&&(divFilter==='ALL'||f.division===divFilter))
    .slice().sort((a,b)=>b.rankScore-a.rankScore);
  const opts=pool.map(f=>`<option value="${f.id}">${f.name} (${f.record.wins}-${f.record.losses})</option>`).join('');
  const divOpts=`<option value="ALL">Todas las categorías</option>`+DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('');
  const fidA=UI.cmpA||pool[0]?.id, fidB=UI.cmpB||pool[1]?.id;
  const fA=STATE.fighters.find(x=>x.id===fidA), fB=STATE.fighters.find(x=>x.id===fidB);
  if(!fA||!fB) return `<div class="card"><h2>Comparador</h2><p class="muted">Sin peleadores para comparar en esta categoría.</p></div>`;
  const p=winProbabilities(fA,fB,3);
  const mutual=getRivalryFights(fA.id,fB.id);
  const statRows=[['Striking','striking'],['Potencia','power'],['W. Ofensivo','wrestlingOff'],['W. Defensivo','wrestlingDef'],['Suelo','ground'],['Cardio','cardio'],['Resistencia','chin']].map(([lbl,k])=>{
    const va=fA.stats[k],vb=fB.stats[k],max=Math.max(va,vb);
    return `<tr>
      <td style="text-align:right;font-weight:${va>=vb?'700':'400'};color:${va>vb?'#e53935':va===vb?'#888':'#555'}">${va}</td>
      <td style="text-align:center;font-size:.72rem;color:#666">${lbl}</td>
      <td style="font-weight:${vb>=va?'700':'400'};color:${vb>va?'#1565c0':vb===va?'#888':'#555'}">${vb}</td>
    </tr>`;
  }).join('');
  return `

/* ====================== RANKING HISTORY SNAPSHOTS ====================== */
function saveRankingSnapshot(eventId, eventDate){
  if(!STATE.rankingHistory) STATE.rankingHistory=[];
  const snapshot={eventId, date:eventDate,
    p4p:p4pTop15().map((f,i)=>({id:f.id,name:f.name,pos:i+1})), divisions:{}};
  DIVISIONS.forEach(d=>{snapshot.divisions[d.id]=divisionTop15(d.id).map((f,i)=>({id:f.id,name:f.name,pos:i+1}));});
  STATE.rankingHistory.push(snapshot);
  if(STATE.rankingHistory.length>50) STATE.rankingHistory.shift();
}
function tplRankingHistory(){
  const snaps=STATE.rankingHistory||[];
  if(!snaps.length) return `<div class="card"><h2>📈 Historial de Rankings</h2><p class="muted">Aún no hay snapshots. Se guardan automáticamente tras cada evento.</p></div>`;
  const selDiv=UI.rhDiv||'p4p';
  const divOpts=`<option value="p4p">P4P</option>`+DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('');
  // Filtrar peleadores por división seleccionada
  let fighters;
  if(selDiv==='p4p'){
    const idsInP4P=new Set(snaps.flatMap(s=>s.p4p.map(x=>x.id)));
    fighters=STATE.fighters.filter(f=>idsInP4P.has(f.id)||f.status!=='retired').slice().sort((a,b)=>b.rankScore-a.rankScore);
  } else {
    const idsInDiv=new Set(snaps.flatMap(s=>(s.divisions[selDiv]||[]).map(x=>x.id)));
    fighters=STATE.fighters.filter(f=>f.division===selDiv||idsInDiv.has(f.id)).slice().sort((a,b)=>b.rankScore-a.rankScore);
    if(!fighters.length) fighters=STATE.fighters.filter(f=>f.division===selDiv);
  }
  const validIds=new Set(fighters.map(f=>f.id));
  if(UI.rhFid && !validIds.has(UI.rhFid)) UI.rhFid=fighters[0]?.id;
  const selFid=UI.rhFid||fighters[0]?.id;
  const fOpts=fighters.map(f=>{
    const isC=STATE.titles.some(t=>t.holderId===f.id);
    const isI=STATE.titles.some(t=>t.interimHolderId===f.id);
    return `<option value="${f.id}">${isC?'🏆 ':isI?'🥈 ':''}${f.name}${f.status==='retired'?' (ret.)':''}</option>`;
  }).join('');
  const chartData=snaps.map(s=>{
    const list=selDiv==='p4p'?s.p4p:(s.divisions[selDiv]||[]);
    const entry=list.find(x=>x.id===selFid);
    return {date:s.date,pos:entry?entry.pos:null};
  }).filter(x=>x.pos!==null);
  const W=340,H=150,PAD=32;
  let svg='';
  if(chartData.length>=2){
    const xs=chartData.map((_,i)=>PAD+(i/(chartData.length-1))*(W-PAD*2));
    const ys=chartData.map(d=>PAD+(d.pos-1)/(14)*(H-PAD*2));
    [1,5,10,15].forEach(p=>{const y=PAD+(p-1)/14*(H-PAD*2);svg+=`<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="#222" stroke-width="1"/><text x="${PAD-4}" y="${y+4}" fill="#555" font-size="9" text-anchor="end">#${p}</text>`;});
    svg+=`<polyline points="${xs.map((x,i)=>`${x},${ys[i]}`).join(' ')}" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linejoin="round"/>`;
    chartData.forEach((d,i)=>{
      svg+=`<circle cx="${xs[i]}" cy="${ys[i]}" r="4" fill="#d4af37"/>`;
      if(i===0||i===chartData.length-1||chartData.length<=8) svg+=`<text x="${xs[i]}" y="${ys[i]-8}" fill="#d4af37" font-size="8" text-anchor="middle">#${d.pos}</text>`;
    });
    // date labels
    const step=Math.max(1,Math.floor(chartData.length/5));
    chartData.forEach((d,i)=>{if(i%step===0) svg+=`<text x="${xs[i]}" y="${H-4}" fill="#444" font-size="7" text-anchor="middle">${d.date.slice(5)}</text>`;});
  } else svg=`<text x="${W/2}" y="${H/2}" fill="#555" font-size="11" text-anchor="middle">Mínimo 2 eventos para ver gráfico</text>`;
  const lastSnap=snaps[snaps.length-1];
  const tableList=selDiv==='p4p'?lastSnap.p4p:(lastSnap.divisions[selDiv]||[]);
  return `<div class="card"><h2>📈 Historial de Rankings</h2>
    <div class="row"><select id="rhDiv">${divOpts}</select><select id="rhFid">${fOpts}</select></div>
    <div style="margin:12px 0"><div style="font-size:.72rem;color:#666;margin-bottom:4px">Posición de ${STATE.fighters.find(f=>f.id===selFid)?.name||'?'} en el tiempo (más arriba = mejor)</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;background:#0d0d0d;border-radius:8px">${svg}</svg></div>
    <div style="font-size:.72rem;color:#666;margin-bottom:6px">Ranking al último evento (${lastSnap.date})</div>
    <table><thead><tr><th>#</th><th>Nombre</th></tr></thead><tbody>
    ${tableList.map((x,i)=>{const isC=STATE.titles.some(t=>t.holderId===x.id),isI=STATE.titles.some(t=>t.interimHolderId===x.id);return `<tr class="clickable" data-id="${x.id}"><td>${i+1}</td><td>${isC?'🏆 ':isI?'🥈 ':''}${x.name}</td></tr>`;}).join('')}
    </tbody></table></div>`;
}

  const ds=document.getElementById('rhDiv'),fs=document.getElementById('rhFid');
  if(ds){ds.value=UI.rhDiv||'p4p';ds.onchange=()=>{UI.rhDiv=ds.value;render();};}

/* ====================== RICH TOASTS ====================== */
const _toastQueue=[];let _toastActive=false;
function richToast(msg, icon='ℹ️', color='#d4af37', duration=4000){
  _toastQueue.push({msg,icon,color,duration});
  if(!_toastActive) _drainToasts();
}
function _drainToasts(){
  if(!_toastQueue.length){_toastActive=false;return;}
  _toastActive=true;
  const {msg,icon,color,duration}=_toastQueue.shift();
  // Remove any existing toast
  document.querySelectorAll('.rich-toast').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='rich-toast';
  el.style.cssText=`position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid ${color};border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:9999;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:opacity .3s`;
  el.innerHTML=`<span style="font-size:1.5rem">${icon}</span><div style="font-size:.83rem;font-weight:700;color:${color}">${msg}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>{el.remove();setTimeout(_drainToasts,200);},300);},duration);
}

function getPfpRank(f){
  const sorted=STATE.fighters.filter(x=>x.status==='active').sort((a,b)=>b.rankScore-a.rankScore);
  const idx=sorted.findIndex(x=>x.id===f.id);
  return idx>=0&&idx<15?idx+1:null;
}
function getDivRank(f){
  const sorted=STATE.fighters.filter(x=>x.status==='active'&&x.division===f.division).sort((a,b)=>b.rankScore-a.rankScore);
  const idx=sorted.findIndex(x=>x.id===f.id);
  return idx>=0&&idx<15?idx+1:null;
}
/* ====================== REPUTACIÓN ====================== */
function updateReputation(f, delta){ if(f) f.reputation=clamp((f.reputation||50)+delta,0,100); }
function reputationLabel(f){ const r=f.reputation||50; return r>=90?'⭐⭐⭐ Superestrella':r>=75?'⭐⭐ Estrella':r>=60?'⭐ Conocido':r>=40?'Contendiente':'Desconocido'; }

/* ====================== COLOR ÚNICO POR PELEADOR ====================== */
function fighterColor(fid){
  let h=0; for(let i=0;i<fid.length;i++) h=(h*31+fid.charCodeAt(i))&0xffffffff;
  return `hsl(${Math.abs(h)%360},65%,55%)`;
}

function tplStats(){
  const divFilter = UI.statsDiv || 'ALL';
  const all = divFilter==='ALL'? STATE.fighters : STATE.fighters.filter(f=>f.division===divFilter);

  const totalDefensesOf = f => (f.titleReigns||[]).reduce((a,r)=>a+(r.defenses||0),0);
  const totalReignsOf = f => (f.titleReigns||[]).length;
  const winPct = f => { const t=ufcWinsOf(f)+ufcLossesOf(f); return t>=5? Math.round(ufcWinsOf(f)/t*100):0; };
  const ufcFightsOf = f => f.record.ufcFights!=null? f.record.ufcFights : (f.record.wins+f.record.losses+f.record.draws+f.record.nc);
  const finishRate = f => ufcWinsOf(f)>=5? Math.round((ufcKoWinsOf(f)+ufcSubWinsOf(f))/ufcWinsOf(f)*100):0;
  function currentStreak(f){
    const history = [...(f.fightHistory||[])].reverse();
    let streak=0;
    for(const fid of history){
      let found=null;
      for(const ev of STATE.events){ const ft=ev.card.find(x=>x.id===fid); if(ft&&ft.result){found=ft;break;} }
      if(!found||!found.result) break;
      if(found.result.winnerId===f.id) streak++;
      else break;
    }
    return streak;
  }

  // block genera tabla con nombres clicables para abrir el perfil
  const block=(title,list,fmt,icon='')=>`<div class="card"><h3>${icon} ${title}</h3><table><tbody>
    ${list.filter(f=>typeof fmt(f)==='string'? fmt(f)!=='0%':fmt(f)>0).slice(0,8)
      .map((f,i)=>`<tr class="clickable" data-id="${f.id}"><td>${i+1}</td><td><b>${f.name}</b>${f.status==='retired'?' <span class="muted">(ret.)</span>':''}</td><td><b>${fmt(f)}</b></td></tr>`).join('')||'<tr><td colspan="3" class="muted">Sin datos aún</td></tr>'}
  </tbody></table></div>`;

  // Récords históricos del juego
  const R = STATE.records || {};
  const recRow = (label, rec) => {
    if(!rec) return `<tr><td>${label}</td><td class="muted">—</td><td class="muted">—</td></tr>`;
    const f = STATE.fighters.find(x=>x.id===rec.fighterId);
    const opp = STATE.fighters.find(x=>x.id===rec.opponentId);
    return `<tr class="clickable" data-id="${rec.fighterId}"><td>${label}</td><td><b>${f?f.name:'?'}</b> vs ${opp?opp.name:'?'}</td><td><b>R${rec.round} ${rec.time}</b> (${fmtDate(rec.date)})</td></tr>`;
  };
  const recordsSection = `<div class="card"><h3>📜 Récords históricos de combate</h3>
    <p class="muted">Se actualizan automáticamente con cada pelea simulada. Puedes añadir récords previos a la liga en el Editor → sección Récords.</p>
    <table><thead><tr><th>Récord</th><th>Peleador</th><th>Tiempo</th></tr></thead><tbody>
      ${recRow('⚡ KO más rápido',R.fastestKO)}
      ${recRow('🤼 Sumisión más rápida',R.fastestSub)}
      ${recRow('🐢 KO más tardío',R.latestKO)}
      ${recRow('🐢 Sumisión más tardía',R.latestSub)}
    </tbody></table></div>`;

  return `
  <div class="card"><h2>📊 Estadísticas de la liga</h2>
  <p class="muted">${STATE.events.filter(e=>e.status==='completed').length} eventos celebrados · Todos los datos son <b>solo de la UFC</b>. Haz clic en cualquier nombre para ver el perfil.</p>
  <label>Filtrar por categoría</label>
  <select id="statsDivSel"><option value="ALL" ${divFilter==='ALL'?'selected':''}>Todas las categorías</option>${DIVISIONS.map(d=>`<option value="${d.id}" ${divFilter===d.id?'selected':''}>${divName(d.id)}</option>`).join('')}</select>
  </div>
  <h3 style="margin:12px 8px 4px">🏆 Récords positivos</h3>
  ${block('Más victorias UFC',all.slice().sort((a,b)=>ufcWinsOf(b)-ufcWinsOf(a)),ufcWinsOf)}
  ${block('Más KO/TKO UFC',all.slice().sort((a,b)=>ufcKoWinsOf(b)-ufcKoWinsOf(a)),ufcKoWinsOf,'🥊')}
  ${block('Más sumisiones UFC',all.slice().sort((a,b)=>ufcSubWinsOf(b)-ufcSubWinsOf(a)),ufcSubWinsOf,'🤼')}
  ${block('Más finalizaciones UFC (KO+Sub)',all.slice().sort((a,b)=>(ufcKoWinsOf(b)+ufcSubWinsOf(b))-(ufcKoWinsOf(a)+ufcSubWinsOf(a))),f=>ufcKoWinsOf(f)+ufcSubWinsOf(f),'⚡')}
  ${block('Más defensas de título',all.slice().sort((a,b)=>totalDefensesOf(b)-totalDefensesOf(a)),totalDefensesOf,'🛡️')}
  ${block('Racha activa de victorias',all.filter(f=>currentStreak(f)>0).slice().sort((a,b)=>currentStreak(b)-currentStreak(a)),currentStreak,'🔥')}
  ${block('Más reinados de título',all.slice().sort((a,b)=>totalReignsOf(b)-totalReignsOf(a)),totalReignsOf,'👑')}
  ${block('% victorias UFC (mín.5 peleas UFC)',all.filter(f=>(ufcWinsOf(f)+ufcLossesOf(f))>=5).slice().sort((a,b)=>winPct(b)-winPct(a)),f=>winPct(f)+'%','📈')}
  ${block('% finalizaciones UFC (mín.5 V)',all.filter(f=>ufcWinsOf(f)>=5).slice().sort((a,b)=>finishRate(b)-finishRate(a)),f=>finishRate(f)+'%')}
  ${block('Más peleas en la UFC',all.slice().sort((a,b)=>ufcFightsOf(b)-ufcFightsOf(a)),ufcFightsOf)}
  ${block('Mayor GOAT Score',all.slice().sort((a,b)=>goatScore(b)-goatScore(a)),goatScore,'🐐')}
  ${block('Mejor atributo General',all.slice().sort((a,b)=>generalScore(b)-generalScore(a)),generalScore,'⭐')}
  ${block('Más Peleas de la Noche',all.slice().sort((a,b)=>b.bonuses.fightOfNight-a.bonuses.fightOfNight),f=>f.bonuses.fightOfNight,'🌟')}
  ${block('Más Actuaciones de la Noche',all.slice().sort((a,b)=>b.bonuses.performanceOfNight-a.bonuses.performanceOfNight),f=>f.bonuses.performanceOfNight,'⭐')}
  <h3 style="margin:12px 8px 4px">📉 Datos negativos</h3>
  ${block('Más derrotas UFC',all.slice().sort((a,b)=>ufcLossesOf(b)-ufcLossesOf(a)),ufcLossesOf)}
  ${block('Más KO/TKO recibidos UFC',all.slice().sort((a,b)=>(b.record.ufcKoLosses||0)-(a.record.ufcKoLosses||0)),f=>f.record.ufcKoLosses||0,'💥')}
  ${block('Más sumisiones recibidas UFC',all.slice().sort((a,b)=>(b.record.ufcSubLosses||0)-(a.record.ufcSubLosses||0)),f=>f.record.ufcSubLosses||0)}
  ${block('Más decisiones perdidas UFC',all.slice().sort((a,b)=>(b.record.ufcDecLosses||0)-(a.record.ufcDecLosses||0)),f=>f.record.ufcDecLosses||0)}
  ${block('Más finalizaciones recibidas UFC',all.slice().sort((a,b)=>((b.record.ufcKoLosses||0)+(b.record.ufcSubLosses||0))-((a.record.ufcKoLosses||0)+(a.record.ufcSubLosses||0))),f=>(f.record.ufcKoLosses||0)+(f.record.ufcSubLosses||0),'💀')}

  <h3 style="margin:12px 8px 4px">🏆 Récords en combates por el título</h3>
  ${(()=>{
    const titleFights=[];
    STATE.events.filter(e=>e.status==='completed').forEach(ev=>{
      ev.card.filter(ft=>ft.titleId&&ft.result).forEach(ft=>{
        const w=STATE.fighters.find(x=>x.id===ft.result.winnerId);
        const l=STATE.fighters.find(x=>x.id===ft.result.loserId);
        const t=STATE.titles.find(x=>x.id===ft.titleId);
        if(w&&l&&t) titleFights.push({ft,w,l,t,ev,isInterim:ft.isInterim});
      });
    });
    if(!titleFights.length) return '<div class="card"><p class="muted">Sin combates por el título simulados todavía.</p></div>';
    const toSecs=r=>(r.round-1)*300+parseInt(r.time?.split(':')[0]||0)*60+parseInt(r.time?.split(':')[1]||0);
    const titleWins={}, titleLosses={}, titleKoWins={}, titleSubWins={}, titleDecWins={}, titleShots={};
    titleFights.forEach(({ft,w,l})=>{
      titleWins[w.id]=(titleWins[w.id]||0)+1;
      titleLosses[l.id]=(titleLosses[l.id]||0)+1;
      titleShots[w.id]=(titleShots[w.id]||0)+1;
      titleShots[l.id]=(titleShots[l.id]||0)+1;
      if(ft.result.method==='KO/TKO') titleKoWins[w.id]=(titleKoWins[w.id]||0)+1;
      else if(ft.result.method==='Sumisión') titleSubWins[w.id]=(titleSubWins[w.id]||0)+1;
      else titleDecWins[w.id]=(titleDecWins[w.id]||0)+1;
    });
    const finishT=titleFights.filter(f=>f.ft.result.method!=='Decisión');
    const koT=titleFights.filter(f=>f.ft.result.method==='KO/TKO').sort((a,b)=>toSecs(a.ft.result)-toSecs(b.ft.result));
    const subT=titleFights.filter(f=>f.ft.result.method==='Sumisión').sort((a,b)=>toSecs(a.ft.result)-toSecs(b.ft.result));
    const fastest=finishT.slice().sort((a,b)=>toSecs(a.ft.result)-toSecs(b.ft.result))[0];
    const slowest=finishT.slice().sort((a,b)=>toSecs(b.ft.result)-toSecs(a.ft.result))[0];
    const frustratedShots=Object.entries(titleShots).map(([id,shots])=>({id,shots,wins:titleWins[id]||0})).filter(x=>!x.wins&&x.shots>0).sort((a,b)=>b.shots-a.shots).slice(0,5);
    const distinctTitles={};
    titleFights.forEach(({w,t})=>{ if(!distinctTitles[w.id]) distinctTitles[w.id]=new Set(); distinctTitles[w.id].add(t.id); });
    const topMulti=Object.entries(distinctTitles).map(([id,s])=>({id,n:s.size})).sort((a,b)=>b.n-a.n).slice(0,5);
    const defStreaks={};
    titleFights.slice().sort((a,b)=>new Date(a.ev.date)-new Date(b.ev.date)).forEach(({ft,w,l,t})=>{
      if(!defStreaks[t.id]) defStreaks[t.id]={best:0,cur:0,holderId:null,name:null,id:null};
      const d=defStreaks[t.id];
      if(d.holderId===w.id){ d.cur++; if(d.cur>d.best){d.best=d.cur;d.name=w.name;d.id=w.id;} }
      else { d.cur=0; d.holderId=w.id; }
    });
    const bestStreak=Object.values(defStreaks).sort((a,b)=>b.best-a.best)[0];
    const reignDays=[];
    STATE.fighters.forEach(f=>{(f.titleReigns||[]).forEach(r=>{
      const days=Math.round((new Date(r.lostDate||STATE.meta.currentDate)-new Date(r.wonDate))/86400000);
      if(days>0) reignDays.push({f,days,active:!r.lostDate});
    });});
    reignDays.sort((a,b)=>b.days-a.days);
    const maxDef=[];
    STATE.fighters.forEach(f=>{(f.titleReigns||[]).forEach(r=>{if((r.defenses||0)>0) maxDef.push({f,defs:r.defenses,isInterim:r.isInterim});});});
    maxDef.sort((a,b)=>b.defs-a.defs);
    const tblock=(ttl,entries,valFn,icon='')=>{
      const rows=entries.slice(0,6).map((x,i)=>{
        const f=STATE.fighters.find(ff=>ff.id===x.id);
        return f?`<tr class="clickable" data-id="${x.id}"><td>${i+1}</td><td><b>${f.name}</b></td><td><b>${valFn(x)}</b></td></tr>`:'';
      }).join('')||'<tr><td colspan="3" class="muted">Sin datos</td></tr>';
      return `<div class="card"><h3>${icon} ${ttl}</h3><table><tbody>${rows}</tbody></table></div>`;
    };
    const fmtTitleRec=(w,l,ft,label)=>{
      const method=ft.result.method, r=ft.result.round, t=ft.result.time;
      return `<div style="padding:3px 0">${label}: <b>${w.name}</b> def. ${l.name} · R${r} ${t}</div>`;
    };
    return [
      tblock('Más victorias en combates titulares',Object.entries(titleWins).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n),x=>x.n,'👑'),
      tblock('Más KO en combate titular',Object.entries(titleKoWins).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n),x=>x.n,'💥'),
      tblock('Más sumisiones en combate titular',Object.entries(titleSubWins).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n),x=>x.n,'🤼'),
      tblock('Más defensas en un solo reinado',maxDef.map(x=>({id:x.f.id,defs:x.defs})),x=>x.defs,'🛡️'),
      tblock('Reinado más largo (días)',reignDays.map(x=>({id:x.f.id,days:x.days,active:x.active})),x=>x.days+(x.active?' ⭐':''),'📅'),
      topMulti.filter(x=>x.n>1).length?tblock('Campeones en varias divisiones',topMulti.filter(x=>x.n>1),x=>x.n+' títulos','🌍'):'',
      frustratedShots.length?tblock('Más intentos sin ganar el título',frustratedShots.map(x=>({id:x.id,shots:x.shots})),x=>x.shots+' intentos','😤'):'',
      `<div class="card"><h3>⚡ Récords de tiempo en combates titulares</h3>
        <div style="font-size:.78rem">
          ${koT[0]?fmtTitleRec(koT[0].w,koT[0].l,koT[0].ft,'💥 KO más rápido'):''}
          ${subT[0]?fmtTitleRec(subT[0].w,subT[0].l,subT[0].ft,'🤼 Sub más rápida'):''}
          ${slowest&&slowest!==fastest?fmtTitleRec(slowest.w,slowest.l,slowest.ft,'🕐 Fin más tardío'):''}
          ${bestStreak&&bestStreak.best>0?'<div style="padding:3px 0">🛡️ Racha más larga: <b>'+bestStreak.name+'</b> · '+bestStreak.best+' consecutivas</div>':''}
          ${!koT[0]&&!subT[0]?'<p class="muted">Sin finalizaciones en combates titulares aún.</p>':''}
        </div>
      </div>`
    ].join('');
  })()}
  ${recordsSection}`;
}
function bindStats(){
  const sel = document.getElementById('statsDivSel');
  if(sel) sel.onchange=()=>{ UI.statsDiv = sel.value; render(); };
}

function tplActivity(){
  const list = STATE.fighters.filter(f=>f.status!=='retired').map(f=>{
    let lastDate=null, lastEvName=null;
    if(f.lastEventSeq!=null){
      const ev = STATE.events.find(e=>e.seq===f.lastEventSeq && e.status==='completed');
      if(ev){ lastDate=ev.date; lastEvName=ev.name; }
    }
    const daysSince = lastDate? Math.round((new Date(STATE.meta.currentDate)-new Date(lastDate))/86400000) : null;
    return {f, lastDate, lastEvName, daysSince};
  }).sort((a,b)=>(b.daysSince??99999)-(a.daysSince??99999));

  // Group by last event, with separators
  let rows='', lastEvSeen=null;
  for(const x of list){
    const evKey = x.lastEvName||'Sin peleas';
    if(evKey!==lastEvSeen){
      rows+=`<tr><td colspan="3" style="padding:6px 4px 2px;font-size:.7rem;color:var(--muted);background:var(--bg3);border-top:1px solid var(--line)">📅 ${evKey}${x.lastDate?' · '+fmtDate(x.lastDate):''}</td></tr>`;
      lastEvSeen=evKey;
    }
    rows+=`<tr class="clickable" data-id="${x.f.id}"><td>${x.f.name}${x.f.status==='injured'?' 🩹':''}${STATE.titles.some(t=>t.holderId===x.f.id)?' 🏆':''}</td><td>${x.lastDate?fmtDate(x.lastDate):'Nunca'}</td><td>${x.daysSince??'-'}</td></tr>`;
  }
  return `<div class="card"><h2>Actividad de peleadores</h2>
  <p class="muted">Agrupado por último evento. Útil para gestionar el cooldown de los peleadores.</p>
  <table><thead><tr><th>Nombre</th><th>Última pelea</th><th>Días</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ====================== 7. SCOUTING ====================== */
function tplScout(){
  const candidates=(STATE.scoutCandidates||[]).filter(c=>c.status==='free_agent');
  const freeAgents=STATE.fighters.filter(f=>f.status==='free_agent');
  const retired=STATE.fighters.filter(f=>f.status==='retired').sort((a,b)=>goatScore(b)-goatScore(a));

  const candCards = candidates.length? candidates.map(c=>`
    <div class="fightcard-item">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <b>${c.name}</b> <span class="muted">(${c.country}, ${ageFromDob(c.dob,STATE.meta.currentDate)} años)</span>
          <div style="font-size:.75rem;margin-top:2px">${c.record.wins}-${c.record.losses} en otras promotoras · ⭐ General: ${generalScore(c)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;font-size:.72rem">
            ${[['🥊',c.stats.striking,'Strik'],['💪',c.stats.power,'Poder'],['🤼',c.stats.wrestlingOff,'WOff'],['🛡️',c.stats.wrestlingDef,'WDef'],['🧠',c.stats.ground,'Suelo'],['❤️',c.stats.cardio,'Card'],['🪨',c.stats.chin,'Chin']].map(([ico,val,lbl])=>`<span style="color:${val>=85?'#66bb6a':val>=70?'#fff':'#aaa'}">${ico}${val}</span>`).join('')}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <select class="scoutDivSel" data-id="${c.id}" style="font-size:.75rem">
            ${DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('')}
          </select>
          <button class="btn primary small signBtn" data-id="${c.id}">Fichar</button>
        </div>
      </div>
      <div style="font-size:.7rem;color:var(--muted);margin-top:4px">Oferta expira: ${fmtDate(c._scoutExpires||STATE.meta.currentDate)}</div>
    </div>`).join('')
    : '<p class="muted">No hay candidatos activos. Los nuevos talentos aparecen automáticamente cada 3 eventos.</p>';

  const freeAgentCards = freeAgents.length? freeAgents.map(f=>`
    <div class="fightcard-item clickable" data-id="${f.id}">
      <b>${f.name}</b> <span class="muted">${f.record.wins}-${f.record.losses} · ${divName(f.division)}</span>
      <span class="pill" style="background:#555;float:right">Agente libre</span>
    </div>`).join('')
    : '<p class="muted">Ningún peleador cortado actualmente.</p>';

  const retiredCards = retired.length? retired.map(f=>`
    <div class="fightcard-item" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        <b>${f.name}</b> <span class="muted">${f.record.wins}-${f.record.losses} · ${ageFromDob(f.dob,STATE.meta.currentDate)} años</span>
        <div style="font-size:.73rem;color:#666;margin-top:1px">${divName(f.division)} · GOAT ${goatScore(f)} · General ${generalScore(f)}</div>
      </div>
      <button class="btn small unretireBtn" data-id="${f.id}" style="white-space:nowrap;flex-shrink:0">↩ Volver</button>
    </div>`).join('')
    : '<p class="muted">No hay peleadores retirados.</p>';

  return `
  <div class="card">
    <h2>🔍 Scouting & Gestión</h2>
    <p class="muted">Ficha nuevos talentos, gestiona agentes libres y trae de vuelta a leyendas retiradas.</p>
    <button class="btn full" id="refreshScout">🔄 Buscar nuevos candidatos (consume turno narrativo)</button>
  </div>
  <div class="card">
    <h3>Candidatos disponibles (${candidates.length})</h3>
    ${candCards}
  </div>
  <div class="card">
    <h3>Agentes libres del roster (${freeAgents.length})</h3>
    ${freeAgentCards}
  </div>
  <div class="card">
    <h3>🏛️ Traer de vuelta peleadores retirados (${retired.length})</h3>
    <p class="muted" style="font-size:.78rem">El peleador volverá como activo con sus stats y récord intactos.</p>
    ${retiredCards}
  </div>`;
}

function bindScout(){
  document.querySelectorAll('.signBtn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const c=STATE.scoutCandidates.find(x=>x.id===btn.dataset.id)||STATE.fighters.find(x=>x.id===btn.dataset.id);
      if(!c) return;
      const divSel=document.querySelector(`.scoutDivSel[data-id="${btn.dataset.id}"]`);
      const divId=divSel?divSel.value:(c.division||DIVISIONS[0].id);
      c.division=divId; c.status='active'; c._scoutExpires=null;
      if(!STATE.fighters.find(x=>x.id===c.id)) STATE.fighters.push(c);
      STATE.scoutCandidates=(STATE.scoutCandidates||[]).filter(x=>x.id!==c.id);
      if(!c.debut) c.debut=STATE.meta.currentDate;
      logEvent(`✅ ${c.name} fichado para ${divName(divId)}.`);
      saveLocal(); render(); toast(`${c.name} fichado ✅`);
    };
  });
  document.querySelectorAll('.unretireBtn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const f=STATE.fighters.find(x=>x.id===btn.dataset.id);
      if(!f) return;
      f.status='active'; f.injury={active:false,untilDate:null,note:''};
      logEvent(`🔄 ${f.name} vuelve de su retiro y regresa a la competición.`);
      saveLocal(); render(); toast(`${f.name} ha vuelto del retiro ✅`);
    };
  });
  const refreshBtn=document.getElementById('refreshScout');
  if(refreshBtn) refreshBtn.onclick=()=>{ generateScoutCandidates(); saveLocal(); render(); toast('Nuevos candidatos generados 🔍'); };
}

/* ====================== EDITOR DE RANKINGS MANUALES ====================== */
function tplRankEditor(){
  const scope = UI.rankEditScope || 'P4P';
  const isP4P = scope==='P4P';
  const pool = isP4P
    ? STATE.fighters.filter(f=>f.status==='active' || f.status==='injured')
    : STATE.fighters.filter(f=>f.division===scope && f.status!=='retired');
  const sorted = pool.slice().sort((a,b)=>{
    const am = isP4P? a.manualRankP4P : a.manualRankDivision;
    const bm = isP4P? b.manualRankP4P : b.manualRankDivision;
    if(am!=null && bm!=null) return am-bm;
    if(am!=null) return -1;
    if(bm!=null) return 1;
    return b.rankScore-a.rankScore;
  }).slice(0,20);

  return `
  <h3>📊 Editar rankings (manual)</h3>
  <p class="muted">Fija a mano la posición de un peleador en el P4P o en el ranking de su categoría. Deja el campo vacío para que vuelva a calcularse automáticamente.</p>
  <select id="rankEditScopeSel">
    <option value="P4P" ${isP4P?'selected':''}>Pound-for-Pound</option>
    ${DIVISIONS.map(d=>`<option value="${d.id}" ${scope===d.id?'selected':''}>${divName(d.id)}</option>`).join('')}
  </select>
  <table style="margin-top:8px"><thead><tr><th>#</th><th>Nombre</th><th>Score auto</th><th>Posición manual</th></tr></thead><tbody>
  ${sorted.map((f,i)=>{
    const manual = isP4P? f.manualRankP4P : f.manualRankDivision;
    return `<tr>
      <td>${i+1}</td>
      <td>${f.name}${championBadge(f.id)}</td>
      <td class="muted">${f.rankScore.toFixed(1)}</td>
      <td><input type="number" min="1" max="20" class="rankPosInput" data-fid="${f.id}" value="${manual??''}" placeholder="auto" style="width:70px;margin:0"></td>
    </tr>`;
  }).join('')}
  </tbody></table>
  <div class="row" style="margin-top:8px">
    <button class="btn primary full" id="saveRankPositions">💾 Guardar posiciones</button>
    <button class="btn danger full" id="clearRankPositions">Quitar todas las fijaciones de esta lista</button>
  </div>
  `;
}
function bindRankEditor(){
  const scopeSel = document.getElementById('rankEditScopeSel');
  if(!scopeSel) return;
  scopeSel.onchange = ()=>{ UI.rankEditScope = scopeSel.value; render(); };

  document.getElementById('saveRankPositions').onclick=()=>{
    const isP4P = (UI.rankEditScope||'P4P')==='P4P';
    document.querySelectorAll('.rankPosInput').forEach(inp=>{
      const f = STATE.fighters.find(x=>x.id===inp.dataset.fid);
      if(!f) return;
      const v = inp.value.trim();
      const pos = v===''? null : clamp(parseInt(v)||1,1,99);
      if(isP4P) f.manualRankP4P = pos; else f.manualRankDivision = pos;
    });
    refreshRankings(); saveLocal(); render(); toast('Posiciones de ranking guardadas ✅');
  };
  document.getElementById('clearRankPositions').onclick=()=>{
    const isP4P = (UI.rankEditScope||'P4P')==='P4P';
    STATE.fighters.forEach(f=>{ if(isP4P) f.manualRankP4P=null; else f.manualRankDivision=null; });
    refreshRankings(); saveLocal(); render(); toast('Fijaciones eliminadas, ranking automático restaurado');
  };
}

function bindEditor(){
  document.getElementById('editFighterSel').onchange=e=>{ UI.selectedFighter=e.target.value||null; render(); };
  bindRankEditor();

  // Guardar datos básicos del peleador
  document.getElementById('saveFighterBtn').onclick=()=>{
    const get=id=>document.getElementById(id).value;
    const stats={}; STAT_KEYS.forEach(([k])=> stats[k]=clamp(parseInt(document.getElementById('fld_stat_'+k).value)||50,1,99));
    let f = UI.selectedFighter? STATE.fighters.find(x=>x.id===UI.selectedFighter): null;
    if(!f){ f = {id:uid('F'), fightHistory:[], titleReigns:[], bonuses:{fightOfNight:0,performanceOfNight:0}, injury:{active:false,untilDate:null,note:''}, lastEventSeq:null, rankScore:0}; STATE.fighters.push(f); }
    f.name=get('fld_name'); f.nickname=get('fld_nick')||null; f.gender=get('fld_gender'); f.country=get('fld_country');
    f.dob=get('fld_dob'); f.debut=get('fld_debut'); f.division=get('fld_division'); f.status=get('fld_status');
    f.imageUrl = get('fld_image').trim()||null;
    f.fightStyle = get('fld_style')||'technical';
    f.stats=stats; f.longevity=clamp(parseInt(get('fld_longevity'))||0,0,100);
    f.chinDamage=clamp(parseInt(get('fld_chinDamage'))||0,0,30);
    f.momentum=clamp(parseInt(get('fld_momentum'))||0,0,10);
    f.reputation=clamp(parseInt(get('fld_reputation'))||50,0,100);
    f.record = {
      wins: parseInt(get('fld_w'))||0, losses: parseInt(get('fld_l'))||0, draws: parseInt(get('fld_dr'))||0, nc: f.record?f.record.nc:0,
      koWins: parseInt(get('fld_kow'))||0, subWins: parseInt(get('fld_subw'))||0, decWins: parseInt(get('fld_decw'))||0,
      koLosses: parseInt(get('fld_kol'))||0, subLosses: parseInt(get('fld_subl'))||0, decLosses: parseInt(get('fld_decl'))||0,
      ufcFights: parseInt(get('fld_ufcfights'))||0,
      ufcWins: parseInt(get('fld_ufcwins'))||0,
      ufcLosses: parseInt(get('fld_ufclosses'))||0,
      ufcKoWins: parseInt(get('fld_ufckow'))||0,
      ufcSubWins: parseInt(get('fld_ufcsubw'))||0,
      ufcDecWins: parseInt(get('fld_ufcdecw'))||0,
      ufcKoLosses: parseInt(get('fld_ufckol'))||0,
      ufcSubLosses: parseInt(get('fld_ufcsubl'))||0,
      ufcDecLosses: parseInt(get('fld_ufcdecl'))||0
    };
    f.hof = document.getElementById('fld_hof').checked;
    if(f.status==='injured' && !f.injury.active){ f.injury={active:true, untilDate:addDays(STATE.meta.currentDate,60), note:'Editado manualmente'}; }
    if(f.status!=='injured'){ f.injury.active=false; }
    refreshRankings(); saveLocal(); UI.selectedFighter=f.id; render(); toast('Peleador guardado ✅');
  };

  const delBtn=document.getElementById('deleteFighterBtn');
  if(delBtn) delBtn.onclick=()=>{
    if(!confirm('¿Eliminar este peleador definitivamente?')) return;
    STATE.fighters = STATE.fighters.filter(x=>x.id!==UI.selectedFighter);
    UI.selectedFighter=null; saveLocal(); render(); toast('Peleador eliminado');
  };

  // Guardar bonos
  const saveBonusesBtn = document.getElementById('saveBonusesBtn');
  if(saveBonusesBtn) saveBonusesBtn.onclick=()=>{
    const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
    f.bonuses.fightOfNight = parseInt(document.getElementById('fld_fotn').value)||0;
    f.bonuses.performanceOfNight = parseInt(document.getElementById('fld_potn').value)||0;
    saveLocal(); toast('Bonos guardados ✅');
  };

  // Reinados: guardar individual
  document.querySelectorAll('[data-savereign]').forEach(btn=>{
    btn.onclick=()=>{
      const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
      const idx = parseInt(btn.dataset.savereign);
      const r = f.titleReigns[idx]; if(!r) return;
      r.wonDate = document.getElementById(`reign_won_${idx}`).value || r.wonDate;
      r.lostDate = document.getElementById(`reign_lost_${idx}`).value || null;
      r.defenses = parseInt(document.getElementById(`reign_def_${idx}`).value)||0;
      r.isInterim = document.getElementById(`reign_interim_${idx}`).value==='1';
      // Sincronizar titular del cinturón: si lostDate es null, este peleador es el campeón actual
      syncTitleHolder(f, r);
      rebuildTitleHistory(r.titleId);
      saveLocal(); render(); toast('Reinado guardado ✅');
    };
  });

  // Reinados: eliminar
  document.querySelectorAll('[data-delreign]').forEach(btn=>{
    btn.onclick=()=>{
      const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
      const idx = parseInt(btn.dataset.delreign);
      const r = f.titleReigns[idx];
      let affectedTitleId = r? r.titleId : null;
      if(r){
        // Si era el campeón vigente, vacar el cinturón
        const title = STATE.titles.find(t=>t.id===r.titleId);
        if(title && title.holderId===f.id && !r.lostDate){ title.holderId=null; title.isInterim=false; }
      }
      f.titleReigns.splice(idx,1);
      if(affectedTitleId) rebuildTitleHistory(affectedTitleId);
      saveLocal(); render(); toast('Reinado eliminado');
    };
  });

  // Reinados: añadir nuevo
  const addReignBtn = document.getElementById('addReignBtn');
  if(addReignBtn) addReignBtn.onclick=()=>{
    const f = STATE.fighters.find(x=>x.id===UI.selectedFighter); if(!f) return;
    const titleId = document.getElementById('newReign_title').value;
    const wonDate = document.getElementById('newReign_won').value || STATE.meta.currentDate;
    const lostDate = document.getElementById('newReign_lost').value || null;
    const defenses = parseInt(document.getElementById('newReign_def').value)||0;
    const isInterim = document.getElementById('newReign_interim').value==='1';
    if(!titleId) return toast('Selecciona un título');
    const newReign = {titleId, wonDate, lostDate, defenses, isInterim};
    f.titleReigns = f.titleReigns||[];
    f.titleReigns.push(newReign);
    syncTitleHolder(f, newReign);
    rebuildTitleHistory(titleId);
    saveLocal(); render(); toast('Reinado añadido ✅');
  };

  // Gestión directa de titulares
  document.querySelectorAll('[data-setrec]').forEach(btn=>{
    btn.onclick=()=>{
      const key = btn.dataset.setrec;
      const fid = document.getElementById(`rec_fighter_${key}`).value;
      const timeStr = document.getElementById(`rec_time_${key}`).value.trim(); // e.g. "R1 0:15"
      if(!fid || !timeStr) return toast('Selecciona peleador y tiempo');
      const m = timeStr.match(/R(\d)\s*(\d+):(\d+)/);
      if(!m) return toast('Formato: R1 0:15');
      const round=parseInt(m[1]), mins=parseInt(m[2]), secs=parseInt(m[3]);
      const totalSecs = (round-1)*300 + mins*60 + secs;
      STATE.records = STATE.records||{};
      STATE.records[key] = {fighterId:fid, secs:totalSecs, round, time:`${mins}:${String(secs).padStart(2,'0')}`, opponentId:null, date:STATE.meta.currentDate};
      saveLocal(); render(); toast(`Récord ${key} guardado ✅`);
    };
  });

  document.querySelectorAll('[data-settitle]').forEach(btn=>{
    btn.onclick=()=>{
      const titleId = btn.dataset.settitle;
      const title = STATE.titles.find(t=>t.id===titleId); if(!title) return;
      const newHolderId = document.getElementById(`titleHolder_${titleId}`).value||null;
      const newInterim = document.getElementById(`titleInterim_${titleId}`).checked;
      // Cerrar reinado del campeón anterior si existe
      if(title.holderId && title.holderId!==newHolderId){
        const prev = STATE.fighters.find(x=>x.id===title.holderId);
        if(prev){ const r=(prev.titleReigns||[]).find(rr=>rr.titleId===titleId&&!rr.lostDate); if(r) r.lostDate=STATE.meta.currentDate; }
      }
      title.holderId = newHolderId;
      title.isInterim = newInterim;
      // Si hay nuevo campeón, abrir o añadir un reinado sin fecha de pérdida
      let nf = null;
      if(newHolderId){
        nf = STATE.fighters.find(x=>x.id===newHolderId);
        if(nf){
          const existing = (nf.titleReigns||[]).find(r=>r.titleId===titleId&&!r.lostDate);
          if(!existing){
            nf.titleReigns = nf.titleReigns||[];
            const wonDate = STATE.meta.currentDate;
            nf.titleReigns.push({titleId, wonDate, lostDate:null, defenses:0, isInterim:newInterim});
          } else {
            existing.isInterim = newInterim;
          }
        }
        logEvent(`🏆 ${nf?nf.name:'?'} asignado como ${newInterim?'campeón interino':'campeón'} de ${title.name} (Editor).`);
      } else {
        logEvent(`⚠️ ${title.name} vacado desde el Editor.`);
      }
      rebuildTitleHistory(titleId);
      saveLocal(); render(); toast('Titular actualizado ✅');
    };
  });

  document.getElementById('delEventBtn').onclick=()=>{
    const id=document.getElementById('delEventSel').value; if(!id) return;
    const ev=STATE.events.find(x=>x.id===id); if(!ev) return;
    const isPending = ev.status!=='completed';
    const msg = isPending
      ? `¿Eliminar el evento "${ev.name}"? (no tiene resultados, se borrará sin efectos)`
      : `⚠️ ¿Eliminar "${ev.name}" y REVERTIR todos sus resultados?\n\nEsto deshará: victorias, derrotas, KOs, sumisiones, cambios de título, bonos FOTN/POTN.\nEsta acción no se puede deshacer.`;
    if(!confirm(msg)) return;
    if(ev.status==='completed') revertEvent(ev);
    STATE.events = STATE.events.filter(x=>x.id!==id);
    refreshRankings(); saveLocal(); render(); toast('Evento eliminado');
  };
  document.getElementById('applyJson').onclick=()=>{
    try{
      const parsed = JSON.parse(document.getElementById('rawJson').value);
      STATE = parsed; saveLocal(); render(); toast('Estado aplicado desde JSON');
    }catch(e){ toast('JSON inválido: '+e.message, 4000); }
  };
  document.getElementById('refreshJson').onclick=()=> render();
}

// Sincroniza el titular de un cinturón cuando se edita un reinado
function syncTitleHolder(fighter, reign){
  const title = STATE.titles.find(t=>t.id===reign.titleId); if(!title) return;
  if(!reign.lostDate){
    if(reign.isInterim){
      // Reinado interino activo → asignar interimHolderId (no tocar holderId)
      title.interimHolderId = fighter.id;
    } else {
      // Reinado principal activo → cerrar reinado anterior si era otro
      if(title.holderId && title.holderId!==fighter.id){
        const prev = STATE.fighters.find(x=>x.id===title.holderId);
        if(prev){ const r=(prev.titleReigns||[]).find(rr=>rr.titleId===reign.titleId&&!rr.isInterim&&!rr.lostDate); if(r) r.lostDate=STATE.meta.currentDate; }
      }
      title.holderId = fighter.id;
    }
  } else {
    // Reinado cerrado
    if(!reign.isInterim && title.holderId===fighter.id) title.holderId=null;
    if(reign.isInterim && title.interimHolderId===fighter.id) title.interimHolderId=null;
  }
}

function rebuildTitleHistory(titleId){
  const title = STATE.titles.find(t=>t.id===titleId); if(!title) return;
  const entries = [];
  let activeHolder = null, activeInterim = null;
  STATE.fighters.forEach(f=>{
    (f.titleReigns||[]).filter(r=>r.titleId===titleId).forEach(r=>{
      entries.push({fighterId:f.id, wonEventId:null, wonDate:r.wonDate, isInterim:r.isInterim||false});
      if(!r.lostDate){ if(r.isInterim) activeInterim=f.id; else activeHolder=f.id; }
    });
  });
  entries.sort((a,b)=> new Date(a.wonDate)-new Date(b.wonDate));
  title.history = entries;
  title.holderId = activeHolder;
  title.interimHolderId = activeInterim;
  const div = STATE.divisions.find(d=>d.id===title.divisionId);
  if(div) div.championId = activeHolder;
}

function tplSettings(){
  const cfg=getCfg();
  return `

    <label>Usuario/Organización</label><input id="cfgOwner" value="${cfg.owner||''}" placeholder="tu-usuario">

    <label>Rama</label><input id="cfgBranch" value="${cfg.branch||'main'}">
    <label>Ruta del fichero</label><input id="cfgPath" value="${cfg.path||'data/state.json'}">
    <label>Personal Access Token</label><input id="cfgToken" type="password" value="${cfg.token||''}" placeholder="ghp_xxxxx...">
    <button class="btn full" id="saveCfg">Guardar configuración</button>
    <div class="row" style="margin-top:10px">
      <button class="btn primary full" id="pushBtn">⬆ Guardar partida en GitHub</button>
      <button class="btn full" id="pullBtn">⬇ Cargar partida desde GitHub</button>
    </div>
    <p class="muted" id="ghStatus"></p>
  </div>
  <div class="card">
    <h3>Datos locales</h3>
    <div class="row">
      <button class="btn full" id="newGameBtn">🔄 Nueva partida (resetear con 2 por categoría)</button>

    </div>
    ${typeof INITIAL_STATE!=='undefined'&&INITIAL_STATE?`
    <div style="margin-top:10px;padding:10px;background:rgba(183,28,28,.12);border:1px solid rgba(183,28,28,.4);border-radius:8px">
      <div style="font-size:.82rem;font-weight:700;margin-bottom:4px">⚠️ Restablecer partida al estado inicial</div>
      <p class="muted" style="margin-bottom:8px">Elimina todo lo simulado (eventos, resultados, rankings, historial) y vuelve exactamente al JSON inicial cargado. Esta acción no se puede deshacer.</p>
      <button class="btn danger full" id="resetToInitialBtn">🗑️ Volver al estado inicial del JSON</button>

function bindSettings(){
  document.getElementById('saveCfg').onclick=()=>{
    setCfg({owner:val('cfgOwner'),repo:val('cfgRepo'),branch:val('cfgBranch')||'main',path:val('cfgPath')||'data/state.json',token:val('cfgToken')});
    toast('Configuración guardada');
  };
  function val(id){return document.getElementById(id).value.trim();}
  document.getElementById('pushBtn').onclick=async()=>{
    const cfg=getCfg(); const status=document.getElementById('ghStatus');
    if(!cfg.owner||!cfg.repo||!cfg.token){ status.textContent='Falta configuración (usuario/repo/token).'; return; }
    status.textContent='Guardando...';
    try{
      const apiUrl=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
      let sha=null;
      const getRes = await fetch(apiUrl+`?ref=${cfg.branch}`, {headers:{Authorization:`token ${cfg.token}`}});
      if(getRes.status===200){ const j=await getRes.json(); sha=j.sha; }
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(STATE,null,1))));
      const putRes = await fetch(apiUrl, {
        method:'PUT', headers:{Authorization:`token ${cfg.token}`, 'Content-Type':'application/json'},
        body: JSON.stringify({message:`Guardado partida ${STATE.meta.currentDate}`, content, sha: sha||undefined, branch:cfg.branch})
      });
      if(putRes.ok){ status.textContent='✅ Guardado correctamente en GitHub.'; toast('Partida guardada en GitHub'); }
      else { const e=await putRes.json(); status.textContent='❌ Error: '+(e.message||putRes.status); }
    }catch(e){ status.textContent='❌ Error de red: '+e.message; }
  };
  document.getElementById('pullBtn').onclick=async()=>{
    const cfg=getCfg(); const status=document.getElementById('ghStatus');
    if(!cfg.owner||!cfg.repo){ status.textContent='Falta configuración (usuario/repo).'; return; }
    status.textContent='Cargando...';
    try{
      const raw=`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/${cfg.path}`;
      const res = await fetch(raw+`?t=${Date.now()}`);
      if(!res.ok){ status.textContent='❌ No se encontró el fichero en el repo.'; return; }
      const json = await res.json();
      STATE=json; saveLocal(); render();
      status.textContent='✅ Partida cargada desde GitHub.'; toast('Partida cargada');
    }catch(e){ status.textContent='❌ Error: '+e.message; }
  };
  document.getElementById('newGameBtn').onclick=()=>{
    if(!confirm('Esto borrará tu partida actual y generará 2 peleadores por categoría. ¿Continuar?')) return;
    STATE=freshState(); seedFighters(); render(); toast('Nueva partida generada');
  };
  document.getElementById('exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify(STATE,null,1)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ufc_state.json'; a.click();
  };
  const resetBtn=document.getElementById('resetToInitialBtn');
  if(resetBtn) resetBtn.onclick=()=>{
    if(!confirm('⚠️ Esto eliminará TODA la partida simulada (eventos, resultados, historial, rankings) y volverá al estado del JSON inicial.\n\nSe perderá todo el progreso. ¿Estás seguro?')) return;
    localStorage.removeItem(LS_KEY);
    STATE=freshState();
    seedFighters();
    UI.tab='dashboard';
    render();
    toast('Partida restablecida al estado inicial ✅');
  };
}

/* ====================== INIT ====================== */
async function init(){
  const local = loadLocal();
  if(local){
    STATE=local;
    // Migración: eliminar cualquier peleador femenino que pudiera haberse guardado en versiones anteriores
    const before=STATE.fighters.length;
    STATE.fighters=STATE.fighters.filter(f=>f.gender!=='F' && !String(f.division||'').startsWith('W_'));
    if(STATE.fighters.length<before) console.log(`Migración: eliminados ${before-STATE.fighters.length} peleadores femeninos del estado guardado.`);
  } else {
    STATE=freshState();
    seedFighters();
  }
  // Si no hay ningún evento completado, resetear momentum a 0 para todos (estado inicial limpio)
  if(!STATE.events.filter(e=>e.status==='completed').length){
    STATE.fighters.forEach(f=>{ f.momentum=0; });
  }
  // Garantizar snapshot inicial para el gráfico de evolución de atributos
  if(!STATE.statsHistory) STATE.statsHistory={};
  STATE.fighters.forEach(f=>{
    if(!STATE.statsHistory[f.id]||STATE.statsHistory[f.id].length===0)
      saveStatSnapshot(f, STATE.meta?.currentDate||new Date().toISOString().slice(0,10), 'Inicio');
  });
  refreshRankings();

  // Delegado global: cualquier elemento con [data-id] abre el perfil del peleador.
  // Funciona en TODAS las pestañas sin necesidad de enlazar manualmente cada render.
  document.addEventListener('click', e=>{
    const el = e.target.closest('[data-id]');
    if(!el) return;
    // Ignorar elementos que tienen su propio handler especial (botones de acción)
    if(el.tagName==='BUTTON' || el.tagName==='SELECT' || el.tagName==='INPUT') return;
    if(el.classList.contains('signBtn') || el.classList.contains('clearRematch')) return;
    const fid = el.dataset.id;
    if(fid && STATE.fighters.find(f=>f.id===fid)){
      openFighterModal(fid);
    }
  });

  render();
}
init();
</script>
