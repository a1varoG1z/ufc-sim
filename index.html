<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>UFC Owner Sim</title>
<style>
  :root{
    --bg:#0c0d10; --bg2:#15171c; --bg3:#1d2027; --line:#2a2e38;
    --red:#d7263d; --red2:#a81f31; --gold:#e3b341; --green:#3fbf6f; --blue:#4d9de0;
    --txt:#e9e9ee; --txt2:#9aa0ad; --txt3:#666c79;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  body{padding-bottom:64px;}
  h1,h2,h3,h4{margin:.3em 0; font-weight:700;}
  h1{font-size:1.3rem} h2{font-size:1.1rem} h3{font-size:1rem} h4{font-size:.9rem;color:var(--txt2)}
  a{color:var(--blue)}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg2),var(--bg2) 90%,transparent);
    padding:10px 12px 6px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .topbar .brand{font-weight:800;letter-spacing:.5px;color:var(--red)}
  .topbar .date{font-size:.8rem;color:var(--txt2)}
  .container{padding:10px 10px 90px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .card.tight{padding:8px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row > *{flex:1}
  .btn{display:inline-block;background:var(--bg3);border:1px solid var(--line);color:var(--txt);
    padding:9px 12px;border-radius:9px;font-size:.85rem;cursor:pointer;text-align:center;user-select:none}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--red);border-color:var(--red2);color:#fff;font-weight:700}
  .btn.green{background:#1f3d2c;border-color:var(--green);color:var(--green)}
  .btn.gold{background:#3a2f12;border-color:var(--gold);color:var(--gold)}
  .btn.small{padding:5px 9px;font-size:.75rem}
  .btn.full{width:100%}
  .btn.danger{background:#3a1414;border-color:var(--red);color:#ff8a8a}
  .btn[disabled]{opacity:.35;pointer-events:none}
  input,select,textarea{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:8px;font-size:.85rem;width:100%;margin:3px 0;font-family:inherit}
  label{font-size:.75rem;color:var(--txt2);display:block;margin-top:6px}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th,td{padding:6px 4px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--txt2);font-weight:600;font-size:.72rem;text-transform:uppercase}
  tr.clickable{cursor:pointer}
  tr.clickable:active{background:var(--bg3)}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:700;background:var(--bg3);border:1px solid var(--line)}
  .pill.champ{background:#3a2f12;color:var(--gold);border-color:var(--gold)}
  .pill.interim{background:#2a2640;color:#b79bff;border-color:#7d5fff}
  .pill.retired{background:#2a2a2a;color:#888}
  .pill.injured{background:#3a1414;color:#ff8a8a;border-color:#b44}
  .pill.hof{background:#102a3a;color:#6fc8ff;border-color:#3a7da8}
  .muted{color:var(--txt2);font-size:.78rem}
  .tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--line);
    position:sticky;top:46px;z-index:19}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:7px 12px;border-radius:99px;background:var(--bg3);font-size:.78rem;white-space:nowrap;border:1px solid var(--line)}
  .tab.active{background:var(--red);border-color:var(--red2);color:#fff;font-weight:700}
  .statbar{height:6px;border-radius:99px;background:var(--bg3);overflow:hidden;margin-top:2px}
  .statbar i{display:block;height:100%;background:var(--blue)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .fightcard-item{border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:6px;background:var(--bg3)}
  .vs{font-weight:800;color:var(--red);text-align:center;font-size:.75rem}
  .log{font-size:.78rem;color:var(--txt2);max-height:220px;overflow-y:auto;border-top:1px solid var(--line);padding-top:6px}
  .log div{margin-bottom:4px}
  .closebtn{position:absolute;top:10px;right:10px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end}
  .modal{background:var(--bg2);width:100%;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:14px;position:relative;border-top:1px solid var(--line)}
  .badge-row{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
  .section-title{display:flex;justify-content:space-between;align-items:center}
  textarea.code{font-family:monospace;font-size:.72rem;min-height:300px;white-space:pre}
  .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);
    padding:8px 14px;border-radius:10px;font-size:.8rem;z-index:99;max-width:90vw;text-align:center}
  .fighterImg{display:block;max-width:200px;width:100%;margin:0 auto 10px;border-radius:12px;border:1px solid var(--line);background:var(--bg3);object-fit:cover;object-position:50% 8%}
  .hofBadge{background:linear-gradient(90deg,#7a5c00,#d4af37,#7a5c00);color:#1a1300;font-weight:800;text-align:center;
    padding:8px 10px;border-radius:8px;margin:6px 0 10px;letter-spacing:.5px;font-size:.85rem;box-shadow:0 0 12px rgba(212,175,55,.5)}
  /* Fight Viewer */
  .fv-matchup{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0}
  .fv-fighter{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
  .fv-avatar{margin-bottom:4px}
  .fv-name{font-weight:700;font-size:1rem;line-height:1.2}
  .fv-winner{color:var(--gold)}
  .fv-vs{font-size:1.4rem;font-weight:900;color:var(--muted);flex:0 0 auto}
  .fv-win-badge{background:var(--gold);color:#1a1300;font-weight:800;font-size:.7rem;padding:2px 8px;border-radius:20px;margin-top:4px}
  .fv-loss-badge{background:var(--bg3);color:var(--muted);font-size:.7rem;padding:2px 8px;border-radius:20px;margin-top:4px}
  .fv-winner-line{text-align:center;padding:8px;background:var(--bg3);border-radius:8px;margin-top:4px}
</style>
</head>

/* ====================== UTILIDADES ====================== */
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9);}
function rand(min,max){return Math.random()*(max-min)+min;}
function randi(min,max){return Math.floor(rand(min,max+1));}
function pick(arr){return arr[randi(0,arr.length-1)];}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmtDate(d){ if(!d) return '-'; const dt=new Date(d); return dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});}
function addDays(dateStr,days){ const d=new Date(dateStr); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10);}
function ageFromDob(dob, ref){ const a=new Date(ref); const b=new Date(dob); let age=a.getFullYear()-b.getFullYear(); const m=a.getMonth()-b.getMonth(); if(m<0||(m===0&&a.getDate()<b.getDate())) age--; return age;}
function toast(msg,ms=2400){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),ms);}
function divName(id){ const d=DIVISIONS.find(x=>x.id===id); return d? d.name : id; }

function makeFighter(divisionId, gender){
  const first = pick(FIRST_M);
  const last = pick(LAST);
  const age = randi(22,33);
  const dob = `${2026-age}-${String(randi(1,12)).padStart(2,'0')}-${String(randi(1,28)).padStart(2,'0')}`;
  const debutYearsAgo = randi(2,9);
  const debut = `${2026-debutYearsAgo}-0${randi(1,9)}-1${randi(0,9)}`;
  const stats = {};
  STAT_KEYS.forEach(([k])=> stats[k]=randi(45,88));
  // un par de fighters con algo de tope alto para que el roster tenga variedad
  if(Math.random()<0.3){ const boost=pick(STAT_KEYS)[0]; stats[boost]=clamp(stats[boost]+randi(8,14),1,99); }
  return {
    id: uid('F'),
    name: `${first} ${last}`,
    nickname: pick(NICK_POOL),
    gender, country: pick(COUNTRIES),
    dob, debut,
    division: divisionId,
    stats,
    longevity: randi(82,100),
    status:'active', // active | retired | injured
    injury:{active:false, untilDate:null, note:''},
    record:{wins:0,losses:0,draws:0,nc:0,koWins:0,subWins:0,decWins:0,koLosses:0,subLosses:0,decLosses:0,ufcFights:0,ufcWins:0,ufcLosses:0,ufcKoWins:0,ufcSubWins:0,ufcDecWins:0,ufcKoLosses:0,ufcSubLosses:0,ufcDecLosses:0},

    titleReigns:[], // {titleId, wonDate, lostDate, defenses}

    hof:false,

  };
}

const TIER_RANGES = {
  legend:[78,95], elite:[74,90], contender:[65,82], veteran:[60,78]
};

function makeRealFighter(rf){
  const range = TIER_RANGES[rf.tier]||[60,80];
  const stats={};
  STAT_KEYS.forEach(([k])=> stats[k]=randi(range[0],range[1]));
  const longevity = rf.status==='retired'? randi(0,25) : randi(55,100);
  return {
    id: uid('F'), name:rf.name, nickname:rf.nickname, gender:rf.gender, country:rf.country,
    dob:rf.dob, debut:rf.debut, division:rf.division, stats, longevity,
    status: rf.status==='retired'?'retired':'active',
    injury:{active:false, untilDate:null, note:''},

    bonuses:{fightOfNight:0, performanceOfNight:0},
    titleReigns:[], fightHistory:[], lastEventSeq:null,
    hof: false,
    rankScore:0,
    _tier: rf.tier
  };
}

function seedFighters(){
  if(typeof INITIAL_STATE!=='undefined' && INITIAL_STATE){
    // Cargar el estado importado por el usuario (peleadores reales con récord, peleas UFC y campeones)
    const imported = JSON.parse(JSON.stringify(INITIAL_STATE));
    STATE.fighters = imported.fighters;
    STATE.titles = imported.titles;
    STATE.divisions = imported.divisions;
    STATE.meta = {...STATE.meta, ...imported.meta};
    if(imported.records) STATE.records = imported.records;
    STATE.rivalries = imported.rivalries || {};
    STATE.rematches = imported.rematches || {};
    STATE.atpPoints = imported.atpPoints || {};
    STATE.rankingHistory = imported.rankingHistory || [];
    STATE.statsHistory = imported.statsHistory || {};
    STATE.milestonesReached = imported.milestonesReached || [];
    STATE.newsLog = imported.newsLog || [];
    // saneo: asegurar que todo peleador tiene los campos nuevos (ufcFights, imageUrl)
    STATE.fighters.forEach(f=>{
      f.record = f.record || {};
      if(f.record.ufcFights==null) f.record.ufcFights = (f.record.wins||0)+(f.record.losses||0)+(f.record.draws||0)+(f.record.nc||0);
      if(f.record.ufcWins==null) f.record.ufcWins = Math.min(f.record.wins||0, f.record.ufcFights);
      if(f.record.ufcLosses==null) f.record.ufcLosses = Math.min(f.record.losses||0, Math.max(0,f.record.ufcFights-f.record.ufcWins));
      if(f.record.ufcKoWins==null) f.record.ufcKoWins = f.record.koWins||0;
      if(f.record.ufcSubWins==null) f.record.ufcSubWins = f.record.subWins||0;
      if(f.record.ufcDecWins==null) f.record.ufcDecWins = f.record.decWins||0;
      if(f.record.ufcKoLosses==null) f.record.ufcKoLosses = f.record.koLosses||0;
      if(f.record.ufcSubLosses==null) f.record.ufcSubLosses = f.record.subLosses||0;
      if(f.record.ufcDecLosses==null) f.record.ufcDecLosses = f.record.decLosses||0;
      if(f.imageUrl===undefined) f.imageUrl = null;
      // Asignar estilo de pelea si no lo tiene
      if(!f.fightStyle) f.fightStyle = FIGHTER_STYLES[f.name] || 'technical';
      // Daño acumulado de KO en la carrera (afecta al chin efectivo en simulación)
      if(f.chinDamage==null) f.chinDamage = Math.min((f.record.ufcKoLosses||0)*2, 15);
      // Racha empieza siempre en 0 al cargar el estado inicial
      f.momentum = 0;
    });
  } else {
    STATE.fighters = REAL_FIGHTERS.map(makeRealFighter);
  }
  // si alguna categoría se quedara con menos de 2 peleadores, se completa con generados aleatoriamente
  DIVISIONS.forEach(div=>{
    const count = STATE.fighters.filter(f=>f.division===div.id).length;
    for(let i=count;i<2;i++) STATE.fighters.push(makeFighter(div.id, div.gender));
  });
  // asegurar que existen los títulos de división + BMF (por si el estado importado no los trae todos)
  DIVISIONS.forEach(d=>{
    if(!STATE.titles.find(t=>t.divisionId===d.id)){
      STATE.titles.push({id: uid('T'), name: `Cinturón de ${divName(d.id)}`, divisionId:d.id, holderId:null, interimHolderId:null, isInterim:false, history:[]});
    }
  });
  if(!STATE.titles.find(t=>t.divisionId===null)){
    STATE.titles.push({id:uid('T'), name:'Cinturón BMF', divisionId:null, holderId:null, interimHolderId:null, isInterim:false, history:[]});
  }
  STATE.divisions.forEach(d=>{
    const t = STATE.titles.find(x=>x.divisionId===d.id);
    d.championId = t? t.holderId : null;
  });

  // Garantizar mínimo 15 peleadores activos por categoría (genera peleadores automáticamente si faltan)
  autoFillDivisions();
  // Inicializar snapshots de stats para todos los peleadores (para que el gráfico de evolución tenga un punto inicial)
  if(!STATE.statsHistory) STATE.statsHistory={};
  STATE.fighters.forEach(f=>{ if(!STATE.statsHistory[f.id]||STATE.statsHistory[f.id].length===0) saveStatSnapshot(f, STATE.meta.currentDate, 'Inicio'); });
  logEvent(`Liga inicializada con ${STATE.fighters.length} peleadores.`);
  saveLocal();
}

/* ====================== MOTOR DE SIMULACIÓN ====================== */
// Estima el % de victoria simulando el combate muchas veces con el mismo motor real (round a round),
// no con una comparación de nivel general. Así el striker con buena TDD, el pegador con poco nivel
// general pero mucho KO, el wrestler de control, etc. se reflejan correctamente en el marchmaking.
function winProbabilities(fA, fB, rounds=3){
  const N = 400; // más muestras = probabilidad más suavizada
  let winsA = 0;
  for(let i=0;i<N;i++){
    if(simulateFight(fA, fB, {rounds}).winner===fA) winsA++;
  }
  const raw = winsA/N*100;
  // Comprimir hacia 50 para reflejar la aleatoriedad real del deporte
  // Un 85% simulado → 72% mostrado, un 60% → 57%, un 50% → 50%
  const compressed = 50 + (raw-50)*0.75;
  const probA = clamp(Math.round(compressed), 5, 95);
  return {probA, probB: 100-probA};
}
function overallRating(f){
  const s=f.stats;
  let base = s.power*0.15 + s.striking*0.22 + s.wrestlingOff*0.14 + s.wrestlingDef*0.12 + s.ground*0.15 + s.cardio*0.12 + s.chin*0.10;
  base *= (f.longevity/100)*0.25 + 0.75; // el desgaste resta un poco de rendimiento
  return base;
}

// Simulación por micro-acciones: cada asalto es una secuencia de 4-7 encuentros con
// posición real (pie/clinch/suelo/espalda), daño acumulado intra-asalto, y knockdowns
// como evento específico que modifica el resto del asalto.
function simulateFight(fA, fB, opts={}){
  const rounds = opts.rounds||3;
  let roundsA=0, roundsB=0, kdA=0, kdB=0, result=null;
  const roundScores=[], roundDetails=[];
  const fStyleA=fA.fightStyle||'technical', fStyleB=fB.fightStyle||'technical';
  const careerDmgA=(fA.chinDamage||0)*4, careerDmgB=(fB.chinDamage||0)*4;

  for(let r=1; r<=rounds&&!result; r++){
    const fatA=1-Math.max(0,r-1)*(1-fA.stats.cardio/100)*0.09;
    const fatB=1-Math.max(0,r-1)*(1-fB.stats.cardio/100)*0.09;
    // Effective stats for this round
    const sA={
      str:(fA.stats.striking*0.55+fA.stats.power*0.45)*fatA,
      pow:fA.stats.power*fatA, woff:fA.stats.wrestlingOff*fatA,
      wdef:fA.stats.wrestlingDef, grd:fA.stats.ground*fatA,
      chin:fA.stats.chin, card:fA.stats.cardio
    };
    const sB={
      str:(fB.stats.striking*0.55+fB.stats.power*0.45)*fatB,
      pow:fB.stats.power*fatB, woff:fB.stats.wrestlingOff*fatB,
      wdef:fB.stats.wrestlingDef, grd:fB.stats.ground*fatB,
      chin:fB.stats.chin, card:fB.stats.cardio
    };

    let pos='standing', dmgA=0, dmgB=0, kdThis=null;
    const actions=[];
    const numActs=randi(4,7);
    let roundFinish=null;

    for(let ai=0; ai<numActs&&!roundFinish; ai++){
      const effChinA=sA.chin*(1-clamp((careerDmgA+dmgA)/280,0,0.45));
      const effChinB=sB.chin*(1-clamp((careerDmgB+dmgB)/280,0,0.45));
      const act=resolveAction(pos,fA,fB,sA,sB,effChinA,effChinB,fStyleA,fStyleB,r,rounds);
      actions.push(act);
      dmgA+=act.dA; dmgB+=act.dB;
      pos=act.npos;
      if(act.kd==='A'){kdB++;kdThis='A';}
      if(act.kd==='B'){kdA++;kdThis='B';}
      if(act.fin){ roundFinish=act.fin; result={winner:act.fin.s==='A'?fA:fB,loser:act.fin.s==='A'?fB:fA,method:act.fin.m,round:r,time:`${randi(0,4)}:${String(randi(0,59)).padStart(2,'0')}`}; }
    }

    if(roundFinish){ roundScores.push('finish'); roundDetails.push({round:r,actions,winner:'finish',scoreA:0,scoreB:0,pos}); break; }

    const posA=pos==='ground_A_top'?7:pos==='back_A'?12:0;
    const posB=pos==='ground_B_top'?7:pos==='back_B'?12:0;
    // Grappler/submission get extra position bonus for control on the ground
    const kdBon=kdThis==='B'?25:kdThis==='A'?-25:0;
    const scA=dmgB+posA+(kdBon>0?kdBon:0);
    const scB=dmgA+posB+(kdBon<0?-kdBon:0);
    const rw=scA>scB?'A':scB>scA?'B':Math.random()<0.5?'A':'B';
    if(rw==='A')roundsA++;else roundsB++;
    roundScores.push(rw);
    roundDetails.push({round:r,actions,winner:rw,scoreA:Math.round(scA),scoreB:Math.round(scB),pos});
  }

  if(!result){const winner=roundsA>=roundsB?fA:fB;result={winner,loser:winner===fA?fB:fA,method:'Decisión',round:rounds,time:'5:00'};}
  const close=result.method==='Decisión'?Math.abs(roundsA-roundsB)<=1:result.round>=Math.ceil(rounds*0.6);
  return{...result,rounds,roundScores,roundDetails,knockdownsA:kdA,knockdownsB:kdB,
    styleA:fStyleA,styleB:fStyleB,
    fightOfNight:Math.random()<(result.method==='Decisión'?(close?0.22:0.08):(close?0.18:0.06)),
    performance:Math.random()<(result.method!=='Decisión'?(result.round<=2?0.32:0.22):0.02)};
}

/* ---- Resolver de micro-acciones ---- */
function resolveAction(pos,fA,fB,sA,sB,effChinA,effChinB,styleA,styleB,round,totalRounds){
  // Stats determinate outcomes — styles only influence action selection (what is attempted)
  // Elegir tipo de acción según posición y estilo
  const type=pickActionType(pos,styleA,styleB,sA,sB);
  // Helper genérico
  const roll=()=>0.75+Math.random()*0.5;
  const fin=(s,m)=>({s,m});
  const R=round/totalRounds; // progresión del combate (0→1)

  // Phrase pools por tipo (para narrativa inmediata)
  const PHRASES={
    strike_exchange:{
      A_dom:n=>[`${n} conecta una combinación limpia que sacude a su rival.`,`Derecha limpia de ${n} que hace retroceder al rival.`,`${n} domina el intercambio con jabs precisos y movimiento lateral.`,`Patada al cuerpo de ${n} que dobla a su rival — se nota el efecto.`,`Combinación 1-2-3 de ${n}: cada golpe encuentra el objetivo.`],
      B_dom:n=>[`${n} conecta una combinación limpia que sacude a su rival.`,`Derecha limpia de ${n} que hace retroceder al rival.`,`${n} domina el intercambio con jabs precisos y movimiento lateral.`,`Patada al cuerpo de ${n} que dobla a su rival — se nota el efecto.`],
      equal:(a,b)=>[`${a} y ${b} intercambian golpes en un duelo igualado.`,`Buen intercambio entre ${a} y ${b} — los dos conectan.`,`${a} presiona y ${b} contragolpea — ninguno cede.`]
    },
    combination:{
      winner:n=>[`¡Gran combinación de ${n}! Tres golpes consecutivos sin respuesta del rival.`,`${n} encadena patada-cruzada-gancho: el rival apenas puede cubrirse.`,`${n} encuentra el hueco con el uppercut y remata con un gancho.`,`Explosión de ${n}: combinación de cinco golpes que deja al rival sin respuesta.`],
      loser:n=>[`${n} intenta responder pero solo conecta uno de tres intentos.`,`${n} busca el combo pero su rival ya está fuera de la línea.`]
    },
    takedown_success:n=>[`${n} dispara a las piernas y consigue el derribo limpiamente.`,`Doble pierna perfecta de ${n} — el rival vuela a la lona.`,`${n} presiona hacia la jaula y consigue el viaje al suelo desde el clinch.`,`Gran entrada de ${n}: finta de derecha y disparo a la pierna.`],
    takedown_fail:(att,def)=>[`${att} dispara a las piernas pero ${def} sprawla perfectamente y recupera los pies.`,`${def} bloquea la entrada de ${att} y se separa con un codazo corto.`,`Defensa de derribo excelente de ${def} — neutraliza el doble de ${att}.`,`${att} intenta la entrada pero ${def} hace el frente y escapa fácilmente.`],
    clinch_dom:n=>[`${n} domina el clinch con rodillazos al cuerpo que van sumando.`,`En el cuerpo a cuerpo ${n} es más fuerte — controla y trabaja.`,`${n} usa el dirty boxing: cuatro puños cortos al costado del rival.`,`${n} en el clinch: rodillazo, codazo, y separación.`],
    clinch_sep:(a,b)=>[`El árbitro los separa — vuelven a los pies.`,`Separación limpia — ${a} y ${b} reinician desde el centro.`],
    gnp_dom:n=>[`${n} desde arriba conecta codos que abren una herida.`,`Ground and pound sistemático de ${n} — el rival apenas puede defenderse.`,`${n} pasa a la guardia montada y lanza puños al cuerpo y la cabeza.`,`${n} controla la posición y acumula daño con el G&P.`],
    sub_attempt:{
      attempt:n=>[`${n} busca el triángulo desde la guardia.`,`${n} atrapa el brazo — intenta el armbar.`,`${n} se mueve a la espalda y busca el RNC.`,`${n} busca la guillotina en el momento de la separación.`],
      success:(w,l,m)=>[`🤼 ¡${w} consigue la posición perfecta — ${l} no puede escapar y toca!`,`🤼 ¡${l} aguanta pero el agarre de ${w} es de hierro — toca la lona!`,`🤼 ¡${w} aprieta hasta que ${l} queda inconsciente!`,`🤼 ¡Finalización impecable de ${w}! No hay salida para ${l}.`],
      escape:(sub,def)=>[`${def} defiende brillantemente — escapa del intento de ${sub}.`,`${def} gira la cadera y libera el brazo — peligro superado.`,`Excelente defensa de ${def}: bloquea, escapa y recupera los pies.`]
    },
    scramble:(a,b)=>[`Pelea de suelo entre ${a} y ${b} — el control cambia de manos.`,`Buena pelea en el suelo — ${a} intenta levantarse, ${b} lo frena.`,`Scramble caótico: ambos buscan la posición dominante.`],
    knockdown:(w,l)=>[`⚡ ¡${w} conecta un golpe perfecto y ${l} va a la lona! El árbitro empieza el conteo.`,`⚡ ¡Knockdown! ${l} cae tras una derecha de ${w} — se levanta pero está afectado.`,`⚡ ¡Down! ${l} toca la lona — se recupera pero el asalto ha cambiado completamente.`],
    ko:(w,l)=>[`💥 ¡${w} conecta el golpe definitivo y ${l} cae sin respuesta! ¡El árbitro para!`,`💥 ¡Combinación demoledora de ${w}! ${l} no puede continuar.`,`💥 ¡Nocaut! ${w} encuentra el hueco perfecto y ${l} queda en la lona.`,`💥 ¡${w} conecta el uppercut que buscaba! ${l} cae — el árbitro termina el combate.`],
    sub_finish:(w,l)=>[`🤼 ¡Rear naked choke perfecto de ${w}! ${l} se duerme.`,`🤼 ¡${w} aprieta el triángulo! ${l} da tres golpecitos — finalización.`,`🤼 ¡Armbar limpio de ${w}! ${l} grita y cede antes de que se rompa.`,`🤼 ¡${w} consigue la espalda y aprieta el RNC — ${l} no tiene salida!`]
  };
  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];

  // === STANDING ===
  if(type==='strike_exchange'){
    // Counter style: +12% effective striking in all exchanges
    const atkA=sA.str*roll(), atkB=sB.str*roll();
    const margin=(atkA-atkB)/Math.max(atkA,atkB);
    let dA=0,dB=0,narr='',kd=null,finish=null;
    if(margin>0.2){ dB=randi(4,10); narr=pick(PHRASES.strike_exchange.A_dom(fA.name)); }
    else if(margin<-0.2){ dA=randi(4,10); narr=pick(PHRASES.strike_exchange.B_dom(fB.name)); }
    else{ dA=randi(2,6); dB=randi(2,6); narr=pick(PHRASES.strike_exchange.equal(fA.name,fB.name)); }

    // Knockdown check (only when dominant)
    if(dB>7 && Math.random()<clamp((sA.pow*roll()-effChinB*0.8)/150,0,0.08)){kd='B';dB+=6;narr=pick(PHRASES.knockdown(fA.name,fB.name));}
    else if(dA>7 && Math.random()<clamp((sB.pow*roll()-effChinA*0.8)/150,0,0.08)){kd='A';dA+=6;narr=pick(PHRASES.knockdown(fB.name,fA.name));}
    // KO check with style-specific multipliers (counter +30%, finisher +50% from koMult)
    const koWinner=margin>=0?'A':'B', koLoser=margin>=0?'B':'A';
    const koMain=margin>=0?
      clamp((sA.str*roll()-effChinB)/270,0,0.052)*(1+R*0.35) :
      clamp((sB.str*roll()-effChinA)/270,0,0.052)*(1+R*0.35);
    const koPunch=margin>=0?
      clamp((sB.pow*roll()-effChinA*1.2)/390,0,0.020)*(1+R*0.2):
      clamp((sA.pow*roll()-effChinB*1.2)/390,0,0.020)*(1+R*0.2);
    const pr=Math.random();
    if(pr<koMain){finish=fin(koWinner,'KO/TKO');narr=pick(PHRASES.ko(koWinner==='A'?fA.name:fB.name,koWinner==='A'?fB.name:fA.name));}
    else if(pr<koMain+koPunch){finish=fin(koLoser,'KO/TKO');narr=pick(PHRASES.ko(koLoser==='A'?fA.name:fB.name,koLoser==='A'?fB.name:fA.name));}
    return{type,dA,dB,npos:kd?'standing':pos,kd,fin:finish,narr};
  }

  if(type==='combination'){
    // No multipliers — symmetric based purely on striking stats
    const atkA=sA.str*roll(), atkB=sB.str*roll();
    const winsCombo=atkA>atkB;
    const winner=winsCombo?fA:fB, loser=winsCombo?fB:fA;
    // Finisher style: +20% combo damage; Pressure: scales with round
    const dWinner=randi(8,16), dLoser=randi(1,4);
    const dA=winsCombo?dLoser:dWinner, dB=winsCombo?dWinner:dLoser;
    let narr=pick(PHRASES.combination.winner(winner.name));
    const koChance=clamp((dB/effChinB)*0.055,0,0.08)*(1+R*0.35);
    const finish=Math.random()<(winsCombo?koChance:clamp((dA/effChinA)*0.055,0,0.08)*(1+R*0.35))?fin(winsCombo?'A':'B','KO/TKO'):null;
    if(finish) narr=pick(PHRASES.ko(winner.name,loser.name));
    return{type,dA,dB,npos:pos,kd:null,fin:finish,narr};
  }

  if(type==='takedown'){
    // Decide aggressor by comparing both fighters' offensive wrestling (symmetric)
    // Grappler/submission get wrestling offense boost
    const attA=sA.woff*roll()>sB.woff*roll();
    const att=attA?fA:fB, def=attA?fB:fA;
    const attStat=attA?sA.woff:sB.woff, defStat=attA?sB.wdef:sA.wdef;
    const success=(attStat*roll())>(defStat*roll()*0.9);
    if(success){
      const newPos=attA?'ground_A_top':'ground_B_top';
      const dB=attA?randi(3,7):0, dA=attA?0:randi(3,7); // slam damage
      return{type,dA,dB,npos:newPos,kd:null,fin:null,narr:pick(PHRASES.takedown_success(att.name))};
    } else {
      return{type,dA:0,dB:0,npos:'standing',kd:null,fin:null,narr:pick(PHRASES.takedown_fail(att.name,def.name))};
    }
  }

  if(type==='clinch_work'){
    const domA=(sA.woff+sA.pow)*roll()>(sB.woff+sB.pow)*roll();
    const dA=domA?randi(1,4):randi(4,9), dB=domA?randi(4,9):randi(1,4);
    const separates=Math.random()<0.45;
    const newPos=separates?'standing':'clinch';
    const narr=separates?pick(PHRASES.clinch_sep(fA.name,fB.name)):pick(PHRASES.clinch_dom(domA?fA.name:fB.name));
    return{type,dA,dB,npos:newPos,kd:null,fin:null,narr};
  }

  // === GROUND ===
  if(type==='gnp'){
    const onTop=pos==='ground_A_top'?'A':'B';
    const atk=onTop==='A'?fA:fB, def=onTop==='A'?fB:fA;
    const atkS=onTop==='A'?sA:sB, defS=onTop==='A'?sB:sA;
    const effChinDef=onTop==='A'?effChinB:effChinA;
    const dmg=randi(6,14);
    const dA=onTop==='A'?0:dmg, dB=onTop==='A'?dmg:0;
    let narr=pick(PHRASES.gnp_dom(atk.name));
    // TKO from GnP
    const tkoChance=clamp((atkS.pow*roll()-effChinDef*0.90)/160,0,0.08)*(1+R*0.25);
    const finish=Math.random()<tkoChance?fin(onTop,'KO/TKO'):null;
    if(finish) narr=`💥 ¡Ground and pound devastador de ${atk.name}! El árbitro interviene para proteger a ${def.name}.`;
    return{type,dA,dB,npos:pos,kd:null,fin:finish,narr};
  }

  if(type==='sub_attempt'){
    const onTop=pos==='ground_A_top'?'A':pos==='ground_B_top'?'B':pos==='back_A'?'A':pos==='back_B'?'B':'A';
    const atk=onTop==='A'?fA:fB, def=onTop==='A'?fB:fA;
    const atkS=onTop==='A'?sA:sB, defS=onTop==='A'?sB:sA;
    const backBonus=pos.startsWith('back')?1.15:1;
    // Sub success determined purely by ground vs wrestlingDef stats
    const subSuccess=(atkS.grd*roll()*backBonus)>(defS.wdef*roll()*1.05);
    let narr=pick(PHRASES.sub_attempt.attempt(atk.name));
    if(subSuccess){
      narr=pick(PHRASES.sub_attempt.success(atk.name,def.name,'Sumisión'));
      const methods=['RNC','Triángulo','Armbar','Guillotina','D\'Arce'];
      const m=pick(methods);
      narr=pick(PHRASES.sub_finish(atk.name,def.name));
      return{type,dA:0,dB:0,npos:pos,kd:null,fin:fin(onTop,'Sumisión'),narr};
    } else {
      narr=pick(PHRASES.sub_attempt.escape(atk.name,def.name));
      return{type,dA:0,dB:0,npos:'standing',kd:null,fin:null,narr};
    }
  }

  if(type==='scramble'){
    // Escape probability based on bottom fighter's cardio+wdef vs top fighter's wrestling
    const isATop=(pos==='ground_A_top'||pos==='back_A');
    const bottomS=isATop?sB:sA, topS=isATop?sA:sB;
    // Formula: base 35% + bonus from athleticism of bottom, penalty from top's wrestling
    const escapeProb=clamp(0.35+(bottomS.wdef/100)*0.22+(bottomS.card/100)*0.13-(topS.woff/100)*0.12,0.25,0.72);
    const newP=Math.random()<escapeProb?'standing':pos;
    return{type,dA:randi(1,4),dB:randi(1,4),npos:newP,kd:null,fin:null,narr:pick(PHRASES.scramble(fA.name,fB.name))};
  }

  // Clinch in clinch position
  return{type:'clinch_work',dA:randi(2,5),dB:randi(2,5),npos:'standing',kd:null,fin:null,narr:pick(PHRASES.clinch_sep(fA.name,fB.name))};
}

function pickActionType(pos,styleA,styleB,sA,sB){
  const r=Math.random();
  if(pos==='standing'){
    // Both fighters influence action type — take the max tendency
    const tdA=styleA==='grappler'?0.28:styleA==='submission'?0.34:styleA==='pressure'?0.18:styleA==='counter'?0.06:0.12;
    const tdB=styleB==='grappler'?0.28:styleB==='submission'?0.34:styleB==='pressure'?0.18:styleB==='counter'?0.06:0.12;
    const tdProb=Math.max(tdA,tdB);
    const clinchA=styleA==='grappler'?0.18:styleA==='submission'?0.22:styleA==='pressure'?0.20:0.12;
    const clinchB=styleB==='grappler'?0.18:styleB==='submission'?0.22:styleB==='pressure'?0.20:0.12;
    const clinchProb=Math.max(clinchA,clinchB);
    const comboA=styleA==='finisher'?0.25:styleA==='pressure'?0.20:styleA==='submission'?0.08:0.14;
    const comboB=styleB==='finisher'?0.25:styleB==='pressure'?0.20:styleB==='submission'?0.08:0.14;
    const comboProb=Math.max(comboA,comboB);
    if(r<tdProb) return 'takedown';
    if(r<tdProb+clinchProb) return 'clinch_work';
    if(r<tdProb+clinchProb+comboProb) return 'combination';
    return 'strike_exchange';
  }
  if(pos==='clinch'){
    const tdFromClinch=Math.max(
      styleA==='grappler'?0.45:styleA==='submission'?0.52:styleA==='pressure'?0.30:0.20,
      styleB==='grappler'?0.45:styleB==='submission'?0.52:styleB==='pressure'?0.30:0.20
    );
    if(r<tdFromClinch) return 'takedown';
    if(r<tdFromClinch+0.35) return 'clinch_work';
    return 'strike_exchange';
  }
  if(pos==='ground_A_top'||pos==='ground_B_top'){
    const onTopStyle=pos==='ground_A_top'?styleA:styleB;
    // Submission specialists attempt subs most, grapplers moderately
    const subProb=onTopStyle==='submission'?0.30:onTopStyle==='grappler'?0.20:onTopStyle==='finisher'?0.16:0.11;
    if(r<subProb) return 'sub_attempt';
    if(r<subProb+0.50) return 'gnp';
    return 'scramble';
  }
  if(pos==='back_A'||pos==='back_B'){
    const onBackStyle=pos==='back_A'?styleA:styleB;
    return r<(onBackStyle==='submission'?0.55:onBackStyle==='grappler'?0.48:0.40)?'sub_attempt':'scramble';
  }
  return 'strike_exchange';
}
/* ====================== LESIONES / LONGEVIDAD / RETIRO ====================== */
function applyPostFightWearAndInjury(fighter, won, method, eventDate){
  // desgaste de longevidad
  let wear = randi(1,3);
  if(method==='KO/TKO' && !won) wear += randi(2,5);
  if(method!=='Decisión') wear += randi(0,2);
  fighter.longevity = clamp(fighter.longevity-wear, 0, 100);

  // LESIONES GRANULARES — probabilidad reducida y más variedad de tipos
  // Base: 4% (ganó), +6% si perdió por KO, +3% si perdió por Sub, +2% otros
  const injuryChance = 0.04
    + (method==='KO/TKO' && !won ? 0.06 : 0)
    + (method==='Sumisión' && !won ? 0.03 : 0)
    + (!won && method==='Decisión' ? 0.02 : 0);
  if(Math.random()<injuryChance){
    let injuryType, days, statPenalty=null, injType='general';
    if(method==='KO/TKO' && !won){
      const opts=[
        {note:'Conmoción cerebral',days:[90,300],stat:{key:'chin',d:-randi(1,3)},type:'concussion'},
        {note:'Protocolo médico neurológico',days:[120,365],stat:{key:'chin',d:-randi(1,2)},type:'concussion'},
        {note:'Fractura orbital',days:[60,120],stat:null,type:'concussion'},
        {note:'Lesión cervical',days:[90,180],stat:{key:'striking',d:-1},type:'joint'},
      ];
      const o=pick(opts); injuryType=o.note; days=randi(o.days[0],o.days[1]); statPenalty=o.stat||null; injType=o.type;
    } else if(method==='Sumisión' && !won){
      const opts=[
        {note:'Lesión de hombro (desgarro)',days:[90,240],stat:{key:'wrestlingDef',d:-randi(1,2)},type:'joint'},
        {note:'Lesión de codo (ligamento)',days:[60,180],stat:{key:'ground',d:-1},type:'joint'},
        {note:'Lesión de rodilla (menisco)',days:[90,210],stat:{key:'cardio',d:-randi(1,2)},type:'joint'},
        {note:'Lesión de cuello',days:[60,120],stat:null,type:'joint'},
      ];
      const o=pick(opts); injuryType=o.note; days=randi(o.days[0],o.days[1]); statPenalty=o.stat||null; injType=o.type;
    } else if(!won){
      const opts=[
        {note:'Fractura de mano',days:[30,90],stat:{key:'striking',d:-1},type:'general'},
        {note:'Costillas fracturadas',days:[45,120],stat:{key:'cardio',d:-1},type:'general'},
        {note:'Esguince de tobillo',days:[20,60],stat:null,type:'general'},
        {note:'Corte profundo (cirugía)',days:[30,75],stat:null,type:'general'},
        {note:'Lesión de nariz (cirugía)',days:[20,50],stat:null,type:'general'},
      ];
      const o=pick(opts); injuryType=o.note; days=randi(o.days[0],o.days[1]); statPenalty=o.stat||null; injType=o.type;
    } else {
      // Ganador lesionado (menos frecuente)
      const opts=[
        {note:'Desgarro muscular',days:[20,60],stat:null,type:'general'},
        {note:'Fractura de mano',days:[30,60],stat:{key:'striking',d:-1},type:'general'},
        {note:'Esguince de muñeca',days:[15,40],stat:null,type:'general'},
      ];
      const o=pick(opts); injuryType=o.note; days=randi(o.days[0],o.days[1]); statPenalty=o.stat||null; injType=o.type;
    }
    fighter.injury={active:true, untilDate:addDays(eventDate,days), note:injuryType, type:injType};
    fighter.status='injured';
    if(statPenalty) fighter.stats[statPenalty.key]=clamp((fighter.stats[statPenalty.key]||70)+statPenalty.d,1,99);
    logEvent(`🩹 ${fighter.name}: ${injuryType} (${days} días). Vuelve: ${fmtDate(fighter.injury.untilDate)}`);
  }

  // retiro
  const age = ageFromDob(fighter.dob, eventDate);
  let retireProb = 0;
  if(age>=39) retireProb += 0.35;
  else if(age>=36) retireProb += 0.16;
  else if(age>=33) retireProb += 0.05;
  if(fighter.longevity<=15) retireProb += 0.45;
  else if(fighter.longevity<=30) retireProb += 0.2;
  else if(fighter.longevity<=45) retireProb += 0.08;
  if(!won && method==='KO/TKO') retireProb += 0.06;
  // Lesión de conmoción aumenta retiro
  if(fighter.injury?.type==='concussion') retireProb += 0.12;
  retireProb = clamp(retireProb,0,0.9);
  if(fighter.status!=='retired' && Math.random()<retireProb){
    const wantsRetire = confirm(`${fighter.name} (${age} años, ${fighter.record.wins}-${fighter.record.losses}) quiere retirarse tras este combate.\n\n¿Permites la retirada?`);
    if(!wantsRetire){ logEvent(`💪 ${fighter.name} decide continuar peleando a pesar de su edad.`); return; }
    fighter.status='retired';
    STATE.titles.forEach(title=>{
      if(title.holderId===fighter.id){
        const reign = (fighter.titleReigns||[]).find(r=>r.titleId===title.id && !r.lostDate);
        if(reign) reign.lostDate = eventDate;
        title.holderId = null; title.isInterim = false;
        logEvent(`🏆 ${title.name} queda vacante: ${fighter.name} se retira.`);
      }
    });
    logEvent(`👋 ${fighter.name} (${age} años) anuncia su retirada.`);
    const wantsHof = confirm(`${fighter.name} se retira (${fighter.record.wins}-${fighter.record.losses}, GOAT score ${goatScore(fighter)}).\n\n¿Quieres añadirlo al Hall of Fame?`);
    if(wantsHof){ fighter.hof = true; logEvent(`🏛 ${fighter.name} es inducido al Hall of Fame.`); }
  }
}

// Guarda un snapshot de los stats de un peleador tras cada evento en que participa
function saveStatSnapshot(fighter, eventDate, eventName){
  if(!STATE.statsHistory) STATE.statsHistory={};
  if(!STATE.statsHistory[fighter.id]) STATE.statsHistory[fighter.id]=[];
  const history = STATE.statsHistory[fighter.id];
  // Solo guardar si algo cambió (o es el primero)
  const last = history[history.length-1];
  const snap = {...fighter.stats};
  if(!last || STAT_KEYS.some(([k])=>last.stats[k]!==snap[k])){
    history.push({date:eventDate, evName:eventName||'?', stats:snap, general:generalScore(fighter)});
    if(history.length>30) history.shift();
  }
}

/* ====================== HITOS ====================== */
function checkMilestones(fighter, ev){
  // Only fire milestones based on in-game progress, not initial state
  const completedSoFar = STATE.events.filter(e=>e.status==='completed').length;
  if(completedSoFar === 0) return;
  if(!STATE.milestonesReached) STATE.milestonesReached=[];
  // Convert to Set for fast lookup, works even when loaded from JSON (array)
  const reached = new Set(Array.isArray(STATE.milestonesReached)?STATE.milestonesReached:[...STATE.milestonesReached]);
  const key=(name,id)=>`${name}_${id}`;
  const reach=(k,msg,icon,color)=>{
    if(!reached.has(k)){
      reached.add(k);
      STATE.milestonesReached=Array.from(reached);
      richToast(msg,icon,color,5000);
      logEvent(`🏅 HITO: ${msg}`);
    }
  };
  const ufcW=fighter.record.ufcWins||0, momentum=fighter.momentum||0;
  // Hito: 10, 15, 20 victorias UFC
  [10,15,20].forEach(n=>{ if(ufcW>=n) reach(key(`ufc${n}wins`,fighter.id),`${fighter.name} alcanza ${n} victorias en la UFC`,'🎯','#d4af37'); });
  // Hito: racha de 5+
  if(momentum>=5) reach(key(`streak5`,fighter.id),`${fighter.name} lleva 5 victorias consecutivas — ¡imparable!`,'🔥','#ff6d00');
  if(momentum>=10) reach(key(`streak10`,fighter.id),`${fighter.name} lleva 10 victorias seguidas — histórico`,'💫','#ffd600');
  // Hito: invicto en UFC con 10+ peleas
  if(fighter.record.ufcLosses===0 && ufcW>=10) reach(key('ufc_unbeaten10',fighter.id),`${fighter.name} sigue INVICTO con ${ufcW} victorias en UFC`,'⚡','#69f0ae');
  // Hito: primer campeón de dos pesos en la liga
  const twoDiv=(fighter.titleReigns||[]).map(r=>STATE.titles.find(t=>t.id===r.titleId)?.divisionId||r.divisionId).filter(Boolean);
  if(new Set(twoDiv).size>=2) reach(key('twoweight',fighter.id),`${fighter.name} se convierte en campeón de dos pesos`,'👑','#d4af37');
  // Hito: 5 defensas en un único reinado
  const maxDef=Math.max(0,...(fighter.titleReigns||[]).map(r=>r.defenses||0));
  if(maxDef>=5) reach(key('def5',fighter.id),`${fighter.name} llega a 5 defensas consecutivas`,'🛡️','#64b5f6');
  if(maxDef>=10) reach(key('def10',fighter.id),`${fighter.name} realiza 10 defensas — récord histórico`,'🏆','#ffd600');
  // Hito global: nuevo récord de KO más rápido
  const R=STATE.records||{};
  if(R.fastestKO){
    const prev=STATE._prevFastestKO;
    if(!prev||R.fastestKO.secs<prev) {
      if(prev) reach(`fastko_${ev?.id||'?'}`,`Nuevo récord: KO más rápido de la liga — ${R.fastestKO.secs}s`,'💥','#ef5350');
      STATE._prevFastestKO=R.fastestKO.secs;
    }
  }
}

// Mejora hasta los 33, estable 33–36, deterioro a partir de los 36.
function evolveAttributes(eventDate){
  STATE.fighters.forEach(f=>{
    if(f.status==='retired') return;
    const age = ageFromDob(f.dob, eventDate);
    if(age < 33){
      // Mejora gradual: +0 a +2 en un atributo aleatorio
      if(Math.random() < 0.55){
        const k=pick(STAT_KEYS)[0];
        f.stats[k]=clamp((f.stats[k]||70)+randi(0,2),1,99);
      }
    } else if(age <= 36){
      // Estable: muy pequeños cambios (+0/-1), raro
      if(Math.random() < 0.15){
        const k=pick(STAT_KEYS)[0];
        f.stats[k]=clamp((f.stats[k]||70)-1,1,99);
      }
    } else {
      // Deterioro: −1 a −3 por atributo, más severo con la edad
      const decay = age>=41 ? randi(2,4) : age>=38 ? randi(1,3) : 1;
      const k=pick(STAT_KEYS)[0];
      f.stats[k]=clamp((f.stats[k]||70)-decay,1,99);
      if(age>=39 && Math.random()<0.55){
        const k2=pick(STAT_KEYS)[0];
        f.stats[k2]=clamp((f.stats[k2]||70)-randi(1,2),1,99);
      }
    }
  });
}

function rivalryKey(idA,idB){ return [idA,idB].sort().join('_'); }
function updateRivalry(idA,idB,date){
  const k=rivalryKey(idA,idB);
  if(!STATE.rivalries) STATE.rivalries={};
  STATE.rivalries[k]={ fights:(STATE.rivalries[k]?.fights||0)+1, lastDate:date };
}
function getRivalryFights(idA,idB){
  return STATE.rivalries?.[rivalryKey(idA,idB)]?.fights || 0;
}
function isRival(idA,idB){ return getRivalryFights(idA,idB)>=1; }

// Devuelve avisos de posibles interinos para mostrar al usuario tras un evento
function checkTitleDefensePressure(eventDate){
  const alerts=[];
  STATE.titles.forEach(title=>{
    if(!title.holderId) return;
    const champ=STATE.fighters.find(f=>f.id===title.holderId);
    if(!champ) return;
    const lastFight = champ.lastEventSeq!=null?
      STATE.events.find(e=>e.seq===champ.lastEventSeq&&e.status==='completed')?.date : null;
    const injured = champ.status==='injured';
    const daysSince = lastFight? Math.round((new Date(eventDate)-new Date(lastFight))/86400000) : 999;
    const longInjury = injured && champ.injury?.untilDate &&
      Math.round((new Date(champ.injury.untilDate)-new Date(eventDate))/86400000)>90;
    if(daysSince>270 || longInjury){
      alerts.push({title, champ, daysSince, longInjury});
    }
  });
  return alerts;
}

function ufcWinsOf(f){ return f.record.ufcWins!=null? f.record.ufcWins : f.record.wins; }
function ufcLossesOf(f){ return f.record.ufcLosses!=null? f.record.ufcLosses : f.record.losses; }
function ufcKoWinsOf(f){ return f.record.ufcKoWins!=null? f.record.ufcKoWins : f.record.koWins; }
function ufcSubWinsOf(f){ return f.record.ufcSubWins!=null? f.record.ufcSubWins : f.record.subWins; }
function ufcDecWinsOf(f){ return f.record.ufcDecWins!=null? f.record.ufcDecWins : f.record.decWins; }
// Divisiones distintas en las que el peleador ha sido campeón (para valorar campeones multi-división)
function titleDivisionsCount(f){
  const divs = new Set();
  (f.titleReigns||[]).forEach(r=>{
    const t = STATE.titles.find(x=>x.id===r.titleId);
    if(t && t.divisionId) divs.add(t.divisionId);
  });
  return divs.size;
}
function totalDefenses(f){ return (f.titleReigns||[]).reduce((a,t)=>a+(t.defenses||0),0); }
function totalReignsCount(f){ return (f.titleReigns||[]).length; }

function computeBaseScore(f){
  const r=f.record;
  const wins = ufcWinsOf(f);
  const losses = ufcLossesOf(f);
  let score = wins*2.4 - losses*1.5 + ufcKoWinsOf(f)*0.5 + ufcSubWinsOf(f)*0.5 + f.bonuses.performanceOfNight*0.8 + f.bonuses.fightOfNight*0.5;
  if(isChampion(f.id)) score += 18;
  if(isInterimChampion(f.id)) score += 10;
  score += totalDefenses(f)*4;
  score += totalReignsCount(f)*5;
  const multiDiv = titleDivisionsCount(f);
  if(multiDiv>1) score += (multiDiv-1)*25; // bonus extra por ser campeón en más de un peso
  // penalizar inactividad
  const inactivity = f.lastEventSeq!=null? (STATE.meta.eventSeq - f.lastEventSeq) : 2;
  score -= inactivity*0.4;
  return score;
}
function isChampion(fid){ return STATE.titles.some(t=>t.holderId===fid); }
function isInterimChampion(fid){ return STATE.titles.some(t=>t.interimHolderId===fid); }

// Últimos N combates resueltos de un peleador (más reciente primero), con su rival y si ganó
function recentResolvedFights(f, n){
  const history = [...(f.fightHistory||[])].reverse();
  const out=[];
  for(const fid of history){
    if(out.length>=n) break;
    let found=null, foundEv=null;
    for(const ev of STATE.events){ const ft=ev.card.find(x=>x.id===fid); if(ft&&ft.result){found=ft;foundEv=ev;break;} }
    if(!found) continue;
    const oppId = found.result.winnerId===f.id? found.result.loserId : found.result.winnerId;
    const opp = STATE.fighters.find(x=>x.id===oppId);
    if(!opp) continue;
    out.push({opp, won: found.result.winnerId===f.id, date: foundEv? foundEv.date : null});
  }
  return out;
}

// Ajuste por "calidad de rival" en combates recientes (estilo ranking real de la UFC):
// vencer a alguien mejor valorado que tú te adelanta en la clasificación; perder contra alguien peor valorado te penaliza más.
// Solo afecta a P4P / categoría (no al GOAT histórico). Se ponderan los últimos 5 combates, dando más peso al más reciente.
const FORM_WEIGHTS = [1.0, 0.7, 0.5, 0.35, 0.25];
function qualityAdjustment(f, baseMap){
  const myBase = baseMap.get(f.id) ?? 0;
  const fights = recentResolvedFights(f, FORM_WEIGHTS.length);
  let adj = 0;
  fights.forEach((res, idx)=>{
    const w = FORM_WEIGHTS[idx] ?? 0.15;
    const oppBase = baseMap.get(res.opp.id) ?? 0;
    const diff = oppBase - myBase; // positivo = el rival estaba mejor valorado que tú
    if(res.won){
      adj += w * clamp(diff, 0, 60) * 0.9; // victoria de calidad: te adelanta
      if(diff<0) adj += w * 1.5; // ganar a cualquiera, aunque esté peor valorado, suma un poco
    } else {
      adj -= w * clamp(-diff, 0, 60) * 1.1; // perder contra alguien peor valorado duele mucho
      if(diff>0) adj -= w * 1.5; // perder, aunque sea contra alguien mejor, también resta un poco
    }
  });
  return adj;
}

function refreshRankings(){
  // Paso 1: puntuación base (récord UFC, títulos, defensas, multi-división, inactividad)
  STATE.fighters.forEach(f=> f._baseScore = computeBaseScore(f));
  const baseMap = new Map(STATE.fighters.map(f=>[f.id, f._baseScore]));
  // Paso 2: ajuste por calidad de rivales recientes (efecto "leapfrog" realista)
  STATE.fighters.forEach(f=>{
    f.rankScore = f._baseScore + qualityAdjustment(f, baseMap);
  });
}

function divisionTop15(divId){
  const divTitle  = STATE.titles.find(t=>t.divisionId===divId && !t.isInterim)||{};
  const champId   = divTitle.holderId;
  const interimId = divTitle.interimHolderId;
  return STATE.fighters.filter(f=>f.division===divId && f.status!=='retired')
    .sort((a,b)=>{
      if(a.id===champId)   return -1; // #1 siempre
      if(b.id===champId)   return  1;
      if(a.id===interimId) return -1; // #2 siempre
      if(b.id===interimId) return  1;
      const am=a.manualRankDivision, bm=b.manualRankDivision;
      if(am!=null && bm!=null) return am-bm;
      if(am!=null) return -1;
      if(bm!=null) return 1;
      return b.rankScore-a.rankScore;
    }).slice(0,15);
}
function p4pTop15(){
  // En P4P, todos los campeones activos tienen prioridad por delante del resto, luego sort por score
  return STATE.fighters.filter(f=>f.status==='active' || f.status==='injured')
    .sort((a,b)=>{
      const aChamp = isChampion(a.id)?1:0, bChamp = isChampion(b.id)?1:0;
      if(aChamp!==bChamp) return bChamp-aChamp; // campeones primero
      const am=a.manualRankP4P, bm=b.manualRankP4P;
      if(am!=null && bm!=null) return am-bm;
      if(am!=null) return -1;
      if(bm!=null) return 1;
      return b.rankScore-a.rankScore;
    }).slice(0,15);
}

// Se actualizan tras cada pelea simulada
function checkAndUpdateRecords(fA, fB, result, eventDate){
  const R = STATE.records = STATE.records || {};
  const w = result.winner, l = result.loser;
  const timeSecs = result.round*300 - (5*60 - (parseInt(result.time)||0)); // approx seconds
  const actualSecs = (result.round-1)*300 + (parseInt((result.time||'0:00').split(':')[0])||0)*60 + (parseInt((result.time||'0:00').split(':')[1])||0);

  if(result.method==='KO/TKO'){
    if(!R.fastestKO || actualSecs < R.fastestKO.secs)
      R.fastestKO = {fighterId:w.id, secs:actualSecs, round:result.round, time:result.time, opponentId:l.id, date:eventDate};
    if(!R.latestKO || actualSecs > R.latestKO.secs)
      R.latestKO = {fighterId:w.id, secs:actualSecs, round:result.round, time:result.time, opponentId:l.id, date:eventDate};
  }
  if(result.method==='Sumisión'){
    if(!R.fastestSub || actualSecs < R.fastestSub.secs)
      R.fastestSub = {fighterId:w.id, secs:actualSecs, round:result.round, time:result.time, opponentId:l.id, date:eventDate};
    if(!R.latestSub || actualSecs > R.latestSub.secs)
      R.latestSub = {fighterId:w.id, secs:actualSecs, round:result.round, time:result.time, opponentId:l.id, date:eventDate};
  }
}
function fmtSecs(s){ if(s==null) return '—'; const m=Math.floor(s/60),sec=s%60; return `R${Math.floor(s/300)+1} ${m%5}:${String(sec).padStart(2,'0')}`; }

// ¿Es alguien el líder de una estadística UFC? Devuelve badges mejorados con posición exacta y registros de título
function fighterUFCRankings(f){
  const badges = [];
  const all = STATE.fighters;
  // Posición exacta en stats
  const statBadge=(sorted, label, icon, minPos=3)=>{
    const rank=sorted.findIndex(x=>x.id===f.id)+1;
    if(rank>=1 && rank<=minPos){
      const col=rank===1?'gold':'';
      badges.push(`<span class="pill ${col}">${icon} #${rank} ${label} UFC</span>`);
    }
  };
  statBadge(all.slice().sort((a,b)=>ufcKoWinsOf(b)-ufcKoWinsOf(a)),'KOs','🥊');
  statBadge(all.slice().sort((a,b)=>ufcSubWinsOf(b)-ufcSubWinsOf(a)),'Sumisiones','🤼');
  statBadge(all.slice().sort((a,b)=>(ufcKoWinsOf(b)+ufcSubWinsOf(b))-(ufcKoWinsOf(a)+ufcSubWinsOf(a))),'Finalizaciones','⚡');
  statBadge(all.slice().sort((a,b)=>ufcWinsOf(b)-ufcWinsOf(a)),'Victorias','🏅');
  statBadge(all.slice().sort((a,b)=>(b.bonuses?.fightOfNight||0)-(a.bonuses?.fightOfNight||0)),'FOTN','🌟',3);
  // Defensas totales
  const totalDefs=f=>(f.titleReigns||[]).reduce((s,r)=>s+(r.defenses||0),0);
  statBadge(all.slice().sort((a,b)=>totalDefs(b)-totalDefs(a)),'Defensas totales','🛡️',3);
  // Títulos ganados (reinados)
  const reigns=(f.titleReigns||[]);
  const indiscutidos=reigns.filter(r=>!r.isInterim);
  const interinos=reigns.filter(r=>r.isInterim);
  // Títulos ganados — separar indiscutidos de interinos
  const titleGroups={};
  reigns.forEach(r=>{
    const t=STATE.titles.find(x=>x.id===r.titleId);
    // Use stored titleName as fallback if title object was deleted (e.g. after unification)
    const tName=t?.name||r.titleName||(r.divisionId?`Cinturón de ${divName(r.divisionId)}`:null);
    if(!tName) return;
    const key=(t?.id||r.titleId)+'_'+(r.isInterim?'i':'f');
    if(!titleGroups[key]) titleGroups[key]={tName,count:0,defs:0,active:false,isInterim:r.isInterim};
    titleGroups[key].count++;
    titleGroups[key].defs+=(r.defenses||0);
    if(!r.lostDate) titleGroups[key].active=true;
  });
  Object.values(titleGroups).forEach(({tName,count,defs,active,isInterim})=>{
    const prefix=count>1?`x${count} `:'';
    const icon=isInterim?'🥈':'👑';
    const label=isInterim?'Interino':'';
    badges.push(`<span class="pill ${isInterim?'':'gold'}">${icon} ${prefix}${tName}${label?' ('+label+')':''}${active?' ⭐':''}</span>`);
    if(defs>0) badges.push(`<span class="pill">🛡️ ${defs} def.${isInterim?' (int.)':''}</span>`);
  });
  // POTN top 3
  statBadge(all.slice().sort((a,b)=>(b.bonuses?.performanceOfNight||0)-(a.bonuses?.performanceOfNight||0)),'POTN','⭐',3);
  // Récords especiales
  const R=STATE.records||{};
  if(R.fastestKO?.fighterId===f.id) badges.push(`<span class="pill gold">⚡ KO más rápido UFC (${fmtSecs(R.fastestKO.secs)})</span>`);
  if(R.fastestSub?.fighterId===f.id) badges.push(`<span class="pill gold">🤼 Sub más rápida UFC (${fmtSecs(R.fastestSub.secs)})</span>`);
  if(R.fastestTitleKO?.fighterId===f.id) badges.push(`<span class="pill gold">⚡ KO más rápido en pelea titular (${fmtSecs(R.fastestTitleKO.secs)})</span>`);
  if(R.fastestTitleSub?.fighterId===f.id) badges.push(`<span class="pill gold">🤼 Sub más rápida en pelea titular (${fmtSecs(R.fastestTitleSub.secs)})</span>`);
  if(R.longestStreak?.fighterId===f.id) badges.push(`<span class="pill gold">🔥 Racha más larga (${R.longestStreak.streak} vict.)</span>`);
  return badges.join(' ');
}

// GOAT bonus pequeño por ser record holder
function goatRecordBonus(f){
  const all = STATE.fighters;
  let bonus = 0;
  const ko = ufcKoWinsOf(f), sub = ufcSubWinsOf(f), fin = ko+sub;
  if(all.every(x=>ufcKoWinsOf(x)<=ko)) bonus += 4;      // más KOs de la UFC
  if(all.every(x=>ufcSubWinsOf(x)<=sub)) bonus += 4;    // más sumisiones
  if(all.every(x=>(ufcKoWinsOf(x)+ufcSubWinsOf(x))<=fin)) bonus += 3; // más finalizaciones
  return bonus;
}

/* ====================== GOAT SCORE ====================== */
// El GOAT score prioriza con fuerza ser campeón, las defensas, los reinados y el multi-división.
// Solo se usan las victorias y derrotas EN LA UFC (campo editable); el resto de la carrera no puntúa aquí.
// Un reinado o defensa INTERINA vale menos que uno indiscutido (cinturón real), porque históricamente
// el título interino es un escalón por debajo del campeonato indiscutido.
const INTERIM_WEIGHT = 0.5; // un reinado/defensa interino vale el 50% de uno indiscutido
function goatScore(f){
  const r=f.record;
  const reigns=(f.titleReigns||[]);
  const wins = ufcWinsOf(f);
  const losses = ufcLossesOf(f);
  const multiDiv = titleDivisionsCount(f);

  let weightedReigns = 0, weightedDefenses = 0, weightedTitleDays = 0;
  reigns.forEach(t=>{
    const w = t.isInterim? INTERIM_WEIGHT : 1;
    weightedReigns += w;
    weightedDefenses += (t.defenses||0) * w;
    const end = t.lostDate || STATE.meta.currentDate;
    const days = Math.max(0, (new Date(end)-new Date(t.wonDate))/(1000*3600*24));
    weightedTitleDays += days * w;
  });

  let score = wins*1.4 - losses*1.0 + ufcKoWinsOf(f)*0.4 + ufcSubWinsOf(f)*0.4 +
    weightedDefenses*12 + weightedReigns*14 + weightedTitleDays*0.02 +
    f.bonuses.performanceOfNight*1.2 + f.bonuses.fightOfNight*0.8;
  if(multiDiv>1) score += (multiDiv-1)*25; // bonus por campeón en más de una categoría (valioso, pero no debe pesar más que defender el título muchas veces)
  // Sin haber sido campeón nunca (ni siquiera interino), el legado pesa mucho menos
  if(reigns.length===0) score *= 0.45;
  score += goatRecordBonus(f); // pequeño plus si lidera algún récord de la liga
  return Math.round(score);
}


/* ====================== EVENTOS / CARTELERA ====================== */
function fighterAvailable(f){
  if(f.status==='retired') return false;
  // Auto-clear expired injuries
  if(f.status==='injured'){
    if(f.injury?.active && f.injury?.untilDate && new Date(f.injury.untilDate) <= new Date(STATE.meta.currentDate)){
      f.injury.active=false; f.status='active';
    } else if(f.status==='injured') return false;
  }
  // Cooldown: mínimo 90-150 días entre peleas (no eventos consecutivos)
  if(f.lastEventSeq!=null){
    const lastEv = STATE.events.filter(e=>e.status==='completed' && e.card.some(ft=>ft.fighterA===f.id||ft.fighterB===f.id)).sort((a,b)=>b.seq-a.seq)[0];
    if(lastEv){
      const daysSinceLast = (new Date(STATE.meta.currentDate) - new Date(lastEv.date)) / 86400000;
      const minDays = f.longevity > 60 ? 100 : (f.longevity > 30 ? 130 : 160);
      if(daysSinceLast < minDays) return false;
    }
  }
  return true;
}

function createEvent(name, date){
  const ev = {id:uid('E'), seq:STATE.meta.eventSeq, name, date, status:'scheduled', card:[]};
  STATE.events.push(ev);
  STATE.meta.eventSeq++;
  saveLocal();
  return ev;
}

function addFightToEvent(ev, fAId, fBId, titleId=null, isInterim=false, isMain=false, isContender=false){
  ev.card.push({id:uid('FT'), fighterA:fAId, fighterB:fBId, titleId, isInterim, isMain, isContender, result:null});
}

function simulateEvent(ev){
  if(ev.status==='completed') return;
  ev.card.forEach(fight=>{
    const fA = STATE.fighters.find(x=>x.id===fight.fighterA);
    const fB = STATE.fighters.find(x=>x.id===fight.fighterB);
    if(!fA||!fB) return;
    const isTitle = !!fight.titleId;
    // Miss weight check
    const missedId = checkMissWeight(fight);
    if(missedId){
      const mf=STATE.fighters.find(x=>x.id===missedId);
      fight.result = fight.result||{};
      fight.missedWeight=missedId;
      logEvent(`⚖️ ${mf?.name} no da el peso — el combate se realiza pero el título no puede cambiar de manos si ${mf?.name} gana.`);
      mf.rankScore=Math.max(0,(mf.rankScore||0)-15);
      if(STATE.atpPoints) STATE.atpPoints[missedId]=Math.round((STATE.atpPoints[missedId]||0)*0.85);
    }
    const fAm=momentumBonus(fA), fBm=momentumBonus(fB);
    const fAb={...fA,stats:{...fA.stats,...Object.fromEntries(Object.entries(fA.stats).map(([k,v])=>[k,Math.min(99,v+fAm)]))}};
    const fBb={...fB,stats:{...fB.stats,...Object.fromEntries(Object.entries(fB.stats).map(([k,v])=>[k,Math.min(99,v+fBm)]))}};
    const result = simulateFight(fAb, fBb, {rounds: isTitle?5:3});
    // If winner missed weight and it's a title fight → belt can't change hands
    const blockedChampChange = isTitle && missedId && result.winner.id===missedId;
    fight.result = {
      winnerId:result.winner.id, loserId:result.loser.id, method:result.method, round:result.round, time:result.time,
      fightOfNight:result.fightOfNight, performance:result.performance,
      missedWeight: missedId||null, blockedChampChange
    };
    applyFightResultToState(fight, fA, fB, result, ev);
    checkAndUpdateRecords(fA, fB, result, ev.date);
  });
  finishEvent(ev);
  saveLocal();
}

/* ====================== INTERINO POR LESIÓN DE CAMPEÓN ====================== */
// El campeón NUNCA pierde el cinturón por lesión. Esta función ya no despoja al campeón —
// solo emite un aviso de que se recomienda programar un interino mientras el campeón se recupera.
function vacateTitleForInjury(titleId){
  const title = STATE.titles.find(t=>t.id===titleId);
  if(!title || !title.holderId) return;
  const champ = STATE.fighters.find(x=>x.id===title.holderId);
  if(!champ) return;
  if(!confirm(`¿Vaciar ${title.name}?\n\nEl campeón actual es ${champ.name}.\n\nEn la UFC real el campeón nunca pierde el cinturón por lesión — se crea un título interino mientras se recupera.\n\nSi de todas formas quieres vacar el cinturón (retirada, sanción, etc.) pulsa Aceptar.`)) return;
  const reign=(champ.titleReigns||[]).find(r=>r.titleId===title.id && !r.lostDate);
  if(reign) reign.lostDate=STATE.meta.currentDate;
  logEvent(`⚠️ ${title.name} queda vacante (decisión manual). ${champ.name} ya no es campeón.`);
  title.holderId=null; title.isInterim=false;
  saveLocal();
}

/* ====================== RENDER: SHELL ====================== */
const TABS = [
  ['dashboard','Inicio'],['roster','Roster'],['rankings','Rankings'],['titles','Títulos'],
  ['events','Eventos'],['stats','Estadísticas'],['activity','Actividad'],['hof','Hall of Fame'],
  ['scout','Scouting'],['rivalries','Rivalidades'],['infirmary','Enfermería'],['compare','Comparar'],['rankHistory','Ranking hist.'],['editor','Editor'],['guide','Guía'],['settings','GitHub']
];

function renderShell(){
  document.getElementById('topDate').textContent = '📅 ' + fmtDate(STATE.meta.currentDate);
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS.map(([id,label])=>`<div class="tab ${UI.tab===id?'active':''}" data-tab="${id}">${label}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ UI.tab=t.dataset.tab; render(); });
  renderTab();
}

function render(){ renderShell(); }

function renderTab(){
  const app=document.getElementById('app');
  refreshRankings();
  switch(UI.tab){
    case 'dashboard': app.innerHTML=tplDashboard(); bindDashboard(); break;
    case 'roster': app.innerHTML=tplRoster(); bindRoster(); break;
    case 'rankings': app.innerHTML=tplRankings(); bindRankings(); break;
    case 'titles': app.innerHTML=tplTitles(); bindTitles(); break;
    case 'events': app.innerHTML=tplEvents(); bindEvents(); break;
    case 'stats': app.innerHTML=`<div id="statsRoot">${tplStats()}</div>`; bindStats(); break;
    case 'activity': app.innerHTML=tplActivity(); break;
    case 'hof': app.innerHTML=tplHof(); bindHof(); break;
    case 'scout': app.innerHTML=tplScout(); bindScout(); break;
    case 'rivalries': app.innerHTML=tplRivalries(); break;
    case 'infirmary': app.innerHTML=tplInfirmary(); break;
    case 'guide': app.innerHTML=tplGuide(); break;
    case 'compare': app.innerHTML=tplComparator(); bindComparator(); break;
    case 'rankHistory': app.innerHTML=tplRankingHistory(); bindRankingHistory(); break;
    case 'editor': app.innerHTML=tplEditor(); bindEditor(); break;
    case 'settings': app.innerHTML=tplSettings(); bindSettings(); break;
  }
}
