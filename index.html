/* ====================== ENFERMERÍA ====================== */
function tplInfirmary(){
  // Auto-clear expired injuries
  STATE.fighters.forEach(f=>{
    if(f.status==='injured'&&f.injury?.active&&f.injury?.untilDate&&new Date(f.injury.untilDate)<=new Date(STATE.meta.currentDate)){
      f.injury.active=false; f.status='active';
    }
  });
  const injured=STATE.fighters.filter(f=>f.status==='injured').sort((a,b)=>new Date(a.injury?.untilDate||0)-new Date(b.injury?.untilDate||0));
  const recovering=STATE.fighters.filter(f=>f.status==='active'&&f.chinDamage>5).sort((a,b)=>b.chinDamage-a.chinDamage);
  return `
  <div class="card"><h2>🩹 Enfermería</h2>
    ${!injured.length?'<p class="muted">Nadie está lesionado actualmente.</p>':
    `<table><thead><tr><th>Peleador</th><th>Lesión</th><th>Regreso</th><th>Días</th></tr></thead><tbody>
    ${injured.map(f=>{
      const days=Math.max(0,Math.round((new Date(f.injury?.untilDate||STATE.meta.currentDate)-new Date(STATE.meta.currentDate))/86400000));
      const injColor=f.injury?.type==='concussion'?'#ef5350':'#ffa726';
      return `<tr class="clickable" data-id="${f.id}">
        <td><b>${f.name}</b></td>
        <td><span style="color:${injColor};font-size:.75rem">${f.injury?.note||'Lesión'}</span></td>
        <td style="font-size:.75rem">${fmtDate(f.injury?.untilDate)}</td>
        <td style="font-size:.75rem;color:#888">${days}d</td>
      </tr>`;
    }).join('')}
    </tbody></table>`}
  </div>
  ${recovering.length?`<div class="card"><h3>⚠️ Chin dañado (KOs en carrera)</h3>
    <p class="muted" style="font-size:.75rem">Peleadores activos con daño de chin acumulado — más vulnerables a KOs.</p>
    <table><thead><tr><th>Peleador</th><th>Daño chin</th><th>KO derrotas</th></tr></thead><tbody>
    ${recovering.map(f=>`<tr class="clickable" data-id="${f.id}"><td>${f.name}</td><td style="color:#ef5350"><b>${f.chinDamage}</b>/30</td><td>${f.record.ufcKoLosses||0}</td></tr>`).join('')}
    </tbody></table></div>`:''}`;
}

function tplRivalries(){
  // Reconstruir rivalidades desde el historial de eventos (más fiable que STATE.rivalries)
  const fightCounts={};
  STATE.events.filter(e=>e.status==='completed').forEach(ev=>{
    ev.card.filter(ft=>ft.result).forEach(ft=>{
      const k=rivalryKey(ft.fighterA,ft.fighterB);
      if(!fightCounts[k]) fightCounts[k]={idA:ft.fighterA,idB:ft.fighterB,fights:0};
      fightCounts[k].fights++;
    });
  });
  // Sincronizar con STATE.rivalries
  Object.entries(fightCounts).forEach(([k,v])=>{
    STATE.rivalries[k]={...(STATE.rivalries[k]||{}), fights:v.fights};
  });

  // Calcular importancia de cada rivalidad
  const pairsRaw=Object.entries(fightCounts).filter(([,v])=>v.fights>=2).map(([key,data])=>{
    const {idA,idB}=data;
    let titleFights=0, lastDate='';
    STATE.events.filter(e=>e.status==='completed').forEach(ev=>{
      ev.card.filter(ft=>ft.result&&((ft.fighterA===idA&&ft.fighterB===idB)||(ft.fighterA===idB&&ft.fighterB===idA))).forEach(ft=>{
        if(ft.titleId) titleFights++;
        if(!lastDate||ev.date>lastDate) lastDate=ev.date;
      });
    });
    const importance = data.fights*10 + titleFights*15 + (lastDate?(new Date(lastDate).getTime()/1e11):0);
    return [key, {...data, titleFights, lastDate, importance}];
  });
  const pairs=pairsRaw.sort((a,b)=>b[1].importance-a[1].importance);
  if(!pairs.length) return `<div class="card"><h2>⚔️ Rivalidades</h2><p class="muted">Aún no hay rivalidades. Se activan cuando dos peleadores se enfrentan 2 o más veces. Simula más eventos para crear historia.</p></div>`;

  return `<div class="card"><h2>⚔️ Rivalidades históricas</h2>
    <p class="muted" style="font-size:.78rem">Rivalidad cuando se han enfrentado 2+ veces. Oficial (⚔️) con 3+.</p>
  </div>
  ${pairs.slice(0,20).map(([key,data])=>{
    const {idA,idB}=data;
    const fA=STATE.fighters.find(x=>x.id===idA), fB=STATE.fighters.find(x=>x.id===idB);
    if(!fA||!fB) return '';
    const isOfficial=data.fights>=3;
    const fights=[];
    STATE.events.filter(e=>e.status==='completed').forEach(ev=>{
      ev.card.filter(ft=>ft.result&&((ft.fighterA===idA&&ft.fighterB===idB)||(ft.fighterA===idB&&ft.fighterB===idA))).forEach(ft=>{
        const w=STATE.fighters.find(x=>x.id===ft.result.winnerId);
        fights.push({ev,ft,w,date:ev.date});
      });
    });
    fights.sort((a,b)=>new Date(a.date)-new Date(b.date));
    const winsA=fights.filter(f=>f.w?.id===idA).length;
    const winsB=fights.filter(f=>f.w?.id===idB).length;
    return `<div class="card" style="padding:12px 14px;${isOfficial?'border-left:3px solid #7b1fa2':''}">
      <div style="font-size:.65rem;color:${isOfficial?'#ce93d8':'#888'};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${isOfficial?'⚔️ Rivalidad oficial':'Enfrentamientos'} · ${data.fights} peleas</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px">
        <div style="text-align:center;flex:1">
          ${fA.imageUrl?`<img src="${fA.imageUrl}" class="clickable" data-id="${fA.id}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;object-position:50% 5%;border:2px solid ${fighterColor(fA.id)};cursor:pointer">`:''}
          <div class="clickable" data-id="${fA.id}" style="font-size:.82rem;font-weight:700;margin-top:4px;cursor:pointer">${fA.name}</div>
          <div style="font-size:1.5rem;font-weight:900;color:${winsA>=winsB?'#d4af37':'#555'}">${winsA}</div>
        </div>
        <div style="font-size:.9rem;font-weight:900;color:#333">VS</div>
        <div style="text-align:center;flex:1">
          ${fB.imageUrl?`<img src="${fB.imageUrl}" class="clickable" data-id="${fB.id}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;object-position:50% 5%;border:2px solid ${fighterColor(fB.id)};cursor:pointer">`:''}
          <div class="clickable" data-id="${fB.id}" style="font-size:.82rem;font-weight:700;margin-top:4px;cursor:pointer">${fB.name}</div>
          <div style="font-size:1.5rem;font-weight:900;color:${winsB>=winsA?'#d4af37':'#555'}">${winsB}</div>
        </div>
      </div>
      ${fights.map((f,i)=>{const mc=m=>m==='KO/TKO'?'#ef5350':m==='Sumisión'?'#ce93d8':'#90caf9';const t=f.ft.titleId?STATE.titles.find(x=>x.id===f.ft.titleId):null;
        return `<div style="font-size:.72rem;padding:3px 0;border-top:1px solid #1a1a1a;display:flex;justify-content:space-between"><span>${i+1}. <b>${f.w?.name||'?'}</b> vence · ${fmtDate(f.date)}</span><span style="color:${mc(f.ft.result.method)}">${f.ft.result.method} R${f.ft.result.round}${t?' 🏆':''}</span></div>`;
      }).join('')}
    </div>`;
  }).join('')}`;
}

/* ====================== ROSTER ====================== */
function fighterStatusPill(f){
  if(f.status==='retired') return `<span class="pill retired">Retirado</span>`;
  if(f.status==='injured') return `<span class="pill injured">Lesionado</span>`;
  if(f.status==='free_agent') return `<span class="pill" style="background:#555">Agente Libre</span>`;
  if(isChampion(f.id)) return `<span class="pill champ">Campeón 🏆</span>`;
  if(isInterimChampion(f.id)) return `<span class="pill interim">Interino 🥈</span>`;
  return `<span class="pill">Activo</span>`;
}

function tplRoster(){
  // Auto-limpiar lesiones expiradas antes de renderizar
  STATE.fighters.forEach(f=>{
    if(f.status==='injured' && f.injury?.active && f.injury?.untilDate && new Date(f.injury.untilDate) <= new Date(STATE.meta.currentDate)){
      f.injury.active=false; f.status='active';
    }
  });
  const opts = `<option value="ALL">Todas las categorías</option>` + DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('');
  const statusOpts = ['ALL','active','injured','retired'].map(s=>`<option value="${s}">${s==='ALL'?'Todos los estados':s==='active'?'Activos':s==='injured'?'Lesionados':'Retirados'}</option>`).join('');
  let list = STATE.fighters.slice();
  if(UI.rosterFilter!=='ALL') list=list.filter(f=>f.division===UI.rosterFilter);
  if(UI.rosterStatusFilter && UI.rosterStatusFilter!=='ALL') list=list.filter(f=>f.status===UI.rosterStatusFilter);
  if(UI.rosterSearch) list=list.filter(f=>f.name.toLowerCase().includes(UI.rosterSearch.toLowerCase()));
  list.sort((a,b)=>b.rankScore-a.rankScore);
  return `
  <div class="card">
    <h2>Roster (${list.length} / ${STATE.fighters.length})</h2>
    <select id="fDiv">${opts}</select>
    <select id="fStatus">${statusOpts}</select>
    <input id="fSearch" placeholder="Buscar peleador..." value="${UI.rosterSearch}">
  </div>
  <div class="card">
    <table><thead><tr><th>Nombre</th><th>Div.</th><th>Récord</th><th>Estado</th></tr></thead>
    <tbody>
    ${list.map(f=>`<tr class="clickable" data-id="${f.id}">
      <td>${f.name}${f.hof?' <span class="pill hof">HOF</span>':''}</td>
      <td style="font-size:.72rem">${divName(f.division)}</td>
      <td>${f.record.wins}-${f.record.losses}-${f.record.draws}</td>
      <td>${fighterStatusPill(f)}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>
  `;
}
function bindRoster(){
  document.getElementById('fDiv').value=UI.rosterFilter||'ALL';
  document.getElementById('fDiv').onchange=e=>{UI.rosterFilter=e.target.value; render();};
  const fStatus=document.getElementById('fStatus');
  if(fStatus){ fStatus.value=UI.rosterStatusFilter||'ALL'; fStatus.onchange=e=>{UI.rosterStatusFilter=e.target.value; render();}; }
  document.getElementById('fSearch').oninput=e=>{UI.rosterSearch=e.target.value; renderTab();};
}

function openFighterModal(fid){
  const f = STATE.fighters.find(x=>x.id===fid); if(!f) return;
  const age = ageFromDob(f.dob, STATE.meta.currentDate);
  const reigns = (f.titleReigns||[]).map(r=>{
    const t=STATE.titles.find(x=>x.id===r.titleId);
    const tName=t?.name||r.titleName||(r.divisionId?divName(r.divisionId):r.titleId);
    return `<div>${t?titleIcon(t):(r.isInterim?'🥈':'👑')} ${tName}${r.isInterim?' <span class="pill interim">Interino</span>':''} — desde ${fmtDate(r.wonDate)}${r.lostDate?` hasta ${fmtDate(r.lostDate)}`:' (vigente)'} · ${r.defenses||0} defensas</div>`;
  }).join('') || '<p class="muted">Sin reinados de título.</p>';
  const fights = f.fightHistory.slice(-10).reverse().map(fid2=>{
    let found=null;
    for(const ev of STATE.events){ const ft=ev.card.find(x=>x.id===fid2); if(ft){found={ev,ft};break;} }
    if(!found || !found.ft.result) return '';
    const r=found.ft.result; const opp = STATE.fighters.find(x=>x.id===(r.winnerId===f.id?r.loserId:r.winnerId));
    const won = r.winnerId===f.id;
    const belt = found.ft.titleId? ` ${titleIcon(STATE.titles.find(t=>t.id===found.ft.titleId)||{})} <b>Combate por el título</b>` : '';
    return `<div>${won?'✅':'❌'} vs ${opp?opp.name:'?'} — ${r.method} R${r.round} (${fmtDate(found.ev.date)}) · <span class="muted">${found.ev.name}</span>${belt}</div>`;
  }).join('') || '<p class="muted">Sin combates simulados.</p>';

  // Posición en rankings para peleadores activos
  let rankInfo='';
  if(f.status==='active'||f.status==='injured'){
    const p4pList=p4pTop15();
    const p4pPos=p4pList.findIndex(x=>x.id===f.id);
    const divList=divisionTop15(f.division);
    const divPos=divList.findIndex(x=>x.id===f.id);
    const parts=[];
    if(p4pPos>=0) parts.push(`P4P: <b>#${p4pPos+1}</b>`);
    if(divPos>=0) parts.push(`${divName(f.division)}: <b>#${divPos+1}</b>`);
    if(parts.length) rankInfo=`<p class="muted" style="margin:2px 0">📊 Rankings — ${parts.join(' · ')}</p>`;
  }

  const unbeaten = f.record.losses===0 && f.record.ufcLosses===0 && f.record.wins>0;
  const rankBadges = fighterUFCRankings(f);

  // Rivalidades del peleador — calcular ANTES de construir el HTML
  const rivalEntries = Object.entries(STATE.rivalries||{}).filter(([k])=>k.includes(f.id)).map(([k,v])=>{
    const otherId=k.split('_').find(x=>x!==f.id);
    const opp=STATE.fighters.find(x=>x.id===otherId);
    return opp?`${opp.name} (${v.fights} ${v.fights===1?'encuentro':'enfrentamientos'})`:null;
  }).filter(Boolean);
  const rivalrySection = rivalEntries.length?`<p class="muted">⚔️ Rivalidades: ${rivalEntries.join(', ')}</p>`:'';

  // Streak indicator — solo cuando hay eventos simulados. Al inicio siempre es 0.
  const mom = f.momentum||0;
  const completedEvents = STATE.events.filter(e=>e.status==='completed').length;
  const streakIcon = completedEvents===0 ? '' : mom>=7?'🔥🔥🔥':mom>=5?'🔥🔥':mom>=3?'🔥':'';
  const streakLabel = completedEvents===0 ? '' : mom>=3 ? `Racha de ${mom} victorias seguidas` : '';

  // Title fight records
  const titleFights=[];
  STATE.events.filter(e=>e.status==='completed').forEach(ev=>{
    ev.card.filter(ft=>ft.titleId&&ft.result&&(ft.fighterA===f.id||ft.fighterB===f.id)).forEach(ft=>{
      const won=ft.result.winnerId===f.id;
      const t=STATE.titles.find(x=>x.id===ft.titleId);
      const opp=STATE.fighters.find(x=>x.id===(ft.fighterA===f.id?ft.fighterB:ft.fighterA));
      const storedName=(f.titleReigns||[]).find(tr=>tr.titleId===ft.titleId)?.titleName;
      titleFights.push({won,t:(t||{name:storedName||ft.titleId,id:ft.titleId,isInterim:ft.isInterim}),opp,ft,ev,isInterim:ft.isInterim});
    });
  });
  const titleWins=titleFights.filter(x=>x.won).length, titleLosses=titleFights.filter(x=>!x.won).length;
  const titleRecordsSection=titleFights.length?`
  <h3>Récord en peleas titulares</h3>
  <div style="background:var(--bg3);border-radius:6px;padding:8px 10px;font-size:.78rem">
    <div style="margin-bottom:4px"><b>${titleWins}-${titleLosses}</b> en peleas por el título${titleFights.filter(x=>x.isInterim).length?` (incluye ${titleFights.filter(x=>x.isInterim).length} interino/s)`:''}</div>
    ${titleFights.slice(-6).reverse().map(x=>`<div style="padding:2px 0">${x.won?'👑':'❌'} ${x.isInterim?'🥈':'🏆'} vs ${x.opp?.name||'?'} — ${x.ft.result.method} R${x.ft.result.round} (${fmtDate(x.ev.date)})</div>`).join('')}
  </div>`:'';

  document.getElementById('modalRoot').innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="btn small closebtn" id="modalClose">✕</button>
      ${f.imageUrl? `<img src="${f.imageUrl}" class="fighterImg" onerror="this.style.display='none'">` : ''}
      <h2>${f.name}${f.nickname? ` <span class="muted" style="font-size:.8em">"${f.nickname}"</span>`:''} ${streakIcon}</h2>
      ${streakLabel?`<div style="font-size:.76rem;color:${mom>=3?'#ff6d00':'#82b1ff'};margin:2px 0 4px">${streakLabel}</div>`:''}
      ${f.hof? `<div class="hofBadge">🏛 MIEMBRO DEL HALL OF FAME</div>` : ''}
      ${unbeaten? `<div class="hofBadge" style="background:linear-gradient(90deg,#004d00,#00b300,#004d00);color:#e8ffe8">⚡ INVICTO ⚡</div>` : ''}
      ${rankBadges? `<div style="margin:6px 0;display:flex;flex-wrap:wrap;gap:4px">${rankBadges}</div>` : ''}
      ${rankInfo}
      <div class="badge-row">${fighterStatusPill(f)}<span class="pill">${divName(f.division)}</span><span class="pill">${f.country}</span></div>
      <p class="muted">Edad: ${age} años · Nacido: ${fmtDate(f.dob)} · Debut: ${fmtDate(f.debut)}</p>
      <p>Récord total: <b>${f.record.wins}-${f.record.losses}-${f.record.draws}</b> (NC ${f.record.nc})
        · KO ${f.record.koWins} · SUB ${f.record.subWins} · DEC ${f.record.decWins}</p>
      <div style="background:var(--bg3);border-radius:8px;padding:10px;margin:6px 0">
        <b>En la UFC: ${f.record.ufcWins??0}-${f.record.ufcLosses??0}</b>
        <div style="display:flex;gap:12px;margin-top:4px;flex-wrap:wrap">
          <span>🥊 KO/TKO: <b>${ufcKoWinsOf(f)}</b></span>
          <span>🤼 Sumisiones: <b>${ufcSubWinsOf(f)}</b></span>
          <span>📋 Decisiones: <b>${ufcDecWinsOf(f)}</b></span>
          <span>🏆 Finalizaciones: <b>${ufcKoWinsOf(f)+ufcSubWinsOf(f)}</b></span>
        </div>
      </div>
      <p class="muted">Bonos: ${f.bonuses.performanceOfNight} Actuación de la Noche · ${f.bonuses.fightOfNight} Pelea de la Noche</p>
      <p class="muted">GOAT score: <b>${goatScore(f)}</b> · Rank score: <b>${f.rankScore.toFixed(1)}</b> · General: <b>${generalScore(f)}</b> · ATP pts: <b>${STATE.atpPoints?.[f.id]||0}</b></p>
      <p class="muted">Reputación: ${reputationLabel(f)} (${f.reputation||50}/100)</p>
      <p class="muted">Estilo: ${(FIGHT_STYLES[f.fightStyle||'technical']?.icon||'🧠')} <b>${(FIGHT_STYLES[f.fightStyle||'technical']?.label||'Técnico')}</b> — <span style="color:#777">${(FIGHT_STYLES[f.fightStyle||'technical']?.desc||'')}</span></p>
      ${f.chinDamage>5?`<p class="muted" style="color:#e57373;font-size:.75rem">⚠️ Chin dañado: ${f.chinDamage}/30 pts acumulados por KOs</p>`:''}
      <p class="muted" style="font-size:.72rem;margin:2px 0">
        Racha: <b>${f.momentum||0}</b>${(f.momentum||0)>=3?' 🔥 (+'+momentumBonus(f)+' stats)':''} &nbsp;·&nbsp;
        Longevidad: <b>${f.longevity}/100</b> &nbsp;·&nbsp;
        Chin daño: <b>${f.chinDamage||0}/30</b> &nbsp;·&nbsp;
        Reputación: <b>${f.reputation||50}/100</b>
      </p>
      <h3>Atributos</h3>
      ${STAT_KEYS.map(([k,label])=>`<div><div style="display:flex;justify-content:space-between"><span>${label}</span><span>${f.stats[k]}</span></div><div class="statbar"><i style="width:${f.stats[k]}%"></i></div></div>`).join('')}
      <div style="display:flex;justify-content:space-between;margin-top:6px"><span><b>General</b></span><span><b>${generalScore(f)}</b></span></div>
      <div class="statbar"><i style="width:${generalScore(f)}%;background:var(--gold)"></i></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px"><span>Longevidad</span><span>${f.longevity}/100</span></div>
      <div class="statbar"><i style="width:${f.longevity}%;background:${f.longevity<30?'var(--red)':'var(--green)'}"></i></div>
      <h3>Historial de títulos</h3>${reigns}
      <h3>Últimas peleas</h3>${fights}
      ${rivalrySection}
      ${titleRecordsSection}
      ${(()=>{
        const hist=(STATE.statsHistory||{})[f.id]||[];
        if(hist.length<2) return '';
        const W=320,H=120,PAD=24;
        const labels=[['striking','#ef5350'],['wrestlingOff','#42a5f5'],['ground','#66bb6a'],['chin','#ffd54f'],['cardio','#ce93d8']];
        const xs=hist.map((_,i)=>PAD+(i/(hist.length-1))*(W-PAD*2));
        let lines='';
        labels.forEach(([key,color])=>{
          const ys=hist.map(h=>PAD+(1-(h.stats[key]||70)/100)*(H-PAD*2));
          lines+=`<polyline points="${xs.map((x,i)=>`${x},${ys[i]}`).join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.85"/>`;
        });
        // Línea de General
        const gys=hist.map(h=>PAD+(1-h.general/100)*(H-PAD*2));
        lines+=`<polyline points="${xs.map((x,i)=>`${x},${gys[i]}`).join(' ')}" fill="none" stroke="#d4af37" stroke-width="2.5"/>`;
        // fecha inicio y fin
        lines+=`<text x="${PAD}" y="${H-2}" fill="#444" font-size="8">${hist[0].date.slice(5)}</text>`;
        lines+=`<text x="${W-PAD}" y="${H-2}" fill="#444" font-size="8" text-anchor="end">${hist[hist.length-1].date.slice(5)}</text>`;
        return `<h3>Evolución de atributos</h3>
        <div style="font-size:.7rem;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
          ${labels.map(([k,c])=>`<span style="color:${c}">■ ${k}</span>`).join('')}
          <span style="color:#d4af37;font-weight:700">■ General</span>
        </div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;background:#0d0d0d;border-radius:6px">${lines}</svg>`;
      })()}
      ${f.injury.active? `<p class="pill injured">Lesión: ${f.injury.note} — vuelve el ${fmtDate(f.injury.untilDate)}</p>`:''}
      <div class="row" style="margin-top:10px">
        <button class="btn gold full" id="editThis">Editar en el Editor →</button>
        ${f.status==='active'||f.status==='injured'? `<button class="btn danger full" id="cutFighter">✂️ Cortar del roster</button>` : ''}
        ${f.status==='free_agent'? `<button class="btn primary full" id="signFighter">✅ Fichar</button>` : ''}
      </div>
    </div>
  </div>`;
  document.getElementById('modalBg').onclick=e=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('modalClose').onclick=closeModal;
  document.getElementById('editThis').onclick=()=>{ closeModal(); UI.tab='editor'; UI.selectedFighter=f.id; render(); };
  const cutBtn=document.getElementById('cutFighter');
  if(cutBtn) cutBtn.onclick=()=>{
    if(!confirm(`¿Cortar a ${f.name} del roster? Pasará a ser agente libre.`)) return;
    f.status='free_agent';
    // Vacate any title
    STATE.titles.forEach(t=>{ if(t.interimHolderId===f.id){ t.interimHolderId=null; } if(t.holderId===f.id){ t.holderId=null; const r=(f.titleReigns||[]).find(rr=>!rr.lostDate); if(r)r.lostDate=STATE.meta.currentDate; logEvent(`🏆 ${t.name} queda vacante: ${f.name} cortado del roster.`); } });
    logEvent(`✂️ ${f.name} cortado del roster — ahora es agente libre.`);
    saveLocal(); closeModal(); render(); toast(`${f.name} cortado ✂️`);
  };
  const signBtn=document.getElementById('signFighter');
  if(signBtn) signBtn.onclick=()=>{
    f.status='active'; f._scoutExpires=null;
    // Remove from scoutCandidates if present
    if(STATE.scoutCandidates) STATE.scoutCandidates=STATE.scoutCandidates.filter(c=>c.id!==f.id);
    if(!f.debut) f.debut=STATE.meta.currentDate;
    logEvent(`✅ ${f.name} fichado y añadido al roster activo.`);
    saveLocal(); closeModal(); render(); toast(`${f.name} fichado ✅`);
  };
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ====================== RANKINGS ====================== */
function tplRankings(){
  const opts = DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('');
  // Build ATP ranking
  const atpRanking = STATE.fighters
    .filter(f=>f.status!=='retired' && (STATE.atpPoints?.[f.id]||0)>0)
    .map(f=>({f, pts:STATE.atpPoints?.[f.id]||0}))
    .sort((a,b)=>b.pts-a.pts);
  const allWithAtp = STATE.fighters
    .filter(f=>f.status!=='retired')
    .map(f=>({f, pts:STATE.atpPoints?.[f.id]||0}))
    .sort((a,b)=>b.pts-a.pts)
    .slice(0,30);
  return `
  <div class="card">
    <h2>Ranking Pound-for-Pound (Top 15)</h2>
    <table><thead><tr><th>#</th><th>Nombre</th><th>Récord</th><th>Score</th></tr></thead><tbody>
    ${p4pTop15().map((f,i)=>`<tr class="clickable" data-id="${f.id}"><td>${i+1}</td><td>${f.name}${championBadge(f.id)}</td><td>${f.record.wins}-${f.record.losses}</td><td>${f.rankScore.toFixed(1)}</td></tr>`).join('')}
    </tbody></table>
  </div>
  <div class="card">
    <h3>Ranking por categoría</h3>
    <select id="rankDiv">${opts}</select>
    <div id="rankDivList"></div>
  </div>
  <div class="card">
    <h3>🥊 Ranking de Puntos (estilo ATP)</h3>
    <p class="muted" style="font-size:.75rem">Basado en victorias reales en la liga. Cada victoria puntúa según el ranking del rival: +500 pts al campeón, +400 al #2, etc. Las derrotas restan 30%. La inactividad decae 10% por evento pasados 180 días.</p>
    ${allWithAtp.length?`
    <table><thead><tr><th>#</th><th>Nombre</th><th>Div.</th><th>Puntos</th></tr></thead><tbody>
    ${allWithAtp.map(({f,pts},i)=>`<tr class="clickable" data-id="${f.id}">
      <td>${i+1}</td>
      <td>${f.name}${championBadge(f.id)}</td>
      <td style="font-size:.7rem;color:var(--muted)">${divName(f.division).replace('Peso ','').replace('Semipesado','SH')}</td>
      <td><b>${pts.toLocaleString()}</b></td>
    </tr>`).join('')}
    </tbody></table>`
    :'<p class="muted">Aún sin puntos. Los puntos ATP se acumulan al simular combates.</p>'}
  </div>`;
}

/* ====================== TÍTULOS ====================== */
function tplTitles(){
  return `<div class="card"><h2>Cinturones</h2>
  ${STATE.titles.map(t=>{
    const holder = STATE.fighters.find(f=>f.id===t.holderId);
    const reign = holder? (holder.titleReigns||[]).find(r=>r.titleId===t.id && !r.lostDate) : null;
    const totalDefenses = t.history.length? t.history.reduce((acc,h)=>{
      const f=STATE.fighters.find(x=>x.id===h.fighterId);
      const r=f? (f.titleReigns||[]).find(rr=>rr.titleId===t.id && rr.wonDate===h.wonDate):null;
      return acc+(r?r.defenses||0:0);
    },0):0;
    return `<div class="fightcard-item clickable" data-title="${t.id}">
      <b>${titleIcon(t)} ${t.name}</b>${t.isInterim?' <span class="pill interim">Interino</span>':''}
      <div class="muted">Campeón: ${holder? holder.name : 'Vacante'}${reign? ' · '+(reign.defenses||0)+' defensas':''}${t.interimHolderId?` · 🥈 Interino: ${(STATE.fighters.find(x=>x.id===t.interimHolderId)||{}).name||'?'}`:''}</div>
      <div class="muted">Reinados históricos: ${t.history.length} · Defensas totales registradas: ${totalDefenses} · <span style="color:var(--blue)">Ver cronología →</span></div>
      ${holder? `<button class="btn small danger" data-vacate="${t.id}">Vacar título (lesión/retiro)</button>`:''}
    </div>`;
  }).join('')}
  </div>
  <div class="card">
    <h3>Crear nuevo título</h3>
    <input id="newTitleName" placeholder="Nombre del título (ej: Cinturón BMF 2, Catchweight...)">
    <label>Asociar a categoría (opcional, vacío = título especial)</label>
    <select id="newTitleDiv"><option value="">Ninguna (especial)</option>${DIVISIONS.map(d=>`<option value="${d.id}">${divName(d.id)}</option>`).join('')}</select>
    <label>¿Qué importancia tiene este título?</label>
    <select id="newTitleKind">
      <option value="main">Campeonato principal (🏆 indiscutido de la división)</option>
      <option value="minor">Título secundario / honorífico (🥉 tipo BMF, vale menos que un cinturón real)</option>
    </select>
    <button class="btn primary full" id="addTitle">Crear título</button>
  </div>`;
}
function bindTitles(){
  document.querySelectorAll('[data-vacate]').forEach(b=> b.onclick=(e)=>{ e.stopPropagation(); vacateTitleForInjury(b.dataset.vacate); render(); });
  document.querySelectorAll('[data-title]').forEach(card=> card.onclick=(e)=>{
    if(e.target.closest('[data-vacate]')) return;
    openTitleModal(card.dataset.title);
  });
  document.getElementById('addTitle').onclick=()=>{
    const name=document.getElementById('newTitleName').value.trim();
    if(!name) return toast('Pon un nombre al título');
    STATE.titles.push({id:uid('T'), name, divisionId:document.getElementById('newTitleDiv').value||null, kind:document.getElementById('newTitleKind').value, holderId:null, interimHolderId:null, isInterim:false, history:[]});
    saveLocal(); render(); toast('Título creado');
  };
}

function openTitleModal(tid){
  const t = STATE.titles.find(x=>x.id===tid); if(!t) return;
  // Construir cronología: cada entrada del historial + sus datos de reinado (fechas, defensas)
  const timeline = (t.history||[]).slice().sort((a,b)=> new Date(a.wonDate)-new Date(b.wonDate)).map((h,idx)=>{
    const f = STATE.fighters.find(x=>x.id===h.fighterId);
    const reign = f? (f.titleReigns||[]).find(r=>r.titleId===t.id && r.wonDate===h.wonDate) : null;
    const lostDate = reign? reign.lostDate : null;
    const defenses = reign? (reign.defenses||0) : 0;
    const isInterim = reign? reign.isInterim : false;
    const durationDays = Math.round((new Date(lostDate||STATE.meta.currentDate) - new Date(h.wonDate))/86400000);
    return `<div class="fightcard-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <b>${idx+1}. ${f?f.name:'Desconocido'}</b>${isInterim?' <span class="pill interim">Interino</span>':''}${!lostDate?' <span class="pill champ">Vigente</span>':''}
      </div>
      <div class="muted">${fmtDate(h.wonDate)} → ${lostDate? fmtDate(lostDate) : 'actualidad'} (${durationDays} días) · ${defenses} defensa${defenses!==1?'s':''}</div>
    </div>`;
  }).join('') || '<p class="muted">Este título no ha tenido campeones todavía.</p>';

  document.getElementById('modalRoot').innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <button class="btn small closebtn" id="modalClose">✕</button>
      <h2>${titleIcon(t)} ${t.name}${t.isInterim?' <span class="pill interim">Interino</span>':''}</h2>
      <p class="muted">${t.divisionId? divName(t.divisionId) : 'Título especial'} · ${(t.history||[]).length} reinado(s) registrado(s)</p>
      <h3>📅 Línea temporal de campeones</h3>
      ${tplTitleTimeline(t.id)}
      <h3>🌳 Árbol genealógico</h3>
      <p class="muted" style="font-size:.72rem">Cadena de cómo cada campeón ganó el título a su predecesor.</p>
      ${tplChampionTree(t.id)}
      <h3>Cronología detallada</h3>
      ${timeline}
    </div>
  </div>`;
  document.getElementById('modalBg').onclick=e=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('modalClose').onclick=closeModal;
}

/* ====================== EVENTOS ====================== */
function tplEvents(){
  const scheduled = STATE.events.filter(e=>e.status==='scheduled');
  const completed = STATE.events.filter(e=>e.status==='completed').slice().reverse();
  return `
  <div class="card">
    <h2>Crear evento</h2>
    <input id="evName" placeholder="Nombre del evento (ej: UFC 320)">
    <input id="evDate" type="date" value="${addDays(STATE.meta.currentDate,21)}">
    <button class="btn primary full" id="createEvBtn">Crear evento</button>
  </div>
  ${scheduled.map(ev=>tplEventBuilder(ev)).join('')}
  <div class="card">
    <h3>Eventos completados (${completed.length})</h3>

        ${fotn?`<div style="padding:4px 12px;background:rgba(255,193,7,.05);font-size:.7rem;color:#d4af37;border-bottom:1px solid #1e1e1e">🌟 FOTN: ${fotnA?.name||'?'} vs ${fotnB?.name||'?'}</div>`:''}
        <!-- Resultados -->
        <div style="padding:6px 0">

              <div style="flex:1;min-width:0">

                ${r?.isFOTN?' 🌟':''}${r?.performance?' ⭐':''}

    }).join('') || '<p class="muted">Sin eventos completados.</p>'}
  </div>`;
}

function updateProbDisplay(card){
  const aId = card.querySelector('.evFighterA').value;
  const bId = card.querySelector('.evFighterB').value;
  const disp = card.querySelector('.probDisplay');
  if(!disp) return;
  const fA = STATE.fighters.find(x=>x.id===aId);
  const fB = STATE.fighters.find(x=>x.id===bId);
  if(!fA || !fB || aId===bId){ disp.textContent=''; return; }
  const titleSel = card.querySelector('.evTitle');
  const rounds = (titleSel && titleSel.value)? 5 : 3;
  const p = winProbabilities(fA, fB, rounds);
  disp.innerHTML = `<b>${fA.name}</b> ${p.probA.toFixed(0)}%  —  ${p.probB.toFixed(0)}% <b>${fB.name}</b>`;
}

function fillFighterSelects(card){
  const divSel = card.querySelector('.evDivFilter');
  const aSel = card.querySelector('.evFighterA');
  const bSel = card.querySelector('.evFighterB');
  const divId = divSel.value;
  let pool = STATE.fighters.filter(fighterAvailable);
  if(divId!=='ALL') pool = pool.filter(f=>f.division===divId);

  // Ordenar: campeón primero, interino segundo, luego por rankScore
  pool.sort((a,b)=>{
    const aFull=STATE.titles.some(t=>t.holderId===a.id)?2:STATE.titles.some(t=>t.interimHolderId===a.id)?1:0;
    const bFull=STATE.titles.some(t=>t.holderId===b.id)?2:STATE.titles.some(t=>t.interimHolderId===b.id)?1:0;
    if(aFull!==bFull) return bFull-aFull;
    return b.rankScore-a.rankScore;
  });

  // Calcular número de ranking REAL (posición en el ranking de su división)
  const getRankNum = f => {
    if(divId==='ALL') return null;
    const list = divisionTop15(f.division);
    const pos = list.findIndex(x=>x.id===f.id);
    return pos>=0 ? pos+1 : null;
  };

  const optsHtml = pool.map(f=>{
    const isFullChamp = STATE.titles.some(t=>t.holderId===f.id);
    const isInterim   = STATE.titles.some(t=>t.interimHolderId===f.id);
    const badge = isFullChamp?'🏆 ':isInterim?'🥈 ':'';
    const rankNum = getRankNum(f);
    const rankLabel = isFullChamp?'C':isInterim?'IC':rankNum?`#${rankNum}`:'NR';
    return `<option value="${f.id}">${badge}${rankLabel} ${f.name} (${f.record.wins}-${f.record.losses})${f.status==='injured'?' 🩹':''}</option>`;
  }).join('');
  aSel.innerHTML = optsHtml; bSel.innerHTML = optsHtml;
  if(pool.length>1) bSel.selectedIndex=1;

  // Si el peleador A seleccionado tiene una cláusula, pre-seleccionar al oponente de la cláusula en B
  function autoSelectClauseOpponent(){
    const aId=aSel.value;
    const clause=STATE.rematches?.[aId];
    if(clause?.opponentId){
      const idx=[...bSel.options].findIndex(o=>o.value===clause.opponentId);
      if(idx>=0){ bSel.selectedIndex=idx; updateFighterInfo(); }
    }
  }
  aSel.addEventListener('change',()=>{ autoSelectClauseOpponent(); updateProbDisplay(card); });
  autoSelectClauseOpponent();

  // Últimos 3 combates con nombre de evento
  function getLastFightsHtml(fid){
    const f=STATE.fighters.find(x=>x.id===fid); if(!f||!f.fightHistory.length) return '';
    const rows=f.fightHistory.slice(-3).reverse().map(ftId=>{
      for(const ev of STATE.events){
        const ft=ev.card.find(x=>x.id===ftId);
        if(ft&&ft.result){
          const opp=STATE.fighters.find(x=>x.id===(ft.result.winnerId===fid?ft.result.loserId:ft.result.winnerId));
          const won=ft.result.winnerId===fid;
          const belt=ft.titleId?` 🏆`:'';
          return `<span style="font-size:.68rem;color:${won?'#66bb6a':'#ef5350'}">${won?'V':'D'} vs ${opp?opp.name:'?'} · ${ft.result.method} R${ft.result.round}${belt} <span style="color:#555">${ev.name}</span></span>`;
        }
      }
      return '';
    }).filter(Boolean);
    return rows.length?`<div style="display:flex;flex-direction:column;gap:2px;margin-top:3px">${rows.join('')}</div>`:'';
  }

  // Alertas contextuales (cláusulas, rivalidades, presión de título) para los peleadores seleccionados
  function getContextAlerts(fidA, fidB){
    if(!fidA||!fidB||fidA===fidB) return '';
    const alerts=[];
    // Revancha pendiente
    const rm=STATE.rematches||{};
    if(rm[fidA]?.opponentId===fidB){const t=rm[fidA].type;alerts.push(t==='titleShot'?'🥊 Cláusula de contendiente':t==='unification'?'🏆 Cláusula de unificación':'🔄 Cláusula de revancha');}
    else if(rm[fidB]?.opponentId===fidA){const t=rm[fidB].type;alerts.push(t==='titleShot'?'🥊 Cláusula de contendiente':t==='unification'?'🏆 Cláusula de unificación':'🔄 Cláusula de revancha');}
    // Rivalidad
    const fights=getRivalryFights(fidA,fidB);
    if(fights>=1) alerts.push(`\u2694\uFE0F ${fights}x pelea entre estos dos`);
    // Campeón sin defender
    const champ=STATE.fighters.find(x=>x.id===fidA)||STATE.fighters.find(x=>x.id===fidB);
    const pressures=checkTitleDefensePressure(STATE.meta.currentDate);
    pressures.filter(p=>p.champ.id===fidA||p.champ.id===fidB).forEach(p=>{
      alerts.push(`⚠️ ${p.champ.name} lleva ${p.daysSince>900?'mucho tiempo':p.daysSince+' días'} sin defender ${p.title.name}`);
    });
    return alerts.length?`<div style="margin:3px 0;display:flex;flex-direction:column;gap:2px">${alerts.map(a=>`<span style="font-size:.68rem;color:#d4af37">${a}</span>`).join('')}</div>`:'';
  }

  function updateFighterInfo(){
    const aInfo=card.querySelector('.fighterInfoA'), bInfo=card.querySelector('.fighterInfoB');
    const alertsBox=card.querySelector('.contextAlerts');
    if(aInfo) aInfo.innerHTML=getLastFightsHtml(aSel.value);
    if(bInfo) bInfo.innerHTML=getLastFightsHtml(bSel.value);
    if(alertsBox) alertsBox.innerHTML=getContextAlerts(aSel.value, bSel.value);
    updateProbDisplay(card);
  }

  aSel.onchange = updateFighterInfo;
  bSel.onchange = updateFighterInfo;
  updateFighterInfo();
}

function bindEvents(){
  document.getElementById('createEvBtn').onclick=()=>{
    const name=document.getElementById('evName').value.trim()||`Evento #${STATE.meta.eventSeq}`;
    const date=document.getElementById('evDate').value||STATE.meta.currentDate;
    createEvent(name,date); render(); toast('Evento creado');
  };
  document.querySelectorAll('[data-ev]').forEach(card=>{
    if(!card.classList.contains('card')) return;
  });
  document.querySelectorAll('.card[data-ev]').forEach(card=>{
    const evId=card.dataset.ev;
    fillFighterSelects(card);
    card.querySelector('.evDivFilter').onchange=()=> fillFighterSelects(card);
    const titleSel = card.querySelector('.evTitle');
    if(titleSel) titleSel.onchange=()=> updateProbDisplay(card);
  });
  document.querySelectorAll('.addFightBtn').forEach(btn=>{
    btn.onclick=()=>{
      const card = btn.closest('.card');
      const ev = STATE.events.find(x=>x.id===btn.dataset.ev);
      const aId=card.querySelector('.evFighterA').value, bId=card.querySelector('.evFighterB').value;
      if(!aId||!bId||aId===bId) return toast('Selecciona dos peleadores distintos');
      const fA = STATE.fighters.find(x=>x.id===aId);
      const fB = STATE.fighters.find(x=>x.id===bId);
      if(!fA||!fB) return toast('Peleador no encontrado');

      // Validación 1: misma categoría de peso
      if(fA.division !== fB.division) return toast(`❌ Categorías diferentes: ${divName(fA.division)} vs ${divName(fB.division)}. Solo peleas dentro de la misma división.`);

      // Validación 2: ningún peleador puede aparecer dos veces en el mismo evento
      const usedIds = ev.card.flatMap(ft=>[ft.fighterA, ft.fighterB]);
      if(usedIds.includes(aId)) return toast(`❌ ${fA.name} ya está en este evento`);
      if(usedIds.includes(bId)) return toast(`❌ ${fB.name} ya está en este evento`);

      // Validación 3: lógica de títulos
      const titleId = card.querySelector('.evTitle').value||null;
      const isInterim = card.querySelector('.evInterim').checked;
      if(titleId){
        const title = STATE.titles.find(t=>t.id===titleId);
        if(title && title.divisionId && title.divisionId !== fA.division)
          return toast(`❌ Este título es de ${divName(title.divisionId)}, no de ${divName(fA.division)}`);
        if(title){
          const holder = title.holderId;
          if(!isInterim){
            // Título principal: el poseedor debe participar, o debe estar vacante
            if(holder && holder!==aId && holder!==bId){
              const h = STATE.fighters.find(x=>x.id===holder);
              return toast(`❌ El título lo tiene ${h?h.name:'?'}. Primero quítaselo desde el Editor, o inclúyelo en el combate.`);
            }
          } else {
            // Título interino: no puede haber ya un interino (a menos que sea uno de los dos)
            const interimTitle = STATE.titles.find(t=>t.divisionId===fA.division && t.interimHolderId);
            if(interimTitle && interimTitle.holderId!==aId && interimTitle.holderId!==bId){
              const h2 = STATE.fighters.find(x=>x.id===interimTitle.holderId);
              return toast(`❌ Ya existe campeón interino (${h2?h2.name:'?'}). Quítale el título interino primero.`);
            }
            // Para un título interino de una división con campeón indiscutido, sí se permite
          }
        }
      }

      const isContender = card.querySelector('.evContender')?.checked||false;
      addFightToEvent(ev, aId, bId, titleId, isInterim, false, isContender);
      saveLocal(); render(); toast('Combate añadido ✅');
    };
  });
  document.querySelectorAll('.posterBtn').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation(); const ev=STATE.events.find(x=>x.id===btn.dataset.evid); if(ev) openEventPoster(ev);};
  });
  document.querySelectorAll('.reorderUp').forEach(btn=>{
    btn.onclick=()=>{
      const ev=STATE.events.find(x=>x.id===btn.dataset.ev);
      const idx=parseInt(btn.dataset.idx);
      if(idx>0){[ev.card[idx-1],ev.card[idx]]=[ev.card[idx],ev.card[idx-1]];}
      saveLocal(); render();
    };
  });
  document.querySelectorAll('.reorderDown').forEach(btn=>{
    btn.onclick=()=>{
      const ev=STATE.events.find(x=>x.id===btn.dataset.ev);
      const idx=parseInt(btn.dataset.idx);
      if(idx<ev.card.length-1){[ev.card[idx],ev.card[idx+1]]=[ev.card[idx+1],ev.card[idx]];}
      saveLocal(); render();
    };
  });
  document.querySelectorAll('.removeFightBtn').forEach(btn=>{
    btn.onclick=()=>{
      const ev=STATE.events.find(x=>x.id===btn.dataset.ev);
      ev.card.splice(parseInt(btn.dataset.idx),1);
      saveLocal(); render();
    };
  });
  document.querySelectorAll('.simulateBtn').forEach(btn=>{
    btn.onclick=()=>{
      const ev=STATE.events.find(x=>x.id===btn.dataset.ev);
      simulateEvent(ev);
      STATE.meta.currentDate = ev.date;
      saveLocal(); render();
      showEventSummaryAfterRender(ev);
    };
  });
  document.querySelectorAll('.simulateLiveBtn').forEach(btn=>{
    btn.onclick=()=>{
      const ev=STATE.events.find(x=>x.id===btn.dataset.ev);
      openLiveFightViewer(ev);
    };
  });
}

// Genera texto narrativo del combate round a round basado en los atributos reales
function generateFightNarrative(fA, fB, result){
  const w = result.winner, l = result.loser;
  const isKO = result.method==='KO/TKO', isSub = result.method==='Sumisión';
  const styleA = fA.fightStyle||'technical', styleB = fB.fightStyle||'technical';
  const narrative = [];

  // ---- Pools de frases ----
  const STRIKE_DOM = n=>[
    `${n} controla la distancia con jabs precisos que marcan el ritmo del asalto.`,
    `${n} conecta una combinación derecha-izquierda que sacude a su rival.`,
    `${n} castiga el cuerpo con ganchos al hígado que se notan en la cara del rival.`,
    `La potencia de ${n} es evidente: cada impacto hace retroceder a su oponente.`,
    `${n} trabaja con movimiento de pies excelente, ningún golpe del rival hace daño.`,
    `${n} conecta un uppercut devastador que pone a su rival contra las cuerdas.`,
    `El trabajo de piernas de ${n} es impecable, siempre en el ángulo correcto.`,
    `${n} demuestra su superioridad técnica con una distancia perfectamente controlada.`,
    `Una patada de cuerpo de ${n} hace doblar a su rival — claramente le está afectando.`,
    `${n} encuentra el ritmo: jab, cruzado, uppercut. Su rival no tiene respuesta.`,
    `La velocidad de manos de ${n} es sorprendente — conecta tres golpes antes de que el rival reaccione.`,
    `${n} lanza un rodillazo desde el clinch que claramente sacude a su rival.`,
    `Cada vez que el rival adelanta, ${n} lo recibe con un contador perfecto.`,
    `Un codazo preciso de ${n} abre una herida — el médico tendrá que verlo entre asaltos.`,
    `${n} usa la patada trasera al cuerpo para mantener la distancia y controlar el asalto.`,
    `Trabajo de clinch de ${n}: rodillazos al cuerpo que hacen bajar los brazos al rival.`,
  ];
  const STRIKE_EQUAL = (a,b)=>[
    `${a} y ${b} intercambian golpes en un duelo al límite que pone en pie al público.`,
    `Ambos peleadores muestran el mentón: ni ${a} ni ${b} dan un paso atrás.`,
    `Gran asalto de ida y vuelta — los dos conectan y el árbitro observa de cerca.`,
    `${a} contraataca cada golpe de ${b} con una precisión sorprendente.`,
    `Las ganas de pelear de ${a} y ${b} hacen de este un asalto emocionante.`,
    `Ninguno quiere ceder terreno: ${a} presiona, ${b} responde.`,
    `${a} conecta un derechazo que tambalea a ${b}, pero ${b} responde con un gancho.`,
    `Asalto reñidísimo — los jueces lo tendrán difícil para decidir quién se lo lleva.`,
    `${a} parece dominar la primera mitad, pero ${b} acelera al final.`,
    `Intercambio de potencia en el centro — ambos absorben y siguen hacia adelante.`,
    `El público explota: ${a} y ${b} se enzarzan en un intercambio sin cuartel.`,
    `Ambos lanzan una combinación simultánea y se tambalean mutuamente. El público enloquece.`,
  ];
  const TD_SUCCESS = n=>[
    `${n} consigue el derribo y establece el juego de control en el suelo.`,
    `Gran disparo de doble pierna de ${n} — su rival no puede hacer nada para evitarlo.`,
    `${n} aprovecha un momento de descuido para cambiar el combate al suelo.`,
    `El clinch de ${n} termina con un perfecto derribo que cambia el juego.`,
    `Derribo de oso de ${n} — carga sobre su rival y lo lleva directamente a la lona.`,
    `${n} ejecuta un trip desde el clinch y consigue el derribo.`,
    `Presión sobre la jaula, giro y derribo de ${n} — muy trabajado.`,
  ];
  const GROUND_CTL = n=>[
    `${n} trabaja desde la guardia montada buscando el daño acumulado.`,
    `${n} controla desde la espalda y busca el cuello sin parar.`,
    `Gran posición de ${n} en el suelo — el árbitro examina si su rival sigue activo.`,
    `${n} encadena ground and pound que hace sangrar a su rival.`,
    `Dominio total de ${n} en el suelo — su rival apenas puede moverse.`,
    `Espalda completa de ${n}: dos ganchos colocados, buscando la finalización.`,
  ];
  const CLINCH_WIN = n=>[
    `${n} domina el clinch con rodillazos al cuerpo que van sumando daño.`,
    `En el cuerpo a cuerpo ${n} es más fuerte — controla la cabeza y dicta el ritmo.`,
    `${n} trabaja el dirty boxing en el clinch con puños cortos que afectan a su rival.`,
    `${n} usa el clinch para desgastar a su rival y resetearlo sin energía.`,
  ];
  const CARDIO_LOW = n=>[
    `${n} muestra signos claros de cansancio — la respiración se le nota pesada.`,
    `El ritmo de ${n} ha bajado notablemente; sus piernas ya no responden igual.`,
    `${n} parece haber dejado demasiado en asaltos anteriores.`,
    `La velocidad de ${n} es una sombra de lo que era al inicio.`,
    `${n} busca el clinch para recuperar el aliento — el desgaste es real.`,
  ];
  // Frases de estilo interactuando con el rival
  const STYLE_INTERACTION = (winner, loser, sW, sL)=>{
    const map = {
      'counter_pressure':  `El contragolpe de ${winner} funciona a la perfección — cada avance de ${loser} es castigado.`,
      'grappler_pressure': `${winner} lleva el combate al suelo cada vez que ${loser} presiona — la estrategia es perfecta.`,
      'finisher_counter':  `${winner} no da tiempo a ${loser} para pensar — explosión pura y sin pausa.`,
      'technical_pressure':`La precisión de ${winner} neutraliza el volumen de ${loser}.`,
      'grappler_technical':`${winner} cierra la distancia y lleva el combate a donde ${loser} no quiere.`,
    };
    return map[`${sW}_${sL}`]||null;
  };
  // Knockdown lines
  const KD_LINE = (w,l)=>[
    `⚡ ¡DERRIBO! ${w} conecta un golpe limpio que manda a ${l} a la lona. El árbitro empieza a contar.`,
    `⚡ ¡DOWN! ${l} cae tras un gancho de ${w}. Se levanta pero está claramente afectado.`,
    `⚡ ¡Golpe tremendo de ${w}! ${l} toca la lona con las rodillas — ¡knockdown!`,
    `⚡ Combinación de ${w} que noquea momentáneamente a ${l}. El árbitro pide que continúen.`,
  ];
  // Frases de error táctico
  const TACTICAL_ERROR = (err, opp)=>[
    `${err} sobrecomete en una combinación y deja el flanco abierto — ${opp} lo aprovecha.`,
    `${err} intenta una sumisión desde mala posición y ${opp} escapa y toma ventaja.`,
    `Error de ${err}: avanza sin proteger el mentón y recibe un golpe de calidad.`,
    `${err} baja la guardia un segundo — ${opp} no perdona y conecta limpio.`,
  ];
  const KO_FINISH = (w,l)=>[
    `💥 ¡${w} conecta un derechazo fulminante y ${l} cae desplomado! ¡El árbitro para!`,
    `💥 ¡Combinación demoledora de ${w}! El gancho izquierdo manda a ${l} a la lona sin sentido.`,
    `💥 ¡${w} conecta el rodillazo que buscaba desde el inicio! ${l} no puede continuar.`,
    `💥 ¡Uppercut de manual! ${w} encuentra el hueco perfecto y ${l} no lo ve venir.`,
    `💥 Un directo de zurda preciso pone fin al combate — ${l} ya no puede responder.`,
    `💥 ¡${w} encadena tres golpes seguidos sin respuesta! El árbitro interviene.`,
    `💥 ¡Patada giratoria al cuerpo de ${w} que dobla a ${l} y le remata en el suelo!`,
    `💥 ¡Ground and pound devastador de ${w}! El árbitro para antes de que ${l} reciba más daño.`,
    `💥 Una derecha a la sien de ${w} y ${l} cae como un árbol. La arena lo ha visto.`,
    `💥 ¡Rodilla voladora de ${w}! ${l} no la ve venir y queda inconsciente en la lona.`,
    `💥 Combinación al cuerpo y arriba de ${w}: el gancho final apaga las luces de ${l}.`,
    `💥 Contraataque perfecto de ${w}: esquiva el derechazo de ${l} y devuelve uno propio. Nocaut.`,
    `💥 ¡Patada a la cabeza de ${w}! ${l} cae a la lona y el árbitro para inmediatamente.`,
  ];
  const SUB_FINISH = (w,l)=>[
    `🤼 ¡${w} atrapa el triángulo y aprieta hasta que ${l} da tres golpecitos!`,
    `🤼 ¡Rear naked choke perfecto! ${l} se queda dormido en los brazos de ${w}.`,
    `🤼 ¡${w} gira para el armbar desde la guardia! ${l} grita de dolor y cede.`,
    `🤼 ¡D'Arce choke impecable de ${w}! ${l} intenta escapar pero ya es tarde.`,
    `🤼 ¡Guillotina fulminante! ${w} atrapa el cuello de ${l} y cierra el combate.`,
    `🤼 Heelhook perfecto de ${w} — ${l} no puede girar y debe abandonar.`,
    `🤼 ¡${w} consigue la espalda, coloca los ganchos y aprieta el cuello! ${l} golpea la lona.`,
    `🤼 ¡Kimura desde la guardia! ${w} gira el brazo de ${l} más allá de sus límites.`,
    `🤼 ¡Anaconda choke de ${w}! ${l} intenta salir pero el agarre es de hierro.`,
    `🤼 Rear naked choke en la primera oportunidad: ${w} saca la espalda de ${l} y lo duerme.`,
    `🤼 ¡${w} atrapa la pierna de ${l} en un kneebar y aprieta! El grito lo dice todo.`,
  ];

  const pick = arr => arr[Math.floor(Math.random()*arr.length)];

  for(let r=1; r<=result.round; r++){
    const isLastRound = r===result.round;
    const foughtToEnd = isLastRound && result.method!=='Decisión';
    const lines = [];

    const realScore = (result.roundScores||[])[r-1];
    const roundWinner = realScore==='A'? fA : realScore==='B'? fB : (foughtToEnd? w : null);
    const roundLoser  = roundWinner===fA? fB : fA;
    const roundClose  = !foughtToEnd && Math.random()<0.15;

    const sW = roundWinner?.fightStyle||'technical';
    const sL = roundLoser?.fightStyle||'technical';
    const winnerIsStriker  = roundWinner && (roundWinner.stats.striking+roundWinner.stats.power) > (roundLoser.stats.striking+roundLoser.stats.power)+5;
    const winnerIsWrestler = roundWinner && roundWinner.stats.wrestlingOff > roundLoser.stats.wrestlingDef+10;
    const isLateRound = r>=4;

    // Línea principal
    if(foughtToEnd){
      lines.push(pick(STRIKE_EQUAL(fA.name, fB.name)));
    } else if(!roundWinner || roundClose){
      lines.push(pick(STRIKE_EQUAL(roundWinner?roundWinner.name:fA.name, roundWinner?roundLoser.name:fB.name)));
    } else if(winnerIsStriker){
      lines.push(pick(STRIKE_DOM(roundWinner.name)));
    } else if(winnerIsWrestler){
      lines.push(pick(TD_SUCCESS(roundWinner.name)));
    } else {
      lines.push(pick([
        `${roundWinner.name} toma el control del asalto con mayor actividad y volumen.`,
        `${roundWinner.name} dicta el ritmo del combate y ${roundLoser.name} no puede responder.`,
        `${roundWinner.name} gana este asalto con trabajo sucio y presión constante.`,
        `${roundWinner.name} se muestra más activo e impone su juego en esta ronda.`,
        `La presión de ${roundWinner.name} es implacable — ${roundLoser.name} solo puede sobrevivir.`,
      ]));
    }

    // Knockdown en este asalto
    if(!foughtToEnd && roundWinner){
      const hasKD = r===result.round && (result.knockdownsA||0)+(result.knockdownsB||0)>0;
      const kdWinner = (result.knockdownsA>0&&roundWinner===fA)||(result.knockdownsB>0&&roundWinner===fB);
      if(hasKD && kdWinner) lines.push(pick(KD_LINE(roundWinner.name, roundLoser.name)));
    }

    // Línea secundaria: coherente con ganador
    if(!foughtToEnd && roundWinner){
      const rand = Math.random();
      const styleInteraction = STYLE_INTERACTION(roundWinner.name, roundLoser.name, sW, sL);

      if(rand<0.2 && styleInteraction){
        lines.push(styleInteraction);
      } else if(rand<0.35 && winnerIsWrestler){
        lines.push(pick(GROUND_CTL(roundWinner.name)));
      } else if(rand<0.50){
        // Clinch — ganador controla el cuerpo a cuerpo
        lines.push(pick(CLINCH_WIN(roundWinner.name)));
      } else {
        lines.push(pick([
          `${roundLoser.name} busca el intercambio pero ${roundWinner.name} está un paso por delante.`,
          `Intento de reacción de ${roundLoser.name} que ${roundWinner.name} neutraliza sin problemas.`,
          `${roundLoser.name} intenta el disparo a las piernas pero ${roundWinner.name} sprawla y responde.`,
          `${roundLoser.name} presiona hacia la jaula pero ${roundWinner.name} invierte y sigue dominando.`,
          `${roundLoser.name} lanza una combinación pero ${roundWinner.name} la bloquea y responde más rápido.`,
        ]));
      }

      // Error táctico ocasional
      if(Math.random()<0.07){
        lines.push(pick(TACTICAL_ERROR(roundLoser.name, roundWinner.name)));
      }

      if(isLateRound && Math.random()<0.5){
        lines.push(pick(CARDIO_LOW(roundLoser.name)));
      }
    }

    // Finalización
    if(foughtToEnd){
      if(isKO)  lines.push(pick(KO_FINISH(w.name,l.name)));
      else      lines.push(pick(SUB_FINISH(w.name,l.name)));
    }

    narrative.push({round:r, lines, isFinish:foughtToEnd, roundWinner, roundClose});
  }
  return narrative;
}

// Pre-simula todos los combates pero los muestra uno a uno al usuario
function openLiveFightViewer(ev){
  if(ev.status==='completed') return toast('Este evento ya está completado');
  const results = [...ev.card].reverse().map(fight=>{
    const fA=STATE.fighters.find(x=>x.id===fight.fighterA);
    const fB=STATE.fighters.find(x=>x.id===fight.fighterB);
    if(!fA||!fB) return null;
    const isTitle = !!fight.titleId;
    const r = simulateFight(fA, fB, {rounds:isTitle?5:3});
    return {fight, fA, fB, result:r, narrative: generateFightNarrative(fA,fB,r)};
  }).filter(Boolean);

  let fightIdx = 0; // 0 = first prelim (card reversed), last index = main event
  let phase = 'prefight';
  let roundIdx = 0;
  const totalFights = results.length;

  // Usar los roundScores REALES devueltos por simulateFight — así el marcador del viewer
  // es exactamente consistente con el resultado final. Fin al bug de "va 2-0 pero pierde".
  const fightRoundScores = results.map(({fA, fB, result})=>{
    // result.roundScores ya contiene el ganador real de cada asalto ('A'=fA ganó, 'B'=fB ganó, 'finish')
    // Completar con null para los asaltos que no se disputaron (pelea acabó antes)
    const scores = result.roundScores || [];
    while(scores.length < result.rounds) scores.push(null);
    return scores;
  });

  function avatarHtml(f, size=90, dim=false){
    // Foto circular. object-position 50% 5% muestra la zona cabeza/hombros
    // (casi desde el tope de la imagen, con mínimo margen para no cortar pelo).
    // onerror solo oculta la imagen rota — sin inyectar HTML que rompe el atributo.
    const s = `width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;object-position:50% 5%;${dim?'opacity:.35;filter:grayscale(80%);':''}`;
    const icon = dim ? '💀' : '🥊';
    if(f.imageUrl) return `<img src="${f.imageUrl}" style="${s}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{style:'width:${size}px;height:${size}px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.35)}px',textContent:'${icon}'}))">`;
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.35)}px">${icon}</div>`;
  }

  function renderFightViewer(){
    const {fight, fA, fB, result, narrative} = results[fightIdx];
    const title = fight.titleId? STATE.titles.find(t=>t.id===fight.titleId):null;
    const w=result.winner, l=result.loser;
    const isKO=result.method==='KO/TKO', isSub=result.method==='Sumisión';
    const probA = winProbabilities(fA,fB,result.rounds||3).probA;
    const probB = 100-probA;
    // Fight type — determines visual style
    const isTitle=!!fight.titleId, isRivalFight=isRival(fA.id,fB.id), isContenderFight=!!fight.isContender;
    const fightTypeLabel=isTitle?(fight.isInterim?'🥈 Pelea por el título interino':'🏆 Pelea por el título'):isContenderFight?'🥊 Pelea de contendiente':isRivalFight?'⚔️ Rivalidad':'';
    const headerBg=isTitle?'linear-gradient(90deg,#5a0000,#000,#4a3000)':isContenderFight?'linear-gradient(90deg,#00205a,#000,#00205a)':isRivalFight?'linear-gradient(90deg,#3a0060,#000,#3a0060)':'#1a1a1a';
    const borderColor=isTitle?'#d4af37':isContenderFight?'#82b1ff':isRivalFight?'#ce93d8':'#333';
    // Rankings
    const p4pRankA=getPfpRank(fA), p4pRankB=getPfpRank(fB);
    const divRankA=getDivRank(fA), divRankB=getDivRank(fB);
    const rankTagA=[p4pRankA&&`P4P #${p4pRankA}`,divRankA&&`#${divRankA} ${divName(fA.division).slice(0,12)}`].filter(Boolean).join(' · ');
    const rankTagB=[p4pRankB&&`P4P #${p4pRankB}`,divRankB&&`#${divRankB} ${divName(fB.division).slice(0,12)}`].filter(Boolean).join(' · ');

    if(phase==='prefight'){
      // PANTALLA PRE-COMBATE: vs screen con stats y probabilidades
      document.getElementById('modalRoot').innerHTML=`
      <div class="modal-bg" id="modalBg" style="align-items:flex-start;padding-top:12px;background:rgba(0,0,0,.92)">
        <div class="modal" style="max-width:480px;background:#111;border:1px solid ${borderColor};padding:0;overflow:hidden">
          <div style="background:${headerBg};padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
            <span class="muted" style="font-size:.75rem">Combate ${fightIdx+1}/${totalFights} · ${ev.name}</span>
            ${fightTypeLabel?`<span style="font-size:.78rem;font-weight:700;color:${borderColor}">${fightTypeLabel}</span>`:title?`<span style="font-size:.8rem">${titleIcon(title)} ${title.name}${fight.isInterim?' (Interino)':''}</span>`:''}
          </div>
          <div style="padding:16px 14px">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center">
                ${avatarHtml(fA,88)}
                <div style="font-weight:700;margin-top:8px;font-size:.9rem">${fA.name}</div>
                <div class="muted" style="font-size:.72rem">${fA.record.wins}-${fA.record.losses}</div>
                ${rankTagA?`<div style="font-size:.66rem;color:#82b1ff;margin-top:1px">${rankTagA}</div>`:''}
                <div style="font-size:.68rem;margin-top:2px;color:#888">${(FIGHT_STYLES[fA.fightStyle||'technical']?.icon||'🧠')} ${(FIGHT_STYLES[fA.fightStyle||'technical']?.label||'Técnico')}</div>
              </div>
              <div style="text-align:center;color:${borderColor};font-size:1.8rem;font-weight:900;min-width:36px;padding-top:28px">VS</div>
              <div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center">
                ${avatarHtml(fB,88)}
                <div style="font-weight:700;margin-top:8px;font-size:.9rem">${fB.name}</div>
                <div class="muted" style="font-size:.72rem">${fB.record.wins}-${fB.record.losses}</div>
                ${rankTagB?`<div style="font-size:.66rem;color:#82b1ff;margin-top:1px">${rankTagB}</div>`:''}
                <div style="font-size:.68rem;margin-top:2px;color:#888">${(FIGHT_STYLES[fB.fightStyle||'technical']?.icon||'🧠')} ${(FIGHT_STYLES[fB.fightStyle||'technical']?.label||'Técnico')}</div>
              </div>
            </div>
            <div style="margin:14px 0 8px;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#888;text-align:center">Probabilidades (simulación)</div>
            <div style="display:flex;border-radius:6px;overflow:hidden;height:28px">
              <div style="width:${probA}%;background:#e53935;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff">${probA.toFixed(0)}%</div>
              <div style="width:${probB}%;background:#1565c0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff">${probB.toFixed(0)}%</div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:2px">
              <span style="font-size:.7rem;color:#888">${fA.name}</span>
              <span style="font-size:.7rem;color:#888">${fB.name}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:.75rem">
              ${[['Pegada','striking'],['Potencia','power'],['Wrestling Of.','wrestlingOff'],['Defensa W.','wrestlingDef'],['Suelo','ground'],['Cardio','cardio'],['Resistencia','chin']].map(([lbl,k])=>{
                const va=fA.stats[k], vb=fB.stats[k];
                return `<div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 40px 1fr;gap:4px;align-items:center">
                  <div style="height:6px;border-radius:3px;background:linear-gradient(to left, #e53935, transparent);width:${va}%"></div>
                  <div style="text-align:center;color:#555;font-size:.65rem">${lbl}</div>
                  <div style="height:6px;border-radius:3px;background:linear-gradient(to right, #1565c0, transparent);width:${vb}%"></div>
                </div>`;
              }).join('')}
            </div>
          </div>
          <div style="padding:0 14px 16px;display:flex;gap:8px">
            <button class="btn primary full" id="fvStart" style="padding:12px">▶ Comenzar combate</button>
            ${fightIdx<totalFights-1?`<button class="btn small" id="fvSkipAll" style="white-space:nowrap">⏩ Simular resto rápido</button>
            <button class="btn small" id="fvSimNext" style="white-space:nowrap;margin-left:4px">⏭ Siguiente pelea</button>`:''}
          </div>
          <div style="padding:0 14px 12px;text-align:center">
            <button class="btn small" id="fvCancel" style="color:var(--muted)">✕ Cancelar sin guardar</button>
          </div>
        </div>
      </div>`;
      document.getElementById('fvStart').onclick=()=>{ phase='rounds'; roundIdx=0; renderFightViewer(); };
      if(document.getElementById('fvSkipAll')) document.getElementById('fvSkipAll').onclick=()=>{ skipAllRemaining(); };
      if(document.getElementById('fvSimNext')) document.getElementById('fvSimNext').onclick=()=>{
        // Solo avanzar — todos los resultados se aplican juntos al final por applyAllAndFinish
        if(fightIdx<results.length-1){ fightIdx++; phase='prefight'; roundIdx=0; renderFightViewer(); }
        else { applyAllAndFinish(); }
      };
      document.getElementById('fvCancel').onclick=()=>{ if(confirm('¿Cancelar sin guardar resultados?')) closeModal(); };

    } else if(phase==='rounds'){
      // PANTALLA DE ROUNDS: narrativa asalto a asalto + marcador en vivo
      const roundData = narrative[roundIdx];
      const totalRounds = result.round;
      const isLastRound = roundIdx===totalRounds-1;
      const isFinishRound = isLastRound && result.method!=='Decisión';

      // Usar los scores pre-calculados (fijos para todo el combate, no cambian al navegar)
      const allRoundScores = fightRoundScores[fightIdx]; // array del combate actual
      // Solo mostrar asaltos ya terminados (antes del actual)
      const scoreHistory = allRoundScores.slice(0, roundIdx);
      const roundsA = scoreHistory.filter(x=>x==='A').length;
      const roundsB = scoreHistory.filter(x=>x==='B').length;
      const methodColor = isKO?'#ef5350':isSub?'#ce93d8':'#90caf9';

      // Scorecard visual: casillas por asalto
      const scorecardHtml = Array.from({length:result.rounds},(_,i)=>{
        let bg='#222', symbol='·';
        const s = allRoundScores[i];
        if(i < roundIdx){
          if(s==='A'){ bg='rgba(229,57,53,.4)'; symbol='▲'; }
          else if(s==='B'){ bg='rgba(21,101,192,.4)'; symbol='▼'; }
          else if(s==='finish'){ bg='rgba(212,175,55,.3)'; symbol='★'; }
          else { bg='rgba(100,100,100,.4)'; symbol='='; }
        } else if(i===roundIdx){ bg='rgba(255,255,255,.15)'; symbol=`R${i+1}`; }
        return `<div style="flex:1;height:26px;border-radius:4px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff">${symbol}</div>`;
      }).join('');

      // Quién va ganando en tarjetas

  function applyAllAndFinish(){
    results.forEach(({fight, result})=>{

        winnerId:result.winner.id, loserId:result.loser.id,
        method:result.method, round:result.round, time:result.time,

      };
      const fAf=STATE.fighters.find(x=>x.id===fight.fighterA);
      const fBf=STATE.fighters.find(x=>x.id===fight.fighterB);
      if(fAf&&fBf){
        applyFightResultToState(fight, fAf, fBf, result, ev);
        checkAndUpdateRecords(fAf, fBf, result, ev.date);
      }
    });
    finishEvent(ev);
    STATE.meta.currentDate = ev.date;
    saveLocal(); render();
    showEventSummaryAfterRender(ev);
  }

  function skipAllRemaining(){ applyAllAndFinish(); }

  renderFightViewer();
